<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아크로한의원 · 다이어트 한약 복용법 · 다국어</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Sans+Thai:wght@400;500;700;800&display=swap">
<style>
  :root{
    --bg:#eef2f0; --surface:#ffffff;
    --ink:#16241f; --ink-soft:#46574f; --ink-faint:#7d8c84;
    --green:#2f6b54; --green-deep:#1d4636; --green-soft:#e4efe9;
    --amber:#cf7f33; --amber-deep:#9a560f; --amber-soft:#f6ead9;
    --line:#d6dedb; --line-strong:#bcc8c3;
    --radius:18px; --maxw:980px;
    --kr:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
    --jp:'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{font-family:var(--kr); background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.6; overflow:hidden;}
  body[data-lang="ja"]{font-family:var(--jp);}
  body[data-lang="zh-cn"]{font-family:'Noto Sans SC',var(--kr);}
  body[data-lang="zh-tw"]{font-family:'Noto Sans TC',var(--kr);}
  body[data-lang="th"]{font-family:'Noto Sans Thai',var(--kr);}
  .gloss, body[data-lang] .gloss{font-family:var(--kr);}

  .stage{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:clamp(16px,3.5vw,48px) clamp(16px,4vw,64px) 92px;}
  .slide{display:none; width:100%; max-width:var(--maxw); max-height:100%; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:0 18px 48px -28px rgba(20,40,32,.35); padding:clamp(28px,4.4vw,60px); overflow-y:auto; animation:fade .42s ease both;}
  .slide.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
  @media(prefers-reduced-motion:reduce){.slide{animation:none;}}

  .eyebrow{display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap;}
  .badge{font-size:.82rem; font-weight:700; color:var(--green-deep); background:var(--green-soft); border:1px solid #cfe0d8; padding:5px 12px; border-radius:999px;}
  .sidx{font-size:.78rem; font-weight:600; color:var(--ink-faint); letter-spacing:.06em;}
  h2{font-size:clamp(1.55rem,3.4vw,2.35rem); line-height:1.25; font-weight:800; letter-spacing:-.01em; color:var(--ink);}
  h2 .accent{color:var(--green);}
  .kicker{font-size:.82rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--amber); margin-bottom:10px;}

  .body{margin-top:20px;}
  .body p{font-size:clamp(1.04rem,1.6vw,1.22rem); color:var(--ink-soft); margin-bottom:14px;}
  .body strong{color:var(--ink); font-weight:700;}
  .hl{color:var(--green-deep); font-weight:700; background:linear-gradient(transparent 58%, #cfe7dd 58%); padding:0 2px;}
  .hl-amber{color:var(--amber-deep); font-weight:700; background:linear-gradient(transparent 58%, var(--amber-soft) 58%); padding:0 2px;}
  .lead{font-size:clamp(1.12rem,1.9vw,1.4rem)!important; color:var(--ink)!important; font-weight:600; line-height:1.5;}

  .gloss{font-family:var(--kr); font-size:.8rem; color:var(--ink-faint); line-height:1.45; margin:-8px 0 14px; opacity:.85;}
  .gloss.h2g{font-size:.92rem; font-weight:600; margin:8px 0 0;}
  .gloss.kg{margin:-2px 0 10px;}

  .case{border-left:3px solid var(--amber); background:#fbf7f1; padding:14px 18px; border-radius:0 12px 12px 0; margin:18px 0;}
  .case .tag{font-size:.74rem; font-weight:700; letter-spacing:.06em; color:var(--amber); text-transform:uppercase; margin-bottom:6px; display:flex; align-items:center; gap:7px;}
  .case .tag .ic{width:18px;height:18px;}
  .case p{font-size:clamp(.98rem,1.5vw,1.12rem); margin-bottom:8px;}
  .case .gloss{margin:-4px 0 8px;}

  .note{font-size:.92rem!important; color:var(--ink-faint)!important; border-top:1px dashed var(--line-strong); padding-top:12px; margin-top:16px;}

  /* pictogram */
  .ic{display:inline-flex; align-items:center; justify-content:center;}
  .ic svg{width:100%; height:100%; display:block;}
  .icbubble{display:inline-flex; align-items:center; justify-content:center; border-radius:50%; background:var(--green-soft); color:var(--green-deep); flex:none;}
  .icbubble.amber{background:var(--amber-soft); color:var(--amber-deep);}
  .icbubble .ic{width:58%; height:58%;}

  /* iconrow: grid of pictogram cards */
  .iconrow{display:grid; gap:12px; margin:18px 0; grid-template-columns:repeat(3,1fr);}
  .iconrow.c2{grid-template-columns:repeat(2,1fr);}
  .iconrow.c4{grid-template-columns:repeat(4,1fr);}
  .iitem{display:flex; flex-direction:column; align-items:center; text-align:center; gap:9px; padding:16px 12px; border:1px solid var(--line); border-radius:13px; background:#fafcfb;}
  .iitem .icbubble{width:46px; height:46px;}
  .iitem .lbl{font-size:.95rem; font-weight:700; color:var(--ink); line-height:1.35;}
  .iitem .lbl .gloss{font-weight:400; margin:4px 0 0;}
  @media(max-width:640px){.iconrow,.iconrow.c4{grid-template-columns:repeat(2,1fr);}}

  /* iconlist: vertical pictogram steps */
  .iconlist{margin:18px 0; display:flex; flex-direction:column; gap:10px;}
  .iconlist .row{display:flex; gap:14px; align-items:flex-start; border:1px solid var(--line); border-radius:12px; padding:14px 16px; background:#fafcfb;}
  .iconlist .row.amber{background:#fbf7f1; border-color:#ecd6b6;}
  .iconlist .row .icbubble{width:40px; height:40px;}
  .iconlist .row .c{flex:1;}
  .iconlist .row .h{font-size:1.02rem; font-weight:800; color:var(--green-deep); margin-bottom:3px;}
  .iconlist .row.amber .h{color:var(--amber-deep);}
  .iconlist .row .d{font-size:.97rem; color:var(--ink-soft);}
  .iconlist .row .gloss{margin:5px 0 0;}

  /* capsule pill callout */
  .pill{display:flex; align-items:center; gap:16px; padding:16px 18px; border-radius:14px; background:var(--green-soft); border:1px solid #cfe0d8; margin:16px 0;}
  .pill.amber{background:var(--amber-soft); border-color:#ecd6b6;}
  .pill .cap{width:62px; height:32px; border-radius:16px; background:var(--green); color:#fff; font-weight:800; font-size:1.15rem; letter-spacing:.04em; display:flex; align-items:center; justify-content:center; flex:none; box-shadow:inset 0 -2px 6px rgba(0,0,0,.12);}
  .pill.amber .cap{background:var(--amber);}
  .pill .meta .name{font-weight:800; font-size:1.12rem; color:var(--ink);}
  .pill .meta .sub{font-size:.95rem; color:var(--ink-soft);}
  .pill .meta .gloss{margin:3px 0 0;}

  .duo{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:18px 0;}
  .duo.one{grid-template-columns:1fr;}
  .duo .card{border:1px solid var(--line); border-radius:12px; padding:16px; background:#fafcfb;}
  .duo .card .icbubble{width:42px; height:42px; margin-bottom:10px;}
  .duo .card h4{font-size:1.04rem; font-weight:800; margin-bottom:8px; color:var(--green-deep);}
  .duo .card p{font-size:.99rem; margin-bottom:0;}
  .duo .card .gloss{margin:6px 0 0;}
  @media(max-width:640px){.duo{grid-template-columns:1fr;}}

  .chips{display:flex; flex-wrap:wrap; gap:8px; margin:14px 0;}
  .chip{font-size:.92rem; font-weight:600; color:var(--green-deep); background:var(--green-soft); border:1px solid #cfe0d8; padding:6px 12px; border-radius:8px;}
  .chip.warn{color:var(--amber-deep); background:var(--amber-soft); border-color:#ecd6b6;}

  /* dose calculator */
  .dosecalc{background:var(--green-deep); color:#eaf4ef; border-radius:14px; padding:20px 18px; margin:18px 0;}
  .dosecalc .tag{font-size:.74rem; font-weight:700; letter-spacing:.06em; color:#f3c98a; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:7px;}
  .dosecalc .tag .ic{width:18px;height:18px;}
  .dosecalc p{font-size:clamp(1rem,1.5vw,1.16rem); color:#eaf4ef!important; margin-bottom:0;}
  .dosecalc .times{font-weight:800; color:#f3c98a; font-size:1.15em;}
  .dosecalc .gloss{color:#bcd3c8; opacity:.85; margin:8px 0 0;}
  .inl{font-family:inherit; font-weight:800; color:#1d4636; border:none; border-bottom:2px solid var(--amber); background:#f3c98a; width:2.6em; text-align:center; font-size:1em; padding:1px 2px; border-radius:6px 6px 0 0;}
  .inl:focus{outline:none; border-bottom-color:#fff;}

  .cover{text-align:center;}
  .cover .mark{font-size:.9rem; font-weight:700; letter-spacing:.22em; color:var(--green); text-transform:uppercase; margin-bottom:22px;}
  .cover .rule{width:54px; height:3px; background:var(--amber); border-radius:2px; margin:0 auto 22px;}
  .cover h1{font-size:clamp(1.7rem,4.4vw,2.8rem); font-weight:800; line-height:1.22; letter-spacing:-.02em; margin-bottom:18px;}
  .cover h1 .accent{color:var(--green);}
  .cover .who{font-size:clamp(1.05rem,2vw,1.3rem); color:var(--ink-soft); font-weight:600;}
  .cover .sub{font-size:1.02rem; color:var(--ink-faint); margin-top:24px;}
  .cover .gloss{text-align:center;}

  .setup{display:flex; gap:18px; justify-content:center; flex-wrap:wrap; margin:20px 0 8px;}
  .field{display:flex; flex-direction:column; align-items:center; gap:5px;}
  .field label{font-size:.76rem; font-weight:700; color:var(--ink-faint);}
  .field input{font-family:inherit; font-size:1.05rem; font-weight:700; color:var(--green-deep); border:none; border-bottom:2px solid var(--line-strong); background:transparent; padding:5px 8px; width:160px; text-align:center;}
  .field input:focus{outline:none; border-bottom-color:var(--green);}

  .bar{position:fixed; left:0; right:0; bottom:0; height:64px; display:flex; align-items:center; gap:12px; padding:0 clamp(14px,3vw,28px); background:rgba(255,255,255,.92); backdrop-filter:blur(8px); border-top:1px solid var(--line); z-index:30;}
  .progress{position:absolute; top:0; left:0; height:3px; background:var(--green); transition:width .3s ease;}
  .btn{appearance:none; border:1px solid var(--line-strong); background:#fff; color:var(--ink); font-family:inherit; font-weight:600; font-size:.95rem; height:40px; min-width:40px; padding:0 14px; border-radius:10px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:6px;}
  .btn:hover{background:var(--green-soft); border-color:#bcd5ca;}
  .btn:focus-visible{outline:3px solid #94c4b1; outline-offset:2px;}
  .btn.icon{padding:0; width:40px;}
  .langsel{height:40px; border:1px solid var(--line-strong); border-radius:10px; background:#fff; font-family:inherit; font-weight:700; font-size:.92rem; color:var(--green-deep); padding:0 10px; cursor:pointer;}
  .counter{font-size:.92rem; font-weight:700; min-width:58px; text-align:center;}
  .counter .total{color:var(--ink-faint); font-weight:600;}
  .spacer{flex:1;}
  .pagetag{font-size:.82rem; font-weight:700; color:var(--green-deep); background:var(--green-soft); border:1px solid #cfe0d8; padding:5px 11px; border-radius:999px;}

  .toc-backdrop{position:fixed; inset:0; background:rgba(16,30,24,.5); display:none; z-index:40; align-items:center; justify-content:center; padding:20px;}
  .toc-backdrop.open{display:flex;}
  .toc{background:#fff; border-radius:16px; width:min(560px,100%); max-height:80vh; overflow-y:auto; padding:22px 22px 26px; box-shadow:0 24px 60px -20px rgba(16,30,24,.5);}
  .toc h3{font-size:1.05rem; margin-bottom:4px;}
  .toc .hint{font-size:.85rem; color:var(--ink-faint); margin-bottom:14px;}
  .toc-group{margin-bottom:14px;}
  .toc-group .gl{font-size:.76rem; font-weight:700; letter-spacing:.06em; color:var(--amber); text-transform:uppercase; margin-bottom:6px;}
  .toc-item{display:flex; gap:10px; align-items:baseline; padding:8px 10px; border-radius:9px; cursor:pointer;}
  .toc-item:hover{background:var(--green-soft);}
  .toc-item .n{font-size:.78rem; font-weight:700; color:var(--ink-faint); min-width:30px;}
  .toc-item .t{font-size:.96rem;}

  @media(max-width:600px){.btn .lbl{display:none;}}
</style>
</head>
<body data-lang="ko">

<main class="stage" id="stage"></main>

<div class="bar">
  <div class="progress" id="progress"></div>
  <button class="btn icon" id="prev">←</button>
  <button class="btn icon" id="next">→</button>
  <span class="counter"><span id="cur">1</span> <span class="total">/ <span id="tot">15</span></span></span>
  <span class="spacer"></span>
  <span class="pagetag" id="pagetag"></span>
  <select class="langsel" id="lang" aria-label="언어 / Language">
    <option value="ko">한국어</option>
    <option value="ja">日本語</option>
    <option value="en">English</option>
    <option value="zh-cn">简体中文</option>
    <option value="zh-tw">繁體中文</option>
    <option value="th">ภาษาไทย</option>
  </select>
  <button class="btn" id="speakBtn">🔊<span class="lbl" id="speakLbl"> 듣기</span></button>
  <button class="btn" id="tocBtn">☰<span class="lbl" id="tocLbl"> 목차</span></button>
  <button class="btn" id="fsBtn">⤢<span class="lbl" id="fsLbl"> 전체화면</span></button>
</div>

<div class="toc-backdrop" id="tocBackdrop">
  <div class="toc" role="dialog">
    <h3 id="tocTitle"></h3>
    <p class="hint" id="tocHint"></p>
    <div id="tocList"></div>
  </div>
</div>

<script>
// ---------- pictograms (inline SVG) ----------
const PICTO = {
  capsule:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2.5" y="8" width="19" height="8" rx="4"/><line x1="12" y1="8" x2="12" y2="16"/></svg>`,
  fullness:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 11h17a8.5 8.5 0 0 1-17 0Z"/><path d="M6 11a6 6 0 0 1 12 0"/></svg>`,
  metabolism:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3c3 4 5 6 5 9a5 5 0 0 1-10 0c0-1.2.6-2.3 1.6-3.3C9.5 10 11 8 12 3Z"/></svg>`,

  appetite:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v6M5 3v4a2 2 0 0 0 4 0V3M7 9v12"/><path d="M15 3c-1.5 1.5-2 3-2 5s.5 2.5 2 2.5V21"/></svg>`,
  scale:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 12l4-4"/></svg>`,
  water:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3c4 5 6 8 6 11a6 6 0 0 1-12 0c0-3 2-6 6-11Z"/></svg>`,
  noCoffee:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h12v4a6 6 0 0 1-12 0V8Z"/><path d="M16 9h2a2.5 2.5 0 0 1 0 5h-2"/><line x1="3" y1="21" x2="21" y2="3"/></svg>`,

  clock:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>`,

  digest:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12a8 8 0 1 1-2.34-5.66"/><path d="M20 4v4h-4"/></svg>`,
  warn:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 2.5 20h19L12 4Z"/><line x1="12" y1="10" x2="12" y2="14.5"/><circle cx="12" cy="17.5" r=".7" fill="currentColor" stroke="none"/></svg>`,
  thermo:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 5a2 2 0 0 1 4 0v8.2a4 4 0 1 1-4 0V5Z"/><line x1="12" y1="9" x2="12" y2="14"/></svg>`,
  sweat:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M8 4c3 4 4.2 6 4.2 8a4.2 4.2 0 0 1-8.4 0c0-2 1.2-4 4.2-8Z"/><path d="M17.5 11c1.4 2 1.9 3 1.9 4a2 2 0 0 1-3.8 0c0-1 .5-2 1.9-4Z"/></svg>`,
  thirst:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10l-1 4H8L7 4Z"/><path d="M8 8c1 3 1 6 1 8a3 3 0 0 0 6 0c0-2 0-5 1-8"/><path d="M9 13h6"/></svg>`,
  heart:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-7-4.4-9-9a4.5 4.5 0 0 1 9-1.2A4.5 4.5 0 0 1 21 11c-2 4.6-9 9-9 9Z"/><path d="M3 12.5h3l1.3-2.3 2 4 1.4-2.2H21"/></svg>`,
  dizzy:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 9l1.5 1.5M10.5 9 9 10.5M13.5 9 15 10.5M15 9l-1.5 1.5"/><path d="M8 16c1-1.3 2.5-1.3 4 0s3 1.3 4 0"/></svg>`,
  juice:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1.1 11a1 1 0 0 1-1 .9H8.1a1 1 0 0 1-1-.9L6 8Z"/><path d="M9 8 8.2 4H15"/><line x1="14.5" y1="3" x2="16.5" y2="6"/></svg>`,
  shield:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4-3 7-7 8-4-1-7-4-7-8V6l7-3Z"/></svg>`,
  photo:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6.5" width="18" height="13" rx="2.5"/><circle cx="12" cy="13" r="3.2"/><path d="M8.5 6.5 10 4h4l1.5 2.5"/></svg>`,
  hospital:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M12 8v8M8 12h8"/></svg>`,

let idx = 0;
let lang = "ko";
const STATE = { patient:"", doctor:"", wake:8 };

function esc(s){ return (s==null?"":String(s)).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function strip(html){ return html.replace(/<br\s*\/?>/gi,' ').replace(/<[^>]+>/g,'').trim(); }

// greeting
function docName(){ return STATE.doctor.trim() || "___"; }
function greetMain(lg){
  const p=STATE.patient.trim(), d=docName(), P=esc(p), D=esc(d);
  if(lg==="ja") return (p?P+"様、":"")+"こんにちは。担当医の"+D+"です。";
  if(lg==="en") return (p?P+", ":"")+"hello. I'm Dr. "+D+", and I'll explain how to take your medication.";
  if(lg==="zh-cn") return (p?P+"，":"")+"您好。我是您的主治医师"+D+"。";
  if(lg==="zh-tw") return (p?P+"，":"")+"您好。我是您的主治醫師"+D+"。";
  if(lg==="th") return (p?"คุณ"+P+" ":"")+"สวัสดีครับ ผมเป็นแพทย์ผู้ดูแลของคุณ "+D;
  return (p?P+"님, ":"")+"안녕하세요. 담당의 "+D+"입니다.";
}
function updateGreet(){
  const g=document.getElementById('greet'); if(!g) return;
  g.innerHTML=greetMain(lang);
  const nx=g.nextElementSibling;
  if(lang!=="ko" && nx && nx.classList.contains('gloss')) nx.innerHTML=strip(greetMain("ko"));
}

// ---------- translation merge ----------
function trNodes(s){
  const o=[];
  if(s.cover){ o.push(s.h1); o.push(s.sub); return o; }
  if(s.kicker) o.push(s.kicker);
  o.push(s.h2);
  s.body.forEach(function(b){
    if(b.t==='p'||b.t==='lead'||b.t==='note') o.push(b.v);
    else if(b.t==='case'){ o.push(b.tag); b.ps.forEach(function(p){o.push(p);}); }
    else if(b.t==='duo'){ b.cards.forEach(function(c){o.push(c.h4);o.push(c.p);}); }
    else if(b.t==='chips'){ b.items.forEach(function(c){o.push(c);}); }
    else if(b.t==='iconrow'){ b.items.forEach(function(c){o.push(c.label);}); }
    else if(b.t==='iconlist'){ b.items.forEach(function(c){o.push(c.h4);o.push(c.desc);}); }
    else if(b.t==='pill'){ o.push(b.name); o.push(b.sub); }
  });
  return o;
}

function applyTR(){
  SLIDES.forEach(function(s){
    const t=TR[s.id]; if(!t) return;
    const nodes=trNodes(s);
    Object.keys(t).forEach(function(L){
      const arr=t[L]; if(!arr) return;
      nodes.forEach(function(node,i){ if(arr[i]!=null) node[L]=arr[i]; });
    });
  });
}
applyTR();

// ---------- voice (text-to-speech) ----------
const SPEECH_LANG={ko:'ko-KR',ja:'ja-JP',en:'en-US','zh-cn':'zh-CN','zh-tw':'zh-TW',th:'th-TH'};
let speaking=false, voices=[];
function loadVoices(){ try{ voices=window.speechSynthesis.getVoices()||[]; }catch(e){ voices=[]; } }
function pickVoice(code){ if(!voices.length) loadVoices(); const pre=code.split('-')[0].toLowerCase();
  let v=voices.find(function(x){return x.lang&&x.lang.toLowerCase()===code.toLowerCase();});
  if(!v) v=voices.find(function(x){return x.lang&&x.lang.toLowerCase().indexOf(pre)===0;}); return v||null; }
function clean(t){ return strip(t).replace(/\s+/g,' ').trim(); }
function getSpeechText(s){
  const parts=[];
  if(s.cover){ parts.push(clean(L(s.h1))); parts.push(clean(greetMain(lang))); parts.push(clean(L(s.sub))); return parts.filter(Boolean).join('. '); }
  parts.push(clean(L(s.h2)));
  s.body.forEach(function(b){
    if(b.t==='p'||b.t==='lead'||b.t==='note') parts.push(clean(L(b.v)));
    else if(b.t==='case'){ parts.push(clean(L(b.tag))); b.ps.forEach(function(p){parts.push(clean(L(p)));}); }
    else if(b.t==='duo'){ b.cards.forEach(function(c){ parts.push(clean(L(c.h4))); parts.push(clean(L(c.p))); }); }
    else if(b.t==='chips'){ b.items.forEach(function(c){ parts.push(clean(L(c))); }); }
    else if(b.t==='iconrow'){ b.items.forEach(function(c){ parts.push(clean(L(c.label))); }); }
    else if(b.t==='iconlist'){ b.items.forEach(function(c){ parts.push(clean(L(c.h4))); parts.push(clean(L(c.desc))); }); }
    else if(b.t==='pill'){ parts.push(clean(L(b.name))); parts.push(clean(L(b.sub))); }
    else if(b.t==='doseS'){ const d=DOSE_S[lang]||DOSE_S.ko, w=curWake(); parts.push(clean(d.pre+w+d.mid+doseTimes(w,', ')+d.post)); }
  });
  return parts.filter(Boolean).join('. ');
}
function updateSpeakBtn(){ const btn=document.getElementById('speakBtn'); if(!btn) return; const lbl=document.getElementById('speakLbl');
  if(btn.firstChild) btn.firstChild.nodeValue = speaking ? '\u23F9' : '\uD83D\uDD0A';
  if(lbl) lbl.textContent=' '+(speaking?L(UI.stop):L(UI.listen)); }
function stopSpeak(){ try{ if(typeof window!=='undefined'&&window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){} speaking=false; updateSpeakBtn(); }
function speakCurrent(){
  if(typeof window==='undefined'||!('speechSynthesis' in window)){ return; }
  try{ window.speechSynthesis.cancel(); }catch(e){}
  const text=getSpeechText(SLIDES[idx]); if(!text){ return; }
  const u=new SpeechSynthesisUtterance(text); const code=SPEECH_LANG[lang]||'ko-KR';
  u.lang=code; const v=pickVoice(code); if(v) u.voice=v; u.rate=0.98; u.pitch=1;
  u.onend=function(){ speaking=false; updateSpeakBtn(); };
  u.onerror=function(){ speaking=false; updateSpeakBtn(); };
  speaking=true; updateSpeakBtn(); window.speechSynthesis.speak(u);
}
function toggleSpeak(){ if(speaking) stopSpeak(); else speakCurrent(); }
if(typeof window!=='undefined' && 'speechSynthesis' in window){ try{ window.speechSynthesis.onvoiceschanged=loadVoices; loadVoices(); }catch(e){} }

// ---------- render ----------
const stage = document.getElementById('stage');
const total = SLIDES.length;
document.getElementById('tot').textContent = total;

function L(obj){ return obj[lang] || obj.ko; }
function gloss(obj, cls){ if(lang==="ko") return ""; return '<div class="gloss '+(cls||'')+'">'+strip(obj.ko)+'</div>'; }
function bubble(key,amber){ return '<span class="icbubble'+(amber?' amber':'')+'"><span class="ic">'+(PICTO[key]||'')+'</span></span>'; }

function renderBlock(b){
  if(b.t==="p")    return '<p>'+L(b.v)+'</p>'+gloss(b.v);
  if(b.t==="lead") return '<p class="lead">'+L(b.v)+'</p>'+gloss(b.v);
  if(b.t==="note") return '<p class="note">'+L(b.v)+'</p>'+gloss(b.v,'kg');
  if(b.t==="case"){
    let h='<div class="case"><div class="tag">'+(b.ic?'<span class="ic">'+(PICTO[b.ic]||'')+'</span>':'')+L(b.tag)+'</div>';
    b.ps.forEach(function(p){ h+='<p>'+L(p)+'</p>'+gloss(p); });
    return h+'</div>';
  }
  if(b.t==="duo"){
    let h='<div class="duo'+(b.cols===1?' one':'')+'">';
    b.cards.forEach(function(c){ h+='<div class="card">'+(c.p?bubble(c.p):'')+'<h4>'+L(c.h4)+'</h4>'+gloss(c.h4,'kg')+'<p>'+L(c.p_||c.p)+'</p>'+gloss(c.p_||c.p)+'</div>'; });
    return h+'</div>';
  }
  if(b.t==="chips"){
    let h='<div class="chips">';
    b.items.forEach(function(c){ h+='<span class="chip'+(b.warn?' warn':'')+'">'+L(c)+'</span>'; });
    return h+'</div>';
  }
  if(b.t==="iconrow"){
    let cls='iconrow'+(b.c2?' c2':'')+(b.c4?' c4':'');
    let h='<div class="'+cls+'">';
    b.items.forEach(function(c){ h+='<div class="iitem">'+bubble(c.p,b.warn)+'<div class="lbl">'+L(c.label)+gloss(c.label)+'</div></div>'; });
    return h+'</div>';
  }
  if(b.t==="iconlist"){
    let h='<div class="iconlist">';
    b.items.forEach(function(c){ h+='<div class="row'+(c.amber?' amber':'')+'">'+bubble(c.p,c.amber)+'<div class="c"><div class="h">'+L(c.h4)+'</div>'+gloss(c.h4,'kg')+'<div class="d">'+L(c.desc)+'</div>'+gloss(c.desc)+'</div></div>'; });
    return h+'</div>';
  }
  if(b.t==="pill"){
    let h='<div class="pill'+(b.amber?' amber':'')+'"><div class="cap">'+b.cap+'</div><div class="meta"><div class="name">'+L(b.name)+'</div>'+gloss(b.name,'kg')+'<div class="sub">'+L(b.sub)+'</div>'+gloss(b.sub)+'</div></div>';
    return h;
  }
  if(b.t==="doseS"){
    const d=DOSE_S[lang]||DOSE_S.ko, w=curWake();
    let h='<div class="dosecalc"><div class="tag"><span class="ic">'+PICTO.clock+'</span>'+d.tag+'</div>';
    h+='<p>'+d.pre+'<input id="inWake" class="inl" type="number" min="0" max="23" value="'+w+'">'+d.mid+'<span class="times" id="doseTimes">'+doseTimes(w,'·')+'</span>'+d.post+'</p>';
    if(lang!=="ko") h+='<div class="gloss" id="doseGlossS">'+doseGlossKo(w)+'</div>';
    return h+'</div>';
  }
  return "";
}

function pageLabel(s){ return {txt:L(PAGES[s.page].label)}; }

function buildStage(){
  let html='';
  SLIDES.forEach(function(s,i){
    html+='<section class="slide'+(i===idx?' active':'')+(s.cover?' cover':'')+'">';
    if(s.cover){
      html+='<div class="mark">'+s.mark+'</div><div class="rule"></div>';
      html+='<h1>'+L(s.h1)+'</h1>'+gloss(s.h1,'h2g');
      html+='<div class="setup">';
      html+='<div class="field"><label>'+L(UI.patientLabel)+'</label><input id="inPatient" type="text" value="'+esc(STATE.patient)+'" placeholder="'+L(UI.patientPh)+'"></div>';
      html+='<div class="field"><label>'+L(UI.doctorLabel)+'</label><input id="inDoctor" type="text" value="'+esc(STATE.doctor)+'" placeholder="'+L(UI.doctorPh)+'"></div>';
      html+='</div>';
      html+='<p class="who" id="greet">'+greetMain(lang)+'</p>';
      if(lang!=="ko") html+='<div class="gloss">'+strip(greetMain("ko"))+'</div>';
      html+='<p class="sub">'+L(s.sub)+'</p>'+gloss(s.sub);
    } else {
      const pg=pageLabel(s);
      html+='<div class="eyebrow"><span class="badge">'+pg.txt+'</span><span class="sidx">'+s.id+'</span></div>';
      if(s.kicker) html+='<div class="kicker">'+L(s.kicker)+'</div>';
      html+='<h2>'+L(s.h2)+'</h2>'+gloss(s.h2,'h2g');
      html+='<div class="body">';
      s.body.forEach(function(b){ html+=renderBlock(b); });
      html+='</div>';
    }
    html+='</section>';
  });
  stage.innerHTML=html;
}

const elCur=document.getElementById('cur'), elTag=document.getElementById('pagetag'), elProg=document.getElementById('progress');
function render(){
  const slides=stage.querySelectorAll('.slide');
  slides.forEach(function(s,i){ s.classList.toggle('active', i===idx); });
  elCur.textContent=idx+1;
  elTag.textContent=pageLabel(SLIDES[idx]).txt;
  elProg.style.width=((idx+1)/total*100)+'%';
  const act=slides[idx]; if(act) act.scrollTop=0;
}
function go(n){ stopSpeak(); idx=Math.max(0,Math.min(total-1,n)); render(); }
function next(){ go(idx+1); } function prev(){ go(idx-1); }

function applyUILabels(){
  document.getElementById('prev').setAttribute('aria-label', L(UI.prevAria));
  document.getElementById('next').setAttribute('aria-label', L(UI.nextAria));
  document.getElementById('tocLbl').textContent=' '+L(UI.toc);
  document.getElementById('fsLbl').textContent=' '+L(UI.fullscreen);
  document.getElementById('tocTitle').textContent=L(UI.tocTitle);
  document.getElementById('tocHint').textContent=L(UI.tocHint);
  updateSpeakBtn();
}

function changeLang(nl){ stopSpeak(); lang=nl; document.body.dataset.lang=lang; document.documentElement.lang=lang; buildStage(); render(); applyUILabels(); buildTOC(); updateSpeakBtn(); }

document.getElementById('next').addEventListener('click', next);
document.getElementById('prev').addEventListener('click', prev);
document.getElementById('lang').addEventListener('change', function(e){ changeLang(e.target.value); });

document.addEventListener('keydown', function(e){
  if(document.getElementById('tocBackdrop').classList.contains('open')){ if(e.key==='Escape') closeToc(); return; }
  if(e.target && (e.target.tagName==='INPUT'||e.target.tagName==='SELECT')) { if(e.key!=='ArrowLeft'&&e.key!=='ArrowRight') return; }
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){ e.preventDefault(); next(); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); prev(); }
  else if(e.key==='Home'){ go(0); } else if(e.key==='End'){ go(total-1); }
  else if(e.key==='f'||e.key==='F'){ toggleFs(); }
  else if(e.key==='s'||e.key==='S'){ toggleSpeak(); }
});
let tx=0,ty=0;
stage.addEventListener('touchstart',function(e){ tx=e.changedTouches[0].clientX; ty=e.changedTouches[0].clientY; },{passive:true});
stage.addEventListener('touchend',function(e){ const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty; if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)){ dx<0?next():prev(); } },{passive:true});

stage.addEventListener('input', function(e){
  const id=e.target.id, v=e.target.value;
  if(id==='inPatient'){ STATE.patient=v; updateGreet(); }
  else if(id==='inDoctor'){ STATE.doctor=v; updateGreet(); }
  else if(id==='inWake'){ STATE.wake=(v===''?'':parseInt(v,10)); updateDose(); }
});

function toggleFs(){ if(!document.fullscreenElement){ (document.documentElement.requestFullscreen||function(){})(); } else { (document.exitFullscreen||function(){})(); } }
document.getElementById('fsBtn').addEventListener('click', toggleFs);
document.getElementById('speakBtn').addEventListener('click', toggleSpeak);

const tocBackdrop=document.getElementById('tocBackdrop');
function openToc(){ tocBackdrop.classList.add('open'); }
function closeToc(){ tocBackdrop.classList.remove('open'); }
document.getElementById('tocBtn').addEventListener('click', openToc);
tocBackdrop.addEventListener('click', function(e){ if(e.target===tocBackdrop) closeToc(); });

function buildTOC(){
  const groups=[], gmap={};
  SLIDES.forEach(function(s,i){
    const key=s.page, gl=pageLabel(s).txt;
    if(!gmap[key]){ gmap[key]={label:gl, items:[]}; groups.push(gmap[key]); }
    const h=s.cover?L(s.h1):L(s.h2);
    gmap[key].items.push({i:i, title:strip(h)});
  });
  let html='';
  groups.forEach(function(g){
    html+='<div class="toc-group"><div class="gl">'+g.label+'</div>';
    g.items.forEach(function(it){ html+='<div class="toc-item" data-go="'+it.i+'"><span class="n">'+SLIDES[it.i].id+'</span><span class="t">'+it.title+'</span></div>'; });
    html+='</div>';
  });
  const list=document.getElementById('tocList');
  list.innerHTML=html;
  list.onclick=function(e){ const it=e.target.closest('.toc-item'); if(it){ go(parseInt(it.getAttribute('data-go'),10)); closeToc(); } };
}

buildStage(); render(); applyUILabels(); buildTOC();
</script>
</body>
</html>
