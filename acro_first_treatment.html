<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Sans+Thai:wght@400;500;700;800&display=swap">
<style>
  :root{
    --bg:#eef2f0; --surface:#ffffff;
    --ink:#16241f; --ink-soft:#46574f; --ink-faint:#7d8c84;
    --green:#2f6b54; --green-deep:#1d4636; --green-soft:#e4efe9;
    --amber:#cf7f33; --amber-soft:#f6ead9;
    --line:#d6dedb; --line-strong:#bcc8c3;
    --radius:18px; --maxw:980px;
    --kr:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
    --jp:'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{font-family:var(--kr); background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.6; overflow:hidden;}
  body[data-lang="ja"]{font-family:var(--jp);}
  body[data-lang="zh-cn"]{font-family:'Noto Sans SC',var(--kr);}
  body[data-lang="zh-tw"]{font-family:'Noto Sans TC',var(--kr);}
  body[data-lang="th"]{font-family:'Noto Sans Thai',var(--kr);}
  .gloss, body[data-lang] .gloss{font-family:var(--kr);}

  .stage{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:clamp(16px,3.5vw,48px) clamp(16px,4vw,64px) 92px;}
  .slide{display:none; width:100%; max-width:var(--maxw); max-height:100%; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:0 18px 48px -28px rgba(20,40,32,.35); padding:clamp(28px,4.4vw,60px); overflow-y:auto; animation:fade .42s ease both;}
  .slide.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
  @media(prefers-reduced-motion:reduce){.slide{animation:none;}}

  .eyebrow{display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap;}
  .badge{font-size:.82rem; font-weight:700; color:var(--green-deep); background:var(--green-soft); border:1px solid #cfe0d8; padding:5px 12px; border-radius:999px;}
  .sidx{font-size:.78rem; font-weight:600; color:var(--ink-faint); letter-spacing:.06em;}
  h2{font-size:clamp(1.55rem,3.4vw,2.35rem); line-height:1.25; font-weight:800; letter-spacing:-.01em; color:var(--ink);}
  h2 .accent{color:var(--green);}
  .kicker{font-size:.82rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--amber); margin-bottom:10px;}

  .body{margin-top:20px;}
  .body p{font-size:clamp(1.04rem,1.6vw,1.22rem); color:var(--ink-soft); margin-bottom:14px;}
  .body strong{color:var(--ink); font-weight:700;}
  .hl{color:var(--green-deep); font-weight:700; background:linear-gradient(transparent 58%, #cfe7dd 58%); padding:0 2px;}
  .hl-amber{color:#9a560f; font-weight:700; background:linear-gradient(transparent 58%, var(--amber-soft) 58%); padding:0 2px;}
  .lead{font-size:clamp(1.12rem,1.9vw,1.4rem)!important; color:var(--ink)!important; font-weight:600; line-height:1.5;}

  .gloss{font-family:var(--kr); font-size:.8rem; color:var(--ink-faint); line-height:1.45; margin:-8px 0 14px; opacity:.85;}
  .gloss.h2g{font-size:.92rem; font-weight:600; margin:8px 0 0;}
  .gloss.kg{margin:-2px 0 10px;}

  .case{border-left:3px solid var(--amber); background:#fbf7f1; padding:14px 18px; border-radius:0 12px 12px 0; margin:18px 0;}
  .case .tag{font-size:.74rem; font-weight:700; letter-spacing:.06em; color:var(--amber); text-transform:uppercase; margin-bottom:6px;}
  .case p{font-size:clamp(.98rem,1.5vw,1.12rem); margin-bottom:8px;}
  .case .gloss{margin:-4px 0 8px;}

  .equation{display:flex; align-items:center; justify-content:center; gap:14px; flex-wrap:wrap; background:var(--green-deep); color:#eaf4ef; border-radius:14px; padding:22px 18px; margin:20px 0;}
  .equation .term{text-align:center;}
  .equation .term .t{font-size:.8rem; opacity:.75;}
  .equation .term .v{font-size:clamp(1.05rem,2.3vw,1.5rem); font-weight:800;}
  .equation .op{font-size:clamp(1.3rem,2.6vw,1.8rem); font-weight:300; opacity:.7;}
  .equation .term.out .v{color:#f3c98a;}

  .duo{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:18px 0;}
  .duo.one{grid-template-columns:1fr;}
  .duo .card{border:1px solid var(--line); border-radius:12px; padding:16px 16px 18px; background:#fafcfb;}
  .duo .card h4{font-size:1.04rem; font-weight:800; margin-bottom:8px; color:var(--green-deep);}
  .duo .card p{font-size:.99rem; margin-bottom:0;}
  .duo .card .gloss{margin:6px 0 0;}
  @media(max-width:640px){.duo{grid-template-columns:1fr;}}

  .chips{display:flex; flex-wrap:wrap; gap:8px; margin:14px 0;}
  .chip{font-size:.92rem; font-weight:600; color:var(--green-deep); background:var(--green-soft); border:1px solid #cfe0d8; padding:6px 12px; border-radius:8px;}
  .chip.warn{color:#9a560f; background:var(--amber-soft); border-color:#ecd6b6;}

  .note{font-size:.92rem!important; color:var(--ink-faint)!important; border-top:1px dashed var(--line-strong); padding-top:12px; margin-top:16px;}

  .cover{text-align:center;}
  .cover .mark{font-size:.9rem; font-weight:700; letter-spacing:.22em; color:var(--green); text-transform:uppercase; margin-bottom:22px;}
  .cover .rule{width:54px; height:3px; background:var(--amber); border-radius:2px; margin:0 auto 22px;}
  .cover h1{font-size:clamp(1.7rem,4.4vw,2.8rem); font-weight:800; line-height:1.22; letter-spacing:-.02em; margin-bottom:18px;}
  .cover h1 .accent{color:var(--green);}
  .cover .who{font-size:clamp(1.05rem,2vw,1.3rem); color:var(--ink-soft); font-weight:600;}
  .cover .sub{font-size:1.02rem; color:var(--ink-faint); margin-top:24px;}
  .cover .gloss{text-align:center;}

  .setup{display:flex; gap:18px; justify-content:center; flex-wrap:wrap; margin:20px 0 8px;}
  .field{display:flex; flex-direction:column; align-items:center; gap:5px;}
  .field label{font-size:.76rem; font-weight:700; color:var(--ink-faint);}
  .field input{font-family:inherit; font-size:1.05rem; font-weight:700; color:var(--green-deep); border:none; border-bottom:2px solid var(--line-strong); background:transparent; padding:5px 8px; width:160px; text-align:center;}
  .field input:focus{outline:none; border-bottom-color:var(--green);}
  .inl{font-family:inherit; font-weight:800; color:var(--green-deep); border:none; border-bottom:2px solid var(--amber); background:var(--amber-soft); width:3em; text-align:center; font-size:1em; padding:1px 2px; border-radius:5px 5px 0 0;}
  .inl:focus{outline:none; border-bottom-color:var(--green);}

  .bar{position:fixed; left:0; right:0; bottom:0; height:64px; display:flex; align-items:center; gap:12px; padding:0 clamp(14px,3vw,28px); background:rgba(255,255,255,.92); backdrop-filter:blur(8px); border-top:1px solid var(--line); z-index:30;}
  .progress{position:absolute; top:0; left:0; height:3px; background:var(--green); transition:width .3s ease;}
  .btn{appearance:none; border:1px solid var(--line-strong); background:#fff; color:var(--ink); font-family:inherit; font-weight:600; font-size:.95rem; height:40px; min-width:40px; padding:0 14px; border-radius:10px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:6px;}
  .btn:hover{background:var(--green-soft); border-color:#bcd5ca;}
  .btn:focus-visible{outline:3px solid #94c4b1; outline-offset:2px;}
  .btn.icon{padding:0; width:40px;}
  .langsel{height:40px; border:1px solid var(--line-strong); border-radius:10px; background:#fff; font-family:inherit; font-weight:700; font-size:.92rem; color:var(--green-deep); padding:0 10px; cursor:pointer;}
  .counter{font-size:.92rem; font-weight:700; min-width:58px; text-align:center;}
  .counter .total{color:var(--ink-faint); font-weight:600;}
  .spacer{flex:1;}
  .pagetag{font-size:.82rem; font-weight:700; color:var(--green-deep); background:var(--green-soft); border:1px solid #cfe0d8; padding:5px 11px; border-radius:999px;}

  .toc-backdrop{position:fixed; inset:0; background:rgba(16,30,24,.5); display:none; z-index:40; align-items:center; justify-content:center; padding:20px;}
  .toc-backdrop.open{display:flex;}
  .toc{background:#fff; border-radius:16px; width:min(560px,100%); max-height:80vh; overflow-y:auto; padding:22px 22px 26px; box-shadow:0 24px 60px -20px rgba(16,30,24,.5);}
  .toc h3{font-size:1.05rem; margin-bottom:4px;}
  .toc .hint{font-size:.85rem; color:var(--ink-faint); margin-bottom:14px;}
  .toc-group{margin-bottom:14px;}
  .toc-group .gl{font-size:.76rem; font-weight:700; letter-spacing:.06em; color:var(--amber); text-transform:uppercase; margin-bottom:6px;}
  .toc-item{display:flex; gap:10px; align-items:baseline; padding:8px 10px; border-radius:9px; cursor:pointer;}
  .toc-item:hover{background:var(--green-soft);}
  .toc-item .n{font-size:.78rem; font-weight:700; color:var(--ink-faint); min-width:30px;}
  .toc-item .t{font-size:.96rem;}

  @media(max-width:600px){.btn .lbl{display:none;}}
</style>
</head>
<body data-lang="ko">

<main class="stage" id="stage"></main>

<div class="bar">
  <div class="progress" id="progress"></div>
  <button class="btn icon" id="prev">←</button>
  <button class="btn icon" id="next">→</button>
  <span class="counter"><span id="cur">1</span> <span class="total">/ <span id="tot">30</span></span></span>
  <span class="spacer"></span>
  <span class="pagetag" id="pagetag"></span>
  <select class="langsel" id="lang" aria-label="언어 / Language">
    <option value="ko">한국어</option>
    <option value="ja">日本語</option>
    <option value="en">English</option>
    <option value="zh-cn">简体中文</option>
    <option value="zh-tw">繁體中文</option>
    <option value="th">ภาษาไทย</option>
  </select>
  <button class="btn" id="tocBtn">☰<span class="lbl" id="tocLbl"> 목차</span></button>
  <button class="btn" id="fsBtn">⤢<span class="lbl" id="fsLbl"> 전체화면</span></button>
</div>

<div class="toc-backdrop" id="tocBackdrop">
  <div class="toc" role="dialog">
    <h3 id="tocTitle"></h3>
    <p class="hint" id="tocHint"></p>
    <div id="tocList"></div>
  </div>
</div>

<script>
const UI = {
  prevAria:{ko:"이전 슬라이드", ja:"前のスライド", en:"Previous slide", "zh-cn":"上一页", "zh-tw":"上一頁", th:"สไลด์ก่อนหน้า"},
  nextAria:{ko:"다음 슬라이드", ja:"次のスライド", en:"Next slide", "zh-cn":"下一页", "zh-tw":"下一頁", th:"สไลด์ถัดไป"},
  toc:{ko:"목차", ja:"目次", en:"Contents", "zh-cn":"目录", "zh-tw":"目錄", th:"สารบัญ"},
  fullscreen:{ko:"전체화면", ja:"全画面", en:"Fullscreen", "zh-cn":"全屏", "zh-tw":"全螢幕", th:"เต็มจอ"},
  bookPrefix:{ko:"책자 ", ja:"テキスト ", en:"Booklet ", "zh-cn":"手册 ", "zh-tw":"手冊 ", th:"หน้า "},
  tocTitle:{ko:"목차 · 빠른 이동", ja:"目次・クイック移動", en:"Contents · Quick jump", "zh-cn":"目录 · 快速跳转", "zh-tw":"目錄 · 快速跳轉", th:"สารบัญ · ไปยังหัวข้อ"},
  tocHint:{ko:"진료 흐름은 책자 페이지 순서가 아닙니다 (의도된 비선형 구성).", ja:"診療の流れはテキストのページ順ではありません（意図的な非線形構成）。", en:"The flow is not the booklet's page order (intentional non-linear structure).", "zh-cn":"讲解顺序并非手册页码顺序（有意的非线性结构）。", "zh-tw":"講解順序並非手冊頁碼順序（刻意的非線性結構）。", th:"ลำดับการอธิบายไม่ใช่ลำดับหน้าหนังสือ (จัดเรียงแบบไม่เป็นเส้นตรงโดยตั้งใจ)"},
  patientLabel:{ko:"환자분 성함", ja:"患者様のお名前", en:"Patient name", "zh-cn":"患者姓名", "zh-tw":"患者姓名", th:"ชื่อผู้ป่วย"},
  patientPh:{ko:"성함 입력", ja:"お名前", en:"Name", "zh-cn":"姓名", "zh-tw":"姓名", th:"ชื่อ"},
  doctorLabel:{ko:"의료진", ja:"担当医", en:"Doctor", "zh-cn":"主治医师", "zh-tw":"主治醫師", th:"แพทย์"},
  doctorPh:{ko:"임주혁", ja:"イム・ジュヒョク", en:"Yim Ju-hyuk", "zh-cn":"任柱赫", "zh-tw":"任柱赫", th:"อิม จูฮยอก"}
};

const PAGES = {
  cover:{book:false, label:{ko:"표지", ja:"表紙", en:"Cover", "zh-cn":"封面", "zh-tw":"封面", th:"หน้าปก"}},
  p1:{book:true, label:{ko:"1p", ja:"1p"}},
  p2:{book:true, label:{ko:"2p", ja:"2p"}},
  p3:{book:true, label:{ko:"3p", ja:"3p"}},
  p4:{book:true, label:{ko:"4p", ja:"4p"}},
  self:{book:false, label:{ko:"셀프모니터링 · 마무리", ja:"セルフモニタリング・まとめ", en:"Self-monitoring", "zh-cn":"自我监测", "zh-tw":"自我監測", th:"การติดตามตนเอง"}},
  p11:{book:true, label:{ko:"11p", ja:"11p"}},
  p5:{book:true, label:{ko:"5p", ja:"5p"}},
  end:{book:false, label:{ko:"마무리", ja:"まとめ", en:"Wrap-up", "zh-cn":"总结", "zh-tw":"總結", th:"สรุป"}}
};

const SLIDES = [
{ id:"S01", page:"cover", cover:true,
  mark:"ACRO KOREAN MEDICINE CLINIC",
  h1:{ko:`지금부터 <span class="accent">다이어트 개념과 약 복용</span><br>설명을 도와드리겠습니다`, ja:`これから<span class="accent">ダイエットの考え方とお薬の飲み方</span>を<br>ご説明します`},
  sub:{ko:`핵심 개념과 방향성을 함께 보겠습니다.`, ja:`核心となる考え方と方向性を一緒に見ていきましょう。`} },

{ id:"S02", page:"p1", kicker:{ko:"1. 다이어트 기본개념", ja:"1. ダイエットの基本概念"},
  h2:{ko:`‘체중감량’은 곧 <span class="accent">‘칼로리 결핍’</span>입니다`, ja:`「体重減少」とはすなわち<span class="accent">「カロリー不足」</span>`},
  body:[
    {t:"p", v:{ko:`다이어트는 약 처방도 중요하지만, <strong>개념과 방향성</strong>이 매우 중요합니다. 한 번 잘 들어두시면 추후에도 도움이 많이 되실 거예요.`, ja:`ダイエットは薬の処方も大切ですが、<strong>考え方と方向性</strong>がとても重要です。一度しっかり理解しておくと、今後も大いに役立ちます。`}},
    {t:"p", v:{ko:`살이 빠지는 것은 운동한다·식단한다·약 먹는다가 아니라, 바로 <span class="hl">칼로리 결핍을 지속해서 유도하는 것</span>입니다.`, ja:`痩せるというのは「運動する・食事制限する・薬を飲む」ことではなく、<span class="hl">カロリー不足を継続して作り出すこと</span>です。`}},
    {t:"p", v:{ko:`이러한 칼로리 결핍은 <strong>6개월 정도</strong>는 지속해서 할 수 있습니다.`, ja:`このカロリー不足は、<strong>6か月ほど</strong>は継続して行えます。`}}
  ]},

{ id:"S03", page:"p1",
  h2:{ko:`3개월부터는 더뎌지고,<br>6개월 이후엔 점점 안 빠질 수 있어요`, ja:`3か月目からは緩やかに、<br>6か月以降は落ちにくくなります`},
  body:[
    {t:"p", v:{ko:`식이조절, 운동, 약물 — <strong>어떤 방식을 진행해도 모두 비슷한 경향</strong>을 보입니다.`, ja:`食事制限、運動、薬物 — <strong>どの方法でも同じような傾向</strong>を示します。`}},
    {t:"p", v:{ko:`왜 그럴까요? 바로 <span class="hl">‘실천’ 문제</span>입니다. 기초대사량이 떨어지거나, 약에 내성이 생겨서 그런 것이 아닙니다.`, ja:`なぜでしょう？ それは<span class="hl">「実践」の問題</span>です。基礎代謝が落ちたり、薬に耐性ができたからではありません。`}},
    {t:"case", tag:{ko:"연구 이야기", ja:"研究のお話"}, ps:[
      {ko:`실제로 요요 없이 <strong>두 번 연속 감량을 성공</strong>시킨 연구가 있었는데요, 바로 <span class="hl-amber">금전적인 대가</span>를 주었습니다.`, ja:`実際に、リバウンドなく<strong>2回連続で減量を成功</strong>させた研究があります。その方法は<span class="hl-amber">金銭的な報酬</span>でした。`},
      {ko:`신체 반응보다 <strong>동기부여</strong>가 대단히 중요하다는 반증입니다. 장기전에서는 더더욱 그래요.`, ja:`身体の反応より<strong>モチベーション</strong>が非常に重要だという証拠です。長期戦ではなおさらです。`}
    ]}
  ]},

{ id:"S04", page:"p1",
  h2:{ko:`칼로리 결핍이란<br>무엇일까요?`, ja:`カロリー不足とは<br>何でしょうか？`},
  body:[
    {t:"lead", v:{ko:`칼로리 섭취량보다 소비량이 많은 상태입니다.`, ja:`カロリー摂取量より消費量が多い状態です。`}},
    {t:"p", v:{ko:`먹는 것보다 나가는 게 많으면 살이 빠집니다.`, ja:`食べる量より出ていく量が多ければ痩せます。`}},
    {t:"eq", terms:[{t:{ko:"섭취",ja:"摂取"},v:{ko:"먹는 것",ja:"食べる量"}},{t:{ko:"소비",ja:"消費"},v:{ko:"나가는 것",ja:"出ていく量"}},{t:{ko:"결과",ja:"結果"},v:{ko:"감량",ja:"減量"},out:true}], ops:["&lt;","→"]},
    {t:"p", v:{ko:`그런데 문제는, 사람들이 여기에 영향을 미치는 요인이 다양하다고 생각합니다 — <strong>체질, 장내세균, 나이, 근육량, 기초대사량</strong> 등등.`, ja:`ところが問題は、ここに影響する要因が多いと考えてしまうことです — <strong>体質、腸内細菌、年齢、筋肉量、基礎代謝</strong>など。`}}
  ]},

{ id:"S05", page:"p1",
  h2:{ko:`이 중에 중요한 것이 있을까요?<br><span class="accent">사실 없습니다.</span>`, ja:`この中に重要なものは？<br><span class="accent">実はありません。</span>`},
  body:[
    {t:"p", v:{ko:`<strong>기초대사량</strong>은 측정도 어렵고, 20살부터 60살까지 그대로라는 연구도 있습니다. 생명 유지장치에 가까워서 체중을 움직이는 큰 변수로 보기 어렵습니다.`, ja:`<strong>基礎代謝</strong>は測定も難しく、20歳から60歳まで変わらないという研究もあります。生命維持装置に近く、体重を動かす大きな変数とは言えません。`}},
    {t:"p", v:{ko:`<strong>근육량</strong>도 비슷합니다. 근육이 부족해져서 갑자기 살이 쪘다고 보기는 어렵죠.`, ja:`<strong>筋肉量</strong>も同様です。筋肉が減って急に太ったとは考えにくいですね。`}},
    {t:"p", v:{ko:`<strong>나이</strong>는 아쉽지만 바꿀 수 없고, <strong>장내세균</strong>도 10년 넘게 연구했지만 아직 살을 빼준다고 보긴 어렵습니다. <strong>체질</strong>도 관리하면 좋지만, 갑자기 체질이 바뀌어 살쪘다고 보긴 힘들죠.`, ja:`<strong>年齢</strong>は残念ながら変えられず、<strong>腸内細菌</strong>も10年以上研究されていますが、まだ痩せさせるとは言えません。<strong>体質</strong>も管理できれば良いですが、急に体質が変わって太ったとは考えにくいでしょう。`}}
  ]},

{ id:"S06", page:"p1",
  h2:{ko:`여러 변수 말고,<br>딱 <span class="accent">2가지</span>만 집중하세요`, ja:`多くの変数ではなく、<br>たった<span class="accent">2つ</span>だけに集中`},
  body:[
    {t:"duo", cols:2, cards:[
      {h4:{ko:"① 식이조절",ja:"① 食事制限"}, p:{ko:`둘 중 <strong>더 중요한 쪽.</strong> 결국 여기서 승부가 납니다.`, ja:`2つのうち<strong>より重要な方。</strong>結局ここで勝負が決まります。`}},
      {h4:{ko:"② 운동",ja:"② 運動"}, p:{ko:`몸에 좋고 무조건 좋지만, 칼로리 소비를 급격히 늘리긴 생각보다 어렵습니다.`, ja:`体に良く、絶対に良いですが、カロリー消費を急に増やすのは思ったより難しいです。`}}
    ]},
    {t:"p", v:{ko:`하루를 잘 살면 약 <span class="hl-amber">1,800kcal(여성)·2,000kcal(남성)</span>를 소비한다고 할 때, 한 시간 운동을 추가하면 <span class="hl-amber">300~400kcal</span> 정도가 더해진다고 보시면 됩니다.`, ja:`1日をしっかり過ごすと約<span class="hl-amber">1,800kcal（女性）・2,000kcal（男性）</span>を消費すると仮定すると、1時間の運動で<span class="hl-amber">300〜400kcal</span>ほどが加わると考えてください。`}},
    {t:"p", v:{ko:`운동은 좋지만, <span class="hl">칼로리 소비량은 사실상 ‘고정값’</span>이라고 가정하면 유리해집니다.`, ja:`運動は良いですが、<span class="hl">カロリー消費量は事実上「固定値」</span>と仮定すると有利になります。`}}
  ]},

{ id:"S07", page:"p1",
  h2:{ko:`섭취는 ‘변수’,<br>소비는 ‘고정값’`, ja:`摂取は「変数」、<br>消費は「固定値」`},
  body:[
    {t:"p", v:{ko:`먹는 것은 굶으면 0kcal, 많이 먹으면 <span class="hl-amber">4~5,000kcal</span> — 하루 <strong>1,000kcal 이상</strong> 왔다 갔다 합니다.`, ja:`食べる量は、断食すれば0kcal、たくさん食べれば<span class="hl-amber">4〜5,000kcal</span> — 1日<strong>1,000kcal以上</strong>変動します。`}},
    {t:"p", v:{ko:`섭취량은 크게 출렁이는 변수, 소비량은 상대적으로 고정값인데, “내일 운동하면 되지” 하며 2~3,000kcal 더 먹고 3~400kcal 태우면 좋지 않겠죠?`, ja:`摂取量は大きく揺れる変数、消費量は比較的固定値なのに、「明日運動すればいい」と2〜3,000kcal多く食べて3〜400kcal燃やしても割に合いませんよね。`}},
    {t:"lead", v:{ko:`그래서 체중의 원인을 <span class="hl">‘먹는 것’ 하나로 좁힙니다.</span>`, ja:`だから体重の原因を<span class="hl">「食べること」一つに絞ります。</span>`}},
    {t:"p", v:{ko:`살쪘으면? 먹었구나. 먹는 것 줄이면? 빠지는구나! 여기서만 왔다 갔다 하면 됩니다. 인과관계를 하나로 좁혔습니다.`, ja:`太ったら？ 食べたんだ。食べる量を減らしたら？ 痩せるんだ！ ここだけを行き来すればいい。因果関係を一つに絞りました。`}}
  ]},

{ id:"S08", page:"p1",
  h2:{ko:`“똑같이 먹었는데<br>왜 살쪘지?”`, ja:`「同じだけ食べたのに、<br>なぜ太った？」`},
  body:[
    {t:"p", v:{ko:`단순해 보이는데, 사람들이 이게 잘 안 됩니다. “나 많이 안 먹었는데? 예전엔 이 정도면 잘 빠졌는데?” 하며 인과관계에서 벗어나죠. “나이살인가? 기초대사량이 떨어졌나?” 생각이 또 튑니다.`, ja:`単純に見えて、これが意外とできません。「そんなに食べてないのに？ 昔はこのくらいで痩せたのに？」と因果関係から外れます。「歳のせい？ 基礎代謝が落ちた？」と考えが飛びます。`}},
    {t:"p", v:{ko:`오래 연구한 답은 생각보다 싱겁습니다. <span class="hl">‘똑같이 안 먹었는데 본인은 몰랐다’</span>는 겁니다.`, ja:`長年研究した答えは意外と単純です。<span class="hl">「同じだけ食べていないのに、本人が気づいていなかった」</span>のです。`}},
    {t:"case", tag:{ko:"비유", ja:"たとえ"}, ps:[
      {ko:`마치 “이번 달 신용카드값 왜 이렇게 많이 나왔어? 말도 안 돼!” 처럼요.`, ja:`まるで「今月のカード請求、なぜこんなに高いの？ ありえない！」のように。`},
      {ko:`하루 2~3,000kcal를 먹어도 <span class="hl-amber">1,200kcal밖에 안 먹었다</span>고 착각할 수 있고, 하루 800~1,000kcal까지 차이날 수 있습니다.`, ja:`1日2〜3,000kcal食べても<span class="hl-amber">1,200kcalしか食べていない</span>と錯覚することがあり、1日800〜1,000kcalもの差が出ることがあります。`}
    ]},
    {t:"p", v:{ko:`그래서 “에이 그냥 많이 먹었겠지~” 하고 <strong>먹는 것에서 원인을 찾으면</strong> 생각의 흐름이 어긋나지 않습니다.`, ja:`だから「まあ、たくさん食べたんだろう」と<strong>食べることに原因を求めれば</strong>、考えの流れがぶれません。`}}
  ]},

{ id:"S09", page:"p1",
  h2:{ko:`줄였는데 안 빠지면?<br><span class="accent">더 줄이면 됩니다</span>`, ja:`減らしても痩せないなら？<br><span class="accent">もっと減らせばいい</span>`},
  body:[
    {t:"p", v:{ko:`먹는 것을 줄이고 다시 쟀는데 안 빠지면 생각이 또 튀기 쉽습니다. 하지만 먹는 것에 대한 고민이 멈췄다는 게 함정이에요. <span class="hl">덜 빠지면 더 줄이고, 더 검토</span>하면 됩니다.`, ja:`食べる量を減らして測り直しても痩せないと、また考えが飛びがちです。でも食べることへの検討が止まるのが落とし穴。<span class="hl">痩せなければもっと減らし、さらに検討</span>すればいいのです。`}},
    {t:"case", tag:{ko:"실제 사례 · 미용실 선생님", ja:"実際の事例・美容師さん"}, ps:[
      {ko:`“먹는 것도 없는데 살쪄서” 식단을 다 찍어 PT 선생님께 보여드렸더니 “이걸로 살찔 수 없다”고 했대요.`, ja:`「食べていないのに太る」と食事を全部撮ってトレーナーに見せたら「これで太るはずがない」と言われたそうです。`},
      {ko:`여쭤보니 <span class="hl-amber">우유를 1L씩</span> 드시더라고요 — 단백질이라고 생각해서요.`, ja:`伺うと<span class="hl-amber">牛乳を1Lずつ</span>飲んでいました — タンパク質だと思って。`}
    ]},
    {t:"p", v:{ko:`두유도, 바나나도, 견과류도, 오트밀·현미밥·고구마도 다 살찔 수 있습니다. <strong>답은 항상 먹는 것에 있습니다.</strong>`, ja:`豆乳もバナナもナッツも、オートミール・玄米・さつまいもも、すべて太る可能性があります。<strong>答えは常に「食べること」にあります。</strong>`}}
  ]},

{ id:"S10", page:"p1",
  h2:{ko:`이것이 바로 <span class="accent">셀프모니터링</span>입니다`, ja:`これこそが<span class="accent">セルフモニタリング</span>`},
  body:[
    {t:"lead", v:{ko:`먹는 것 검토 → 체중 측정 → 검토 → 체중 측정. 이 인과관계를 오가며 <span class="hl">관찰과 학습을 반복</span>하는 것.`, ja:`食べる量を検討 → 体重測定 → 検討 → 体重測定。この因果関係を行き来しながら<span class="hl">観察と学習を繰り返すこと</span>。`}},
    {t:"p", v:{ko:`이걸 기본으로 가진 사람이 그때 추가하는 게 바로 — <strong>운동, 약, 시술</strong>입니다.`, ja:`これを基本として持つ人が、そこで追加するのが — <strong>運動、薬、施術</strong>です。`}},
    {t:"p", v:{ko:`항상 <strong>식이조절을 우선</strong>하고 그다음에 나머지를 만들어 나가야 휘둘리지 않습니다.`, ja:`常に<strong>食事制限を優先</strong>し、その次に残りを組み立てていけば振り回されません。`}}
  ]},

{ id:"S11", page:"p2", kicker:{ko:"2. 약의 효과, 그리고 식욕", ja:"2. 薬の効果、そして食欲"},
  h2:{ko:`한약은 왜 먹고,<br>어떤 효과가 있을까요?`, ja:`韓方薬はなぜ飲み、<br>どんな効果があるのか？`},
  body:[
    {t:"duo", cols:1, cards:[
      {h4:{ko:"① 감량 가속",ja:"① 減量の加速"}, p:{ko:`같은 노력 대비 감량이 <span class="hl-amber">2~3배</span>가 됩니다. 칼로리 소비를 높여 감량을 가속합니다.`, ja:`同じ努力でも減量が<span class="hl-amber">2〜3倍</span>になります。カロリー消費を高めて減量を加速します。`}},
      {h4:{ko:"② 식욕 억제",ja:"② 食欲の抑制"}, p:{ko:`포만감을 주고 식욕 억제를 도와, 식이조절을 보다 수월하게 합니다.`, ja:`満腹感を与えて食欲抑制を助け、食事制限をより楽にします。`}},
      {h4:{ko:"③ 불편증상 완화",ja:"③ 不快症状の緩和"}, p:{ko:`몸에 맞는 한약재로 불편증상을 줄이고 다이어트 과정을 돕습니다.`, ja:`体に合った韓方薬剤で不快な症状を減らし、ダイエットの過程を助けます。`}}
    ]}
  ]},

{ id:"S12", page:"p2",
  h2:{ko:`식욕은 크게 <span class="accent">두 종류</span>`, ja:`食欲は大きく<span class="accent">2種類</span>`},
  body:[
    {t:"duo", cols:2, cards:[
      {h4:{ko:"정말 굶어서 생기는 식욕",ja:"本当に飢えて生じる食欲"}, p:{ko:`한 일주일 굶었다고 해보세요. 지치고 꼬르륵거리고 힘들죠. 그때 빵·과자를 먹는 건 <strong>정말 칼로리가 필요한 식욕</strong>입니다.`, ja:`1週間断食したとします。疲れてお腹が鳴り、とても辛いですよね。その時パンやお菓子を食べるのは<strong>本当にカロリーが必要な食欲</strong>です。`}},
      {h4:{ko:"그렇지 않은 식욕",ja:"そうでない食欲"}, p:{ko:`빵·과자는 살찌우려고 먹는 게 아니라 맛있어서 먹죠. <strong>칼로리가 아닌 자극과 즐거움</strong>을 위한 식욕입니다.`, ja:`パンやお菓子は太るために食べるのではなく、美味しいから食べますよね。<strong>カロリーではなく刺激と楽しみ</strong>のための食欲です。`}}
    ]}
  ]},

{ id:"S13", page:"p2",
  h2:{ko:`한약이 잡는 식욕 vs<br>약으로 다 못 잡는 식욕`, ja:`薬が抑える食欲 vs<br>薬では抑えきれない食欲`},
  body:[
    {t:"p", v:{ko:`한약은 <span class="hl">‘굶어서 생기는 식욕’</span>을 줄이는 데 도움을 줍니다. 꼬르륵거리거나 지치고 피곤한 게 많이 줄어, 식이조절을 해도 크게 힘들지 않아요.`, ja:`韓方薬は<span class="hl">「飢えて生じる食欲」</span>を減らすのを助けます。お腹が鳴ったり疲れたりが大きく減り、食事制限をしても辛くありません。`}},
    {t:"p", v:{ko:`그런데 <strong>자극·즐거움을 위한 식욕</strong>은 한약이 전부 잡기는 어렵습니다. 스트레스받고 잠 못 자면 단 게 당기거든요 — 수면 등 다양한 요인이 결합한 식욕입니다.`, ja:`ところが<strong>刺激・楽しみのための食欲</strong>は韓方薬で完全には抑えきれません。ストレスや睡眠不足で甘い物が欲しくなるからです — 睡眠など様々な要因が絡む食欲です。`}},
    {t:"p", v:{ko:`이 식욕을 약으로 너무 억누르면, <span class="hl-amber">약이 끊긴 뒤 식욕이 폭발해 요요</span>가 올 수 있어요. 그래서 어느 정도는 이해하고 관리하는 과정이 필요합니다.`, ja:`この食欲を薬で抑えすぎると、<span class="hl-amber">薬をやめた後に食欲が爆発してリバウンド</span>することがあります。だからある程度は理解し、管理する過程が必要です。`}}
  ]},

{ id:"S14", page:"p2",
  h2:{ko:`칼로리는 빼고,<br><span class="accent">자극과 즐거움</span>만 공급`, ja:`カロリーは抜き、<br><span class="accent">刺激と楽しみ</span>だけ供給`},
  body:[
    {t:"p", v:{ko:`이 식욕이 원하는 건 ‘자극과 즐거움’이니, 칼로리를 빼고 그것만 잘 공급해주면 됩니다. 하루 종일 집에 있으면 입이 심심한데, 나가서 돌아다니면 하루가 지나가잖아요.`, ja:`この食欲が求めるのは「刺激と楽しみ」なので、カロリーを抜いてそれだけを供給すればいいのです。1日中家にいると口が寂しいですが、外出して動き回ると1日が過ぎますよね。`}},
    {t:"lead", v:{ko:`그래서 필요한 게 바로 — <span class="hl">맛있는데 살이 안 찌는 음식</span>입니다.`, ja:`だから必要なのが — <span class="hl">美味しいのに太らない食べ物</span>です。`}},
    {t:"p", v:{ko:`정답은 <strong>‘찾는다’</strong>입니다. 제로콜라, 곤약젤리, 버섯, 양배추, 방울토마토… 정말 다양해요. 하나씩 늘어나면 다이어트가 점점 편해집니다.`, ja:`答えは<strong>「探す」</strong>こと。ゼロコーラ、こんにゃくゼリー、きのこ、キャベツ、ミニトマト… 本当に色々あります。一つずつ増えると、ダイエットが段々楽になります。`}}
  ]},

{ id:"S15", page:"p2",
  h2:{ko:`자꾸 찾고, 다른 즐거움으로<br>대체해 보세요`, ja:`どんどん探し、<br>別の楽しみで代える`},
  body:[
    {t:"case", tag:{ko:"사례 · 3주 10kg 감량", ja:"事例・3週間で10kg減"}, ps:[
      {ko:`크리스탈라이트 가루를 제로사이다에 넣어 드시니 맛있어서 다른 걸 잘 안 먹어도 됐다고 하셨어요. (저는 사봤는데 제 입엔 안 맞더라고요 — 입맛은 사람마다 다릅니다.)`, ja:`クリスタルライトの粉をゼロサイダーに入れて飲むと美味しくて、他をあまり食べずに済んだそうです。（私も買ってみましたが、私の口には合いませんでした — 好みは人それぞれです。）`}
    ]},
    {t:"p", v:{ko:`여름마다 아이스크림 때문에 감량이 안 되던 분들이, 작년부터 <span class="hl-amber">제로칼로리 아이스크림</span> 덕에 실감나게 줄었습니다.`, ja:`夏になるとアイスクリームで減量できなかった方々が、昨年から<span class="hl-amber">ゼロカロリーアイスクリーム</span>のおかげで実感できるほど減りました。`}},
    {t:"chips", items:[{ko:"수면 7시간 이상",ja:"睡眠7時間以上"},{ko:"취미활동으로 대체",ja:"趣味で代える"}]},
    {t:"p", v:{ko:`특히 <strong>잠을 못 자면 이 식욕이 안 잡힙니다.</strong> 한 분은 퇴근 후 매일 마시던 술을 끊으려고, 그 시간에 골프 연습을 하며 다른 즐거움으로 대체해 3개월에 20kg 넘게 빼셨어요.`, ja:`特に<strong>眠れないと、この食欲は抑えられません。</strong>ある方は退社後に毎日飲んでいたお酒をやめるため、その時間にゴルフ練習をして別の楽しみに代え、3か月で20kg以上減らしました。`}}
  ]},

{ id:"S16", page:"p3", kicker:{ko:"3. 식이조절", ja:"3. 食事制限"},
  h2:{ko:`식이조절의 핵심은 <span class="accent">‘실천’</span>`, ja:`食事制限の核心は<span class="accent">「実践」</span>`},
  body:[
    {t:"p", v:{ko:`그런데 사람들은 이상하게 실천을 <strong>어렵게 만드는 걸</strong> 좋아합니다 — 저염식, 저탄고지, 간헐적 단식, 탄단지, 혈당 스파이크, “저녁에 먹으면 살찐다” 등등. 너무 많은 요인을 생각하면 실천이 오히려 어려워집니다.`, ja:`ところが人は不思議と、実践を<strong>難しくするのが</strong>好きです — 減塩、低糖質高脂質、間欠的断食、PFCバランス、血糖値スパイク、「夜食べると太る」など。多くの要因を考えると、実践がかえって難しくなります。`}},
    {t:"case", tag:{ko:"연구 이야기 · 식사 시간대", ja:"研究のお話・食事の時間帯"}, ps:[
      {ko:`같은 식사를 아침/점심/저녁 시간대만 바꿔 실험한 연구가 4번 있었는데, 3번은 똑같이 빠지고 1번만 저녁 그룹이 덜 빠졌대요.`, ja:`同じ食事を朝／昼／夜の時間帯だけ変えて実験した研究が4回あり、3回は同じく痩せ、1回だけ夜のグループが痩せにくかったそうです。`},
      {ko:`먹고 바로 자서가 아니라, <span class="hl">사회·문화적 영향으로 저녁에 조금 더 먹어서</span> — 즉 실천이 덜 된 거였습니다.`, ja:`食べてすぐ寝たからではなく、<span class="hl">社会・文化的な影響で夜に少し多く食べた</span> — つまり実践が不十分だっただけでした。`}
    ]}
  ]},

{ id:"S17", page:"p3",
  h2:{ko:`결국 볼 것은 <span class="accent">칼로리</span> 하나`, ja:`結局見るべきは<span class="accent">カロリー</span>一つ`},
  body:[
    {t:"p", v:{ko:`이것도 저것도 아니면 뭘 실천하냐? 바로 1p에서 나온 <strong>칼로리</strong>입니다. 칼로리만 보세요. 나머지는 신경 쓰지 마세요.`, ja:`あれもこれもでなければ、何を実践する？ 1pで出た<strong>カロリー</strong>です。カロリーだけ見てください。他は気にしないで。`}},
    {t:"duo", cols:2, cards:[
      {h4:{ko:"저열량식 (VLD)",ja:"低カロリー食 (VLD)"}, p:{ko:`하루 <span class="hl-amber">1,200~1,500kcal</span>. 6개월도 지속 권고할 수 있는 <strong>가장 기본·교과서 수준</strong>의 근거입니다.`, ja:`1日<span class="hl-amber">1,200〜1,500kcal</span>。6か月も継続して勧められる<strong>最も基本・教科書レベル</strong>の根拠です。`}},
      {h4:{ko:"초저열량식 (VLCD)",ja:"超低カロリー食 (VLCD)"}, p:{ko:`하루 <span class="hl-amber">800kcal 이하</span>. 잘 쓰면 좋지만 <strong>2주 이상</strong>이면 부담을 줄 수 있어요.`, ja:`1日<span class="hl-amber">800kcal以下</span>。うまく使えば良いですが<strong>2週間以上</strong>は負担をかけることがあります。`}}
    ]},
    {t:"chips", warn:true, items:[{ko:"담석증",ja:"胆石症"},{ko:"탈모",ja:"脱毛"},{ko:"어지러움",ja:"めまい"},{ko:"폭식 유발",ja:"過食を誘発"}]},
    {t:"p", v:{ko:`2일 정도는 괜찮고, 오히려 건강에 좋다고도 해요 — 인간은 원래 굶던 몸이라서요.`, ja:`2日ほどなら大丈夫で、むしろ健康に良いとも言われます — 人間はもともと飢える体だからです。`}}
  ]},

{ id:"S18", page:"p3",
  h2:{ko:`초저열량식,<br><span class="accent">식욕을 줄이는 수단</span>으로`, ja:`超低カロリー食を<br><span class="accent">食欲を抑える手段</span>に`},
  body:[
    {t:"case", tag:{ko:"원장 본인 경험", ja:"院長本人の経験"}, ps:[
      {ko:`2개월에 10kg 넘게 찌워본 적이 있는데, 식욕이 주체가 안 돼 합리화하며 너무 많이 먹게 되더라고요. 그래서 약이 아니라 <span class="hl">초저열량식을 2일</span> 진행하니 식욕이 잡혀, 저열량식으로 넘어가 잘 뺐습니다.`, ja:`2か月で10kg以上太らせたことがありますが、食欲が抑えられず、言い訳しながら食べすぎてしまいました。そこで薬ではなく<span class="hl">超低カロリー食を2日</span>行うと食欲が落ち着き、低カロリー食に移行してうまく減らしました。`}
    ]},
    {t:"p", v:{ko:`예를 들어 1,200~1,500kcal를 잘 하다가 여행 가서 하루 3~4,000kcal를 먹었다고 해보죠. 먹는 것 자체가 식욕을 올려 다녀와서도 많이 먹게 됩니다.`, ja:`例えば1,200〜1,500kcalを続けていて、旅行で1日3〜4,000kcal食べたとします。食べること自体が食欲を上げ、帰ってからも多く食べてしまいます。`}},
    {t:"p", v:{ko:`그럴 땐 당황하지 말고 <strong>하루이틀 초저열량식으로 대처</strong>해 식욕을 잡은 뒤, 다시 저열량식으로 넘어가면 좋습니다.`, ja:`そんな時は慌てず<strong>1〜2日、超低カロリー食で対処</strong>して食欲を抑え、また低カロリー食に戻れば良いです。`}}
  ]},

{ id:"S19", page:"p3",
  h2:{ko:`빵·떡·과일·음료는<br>왜 살찔까요?`, ja:`パン・餅・果物・飲料は<br>なぜ太る？`},
  body:[
    {t:"p", v:{ko:`“탄수화물이라 찐다”고 볼 수도 있지만, 빵도 한 개만 먹고 굶으면 빠집니다. <span class="hl">탄수화물이라 무조건 찌는 건 아니에요.</span>`, ja:`「炭水化物だから太る」とも言えますが、パンも1個だけ食べて断食すれば痩せます。<span class="hl">炭水化物だから必ず太るわけではありません。</span>`}},
    {t:"p", v:{ko:`문제는 이들이 <strong>맛있고, 소화 잘되고, 많이 먹기 쉬워서</strong> 칼로리가 금방 엄청 많이 들어간다는 점입니다.`, ja:`問題は、これらが<strong>美味しく、消化が良く、たくさん食べやすい</strong>ので、カロリーがあっという間にたくさん入ることです。`}},
    {t:"chips", warn:true, items:[{ko:"케이크 한 조각 500~700kcal",ja:"ケーキ1切れ 500〜700kcal"},{ko:"과일·고구마·바나나도 주의",ja:"果物・さつまいも・バナナも注意"}]}
  ]},

{ id:"S20", page:"p4", kicker:{ko:"4. 식이조절 ②", ja:"4. 食事制限 ②"},
  h2:{ko:`단백질·채소는 좋지만,<br><span class="accent">함정</span>도 있어요`, ja:`タンパク質・野菜は良いが、<br><span class="accent">落とし穴</span>もある`},
  body:[
    {t:"p", v:{ko:`단백질과 채소는 포만감이 있어 좋은데, <strong>두부도 단백질이 반이 안 되고, 우유도 절반 이상이 탄수화물</strong>이에요. 단백질의 최대 단점은 ‘단백질이라 괜찮겠지’ 하고 많이 먹는 것 — 에너지바, 단백질 쉐이크도 조심하세요.`, ja:`タンパク質と野菜は満腹感があって良いですが、<strong>豆腐もタンパク質が半分以下、牛乳も半分以上が炭水化物</strong>です。タンパク質の最大の欠点は「タンパク質だから大丈夫」と多く食べること — プロテインバー、プロテインシェイクも注意です。`}},
    {t:"case", tag:{ko:"사례 · 치킨 먹고 2개월 10kg", ja:"事例・チキンを食べて2か月で10kg"}, ps:[
      {ko:`비결은 ‘조금 먹기’. 한 마리 드시던 분이 <span class="hl-amber">2조각</span>만. 아예 먹지 말라는 것보다 할 만하다고 하셨어요.`, ja:`秘訣は「少しだけ食べる」。1羽食べていた方が<span class="hl-amber">2切れ</span>だけ。完全に禁止するより続けやすいそうです。`}
    ]},
    {t:"lead", v:{ko:`이 방식의 연장이 바로 <span class="hl">유지</span>입니다. 짜장면을 평생 안 먹을 순 없죠 — <strong>‘종류’보다 ‘양’</strong> 개념으로 접근합니다.`, ja:`この方法の延長が<span class="hl">維持</span>です。ジャージャー麺を一生食べないなんて無理ですよね — <strong>「種類」より「量」</strong>で捉えます。`}}
  ]},

{ id:"S21", page:"p4",
  h2:{ko:`식욕이 오를 때를<br><span class="accent">예측해서 대비</span>하세요`, ja:`食欲が上がる時を<br><span class="accent">予測して備える</span>`},
  body:[
    {t:"p", v:{ko:`옛 연구를 보니 인간은 굶다가 사냥에 성공하면 폭식하는 본능이 있대요. <span class="hl">입에 음식이 들어가면 식욕을 올려 계속 먹게</span> 하는 생존본능 — 사람도 고양이도 강아지도 똑같습니다.`, ja:`昔の研究では、人間は飢えてから狩りに成功すると過食する本能があるそうです。<span class="hl">口に食べ物が入ると食欲を上げ、食べ続けさせる</span>生存本能 — 人も猫も犬も同じです。`}},
    {t:"case", tag:{ko:"대비 요령", ja:"備えのコツ"}, ps:[
      {ko:`· 치킨 한 마리 다 먹을 게 뻔하니 <strong>2조각만 두고 나머지는 냉동실</strong>에.`, ja:`・チキンは1羽食べ切るのが目に見えているので<strong>2切れだけ残し、残りは冷凍庫</strong>へ。`},
      {ko:`· 라면도 끓이기 전 <strong>절반을 부러뜨려 버리고</strong> 끓입니다.`, ja:`・ラーメンも茹でる前に<strong>半分を折って捨てて</strong>から茹でます。`},
      {ko:`· 젤리가 너무 당겨 사면 2~3개만 남기고 <strong>팀원들에게 나눠</strong> 주기.`, ja:`・ゼリーがどうしても欲しくて買ったら、2〜3個だけ残して<strong>チームの皆に配る</strong>。`}
    ]},
    {t:"p", v:{ko:`단팥빵 3개를 그 자리에서 다 드신 분께는 — “하나 먹으면 식욕이 올라 3개를 다 먹게 되니, <strong>애초에 하나만 사야 한다</strong>”고 말씀드렸어요. 약 먹는 동안 식욕이 잡힐 때 자꾸 연습해 보세요.`, ja:`あんぱんを3個その場で食べた方には — 「1個食べると食欲が上がって3個食べてしまうから、<strong>最初から1個だけ買うべき</strong>」とお伝えしました。薬を飲んでいる間、食欲が抑えられている時に何度も練習してみてください。`}}
  ]},

{ id:"S22", page:"self",
  h2:{ko:`‘<span class="accent">400kcal</span>’를 기억하세요`, ja:`「<span class="accent">400kcal</span>」を覚えておく`},
  body:[
    {t:"p", v:{ko:`다이어트 도시락을 활용해 보면 좋습니다. 거의 <span class="hl-amber">400kcal 이내</span>로 나오는데, ×3 하면 1,200kcal로 저열량식 기준이거든요. 양감(量感)이 없으니 도시락을 샘플 삼아 일반식에 응용해 보세요.`, ja:`ダイエット弁当を活用すると良いです。ほぼ<span class="hl-amber">400kcal以内</span>で、×3すると1,200kcalで低カロリー食基準だからです。量の感覚がないので、弁当をサンプルにして普通の食事に応用してみてください。`}},
    {t:"case", tag:{ko:"감 잡기 예시", ja:"感覚をつかむ例"}, ps:[
      {ko:`버거킹 주니어와퍼 <span class="hl-amber">390kcal</span> + 제로콜라 → “이거 먹으면 빠지겠구나.” 콰트로치즈와퍼 <span class="hl-amber">800kcal</span> → “반만 먹어야겠다.”`, ja:`バーガーキング ジュニアワッパー<span class="hl-amber">390kcal</span> + ゼロコーラ →「これなら痩せそう」。クアトロチーズワッパー<span class="hl-amber">800kcal</span> →「半分にしよう」。`},
      {ko:`파리바게뜨 아침 — 맛있는 거 500kcal, 맛없는 거 300kcal라면? <strong>맛있는 걸 절반</strong> 먹어도 됩니다.`, ja:`パン屋の朝 — 美味しいの500kcal、そうでないの300kcalなら？ <strong>美味しいのを半分</strong>食べてもOK。`}
    ]},
    {t:"p", v:{ko:`안 보이던 숫자가 자꾸 보입니다. <strong>먹고 싶은 것 먹되, ‘양’으로 접근 — 그 단위는 ‘칼로리’</strong>입니다.`, ja:`見えなかった数字が見えてきます。<strong>食べたい物を食べつつ「量」で捉える — その単位は「カロリー」</strong>です。`}}
  ]},

{ id:"S23", page:"self",
  h2:{ko:`많이 먹었다 · 적게 먹었다<br>그 <span class="accent">기준</span>은 무엇일까요?`, ja:`「食べすぎ」「少なめ」<br>その<span class="accent">基準</span>は何でしょう？`},
  body:[
    {t:"p", v:{ko:`칼로리만 잘 보면 된다는 건 알겠는데, 매번 칼로리를 계산할 순 없죠. 전문가도 어렵습니다.`, ja:`カロリーだけ見ればいいのは分かったけれど、毎回カロリーを計算はできませんよね。専門家でも難しいです。`}},
    {t:"p", v:{ko:`그래서 ‘많이 먹는다 / 적게 먹는다’를 가늠할 기준이, <strong>칼로리 말고 하나 더</strong> 있으면 좋습니다.`, ja:`だから「多い／少ない」を測る基準が、<strong>カロリー以外にもう一つ</strong>あると良いのです。`}},
    {t:"lead", v:{ko:`칼로리(kcal) 말고 — <span class="hl">무엇으로</span> 많이/적게를 판단할 수 있을까요?`, ja:`カロリー（kcal）以外に — <span class="hl">何で</span>多い／少ないを判断できるでしょうか？`}},
    {t:"note", v:{ko:`포만감? 예전의 내 기억? 친구들 이야기? … 잠깐 떠올려 보세요.`, ja:`満腹感？ 昔の記憶？ 友達の話？ … 少し思い浮かべてみてください。`}}
  ]},

{ id:"S24", page:"self",
  h2:{ko:`사실은, 배웠습니다 —<br>바로 <span class="accent">체중 변화</span>`, ja:`実は、習いましたね —<br>それは<span class="accent">体重の変化</span>`},
  body:[
    {t:"p", v:{ko:`포만감도, 예전의 기억도, 친구 이야기도 — <strong>전부 부정확합니다.</strong> 정답은 <span class="hl">체중 변화</span>예요.`, ja:`満腹感も、昔の記憶も、友達の話も — <strong>すべて不正確です。</strong>正解は<span class="hl">体重の変化</span>です。`}},
    {t:"p", v:{ko:`살이 쪘으면 먹었다, 빠지면 적게 먹었다, 유지되면 유지식을 했다. 빵 먹고 술 먹어도 체중이 유지됐으면 그게 유지식입니다.`, ja:`太ったら食べた、痩せたら少なく食べた、維持なら維持食をした。パンを食べてお酒を飲んでも体重が維持されれば、それが維持食です。`}},
    {t:"eq", terms:[{t:{ko:"섭취",ja:"摂取"},v:{ko:"칼로리 섭취량",ja:"カロリー摂取量"}},{t:{ko:"소비(고정)",ja:"消費（固定）"},v:{ko:"칼로리 소비량",ja:"カロリー消費量"}},{t:{ko:"관찰값",ja:"観察値"},v:{ko:"체중 변화",ja:"体重の変化"},out:true}], ops:["−","="]},
    {t:"p", v:{ko:`섭취량은 매번 재기 어렵지만 <strong>체중은 아침에 측정하면 끝</strong>이죠. 체중 변화로 먹는 것을 학습하는 셀프모니터링 — 이 방향성을 놓치지 마세요.`, ja:`摂取量は毎回測りにくいですが<strong>体重は朝に測れば終わり</strong>です。体重の変化で食べることを学ぶセルフモニタリング — この方向性を見失わないでください。`}}
  ]},

{ id:"S25", page:"p11", kicker:{ko:"음주", ja:"飲酒"},
  h2:{ko:`술 마시는 날의 약,<br>그리고 <span class="accent">안주</span>`, ja:`お酒を飲む日の薬、<br>そして<span class="accent">おつまみ</span>`},
  body:[
    {t:"p", v:{ko:`술 먹는 날에는 <strong>저녁약을 드시지 마시고</strong>, 다음 날 힘들면 약을 잠시 쉬세요. 평소보다 빨리 취할 수 있으니 물 많이 드시고 조심하세요.`, ja:`お酒を飲む日は<strong>夜の薬を飲まず</strong>、翌日辛ければ薬を少し休んでください。普段より早く酔うことがあるので、水を多めに、お気をつけて。`}},
    {t:"chips", items:[{ko:"먹태",ja:"干しスケトウダラ"},{ko:"마른오징어",ja:"するめ"},{ko:"광어회",ja:"ヒラメの刺身"},{ko:"우럭회",ja:"クロソイの刺身"}]},
    {t:"p", v:{ko:`위 안주는 닭가슴살 수준의 단백질 비율이라 잘 활용해 보세요.`, ja:`上記のおつまみは鶏むね肉並みのタンパク質比率なので、上手に活用してください。`}},
    {t:"p", v:{ko:`소주 한 병 = <span class="hl-amber">400kcal</span>. 반 병 + 손바닥만 한 안주면 400kcal로 “오늘 살 빠진 날!” 감이 옵니다. 한 병 다 드셨으면 안주 조심해도 600kcal — 나쁘진 않아요. 하지만 <span class="hl-amber">2차 1,500 · 3차 3,000kcal</span>면 그날 다이어트는 망친 거니, 다음 날 초저열량식으로 대처하세요.`, ja:`焼酎1本 = <span class="hl-amber">400kcal</span>。半分＋手のひらほどのおつまみで400kcalなら「今日は痩せた日！」という感覚に。1本飲んでもおつまみに気をつければ600kcal — 悪くありません。でも<span class="hl-amber">2軒目で1,500・3軒目で3,000kcal</span>なら、その日のダイエットは台無しなので、翌日は超低カロリー食で対処してください。`}}
  ]},

{ id:"S26", page:"p11", kicker:{ko:"운동", ja:"運動"},
  h2:{ko:`운동과 약은<br><span class="accent">겹치지 않게</span>`, ja:`運動と薬は<br><span class="accent">重ならないように</span>`},
  body:[
    {t:"p", v:{ko:`저녁 운동을 하시면 <strong>아침·점심 약만</strong> 드시고 저녁약은 드시지 마세요.`, ja:`夜に運動する場合は<strong>朝・昼の薬だけ</strong>飲み、夜の薬は飲まないでください。`}},
    {t:"p", v:{ko:`등산이나 하루 종일 야외활동을 하는 날은 <strong>하루 정도 약을 안 드시는 것</strong>도 좋습니다. <span class="hl-amber">(저혈당 주의)</span>`, ja:`登山や1日中の野外活動の日は<strong>1日ほど薬を飲まない</strong>のも良いです。<span class="hl-amber">（低血糖に注意）</span>`}},
    {t:"p", v:{ko:`<strong>공복 운동</strong>도 조심하거나 피하는 게 좋아요.`, ja:`<strong>空腹時の運動</strong>も、控えるか避ける方が良いです。`}}
  ]},

{ id:"S27", page:"p5", kicker:{ko:"5. 불편증상", ja:"5. 不快な症状"},
  h2:{ko:`에너지 쓰는 순서와<br><span class="accent">케톤대사</span>`, ja:`エネルギーを使う順序と<br><span class="accent">ケトン代謝</span>`},
  body:[
    {t:"p", v:{ko:`에너지를 쓸 때는 <strong>탄수화물 → 지방 → 단백질</strong> 순서로 씁니다. (단백질까지는 사실 쓰기 어렵습니다.)`, ja:`エネルギーは<strong>炭水化物 → 脂肪 → タンパク質</strong>の順で使います。（タンパク質までは実際には使いにくいです。）`}},
    {t:"p", v:{ko:`탄수화물을 고갈시켜 지방을 쓰게 하는 전략이 간헐적 단식·저탄고지·공복 유산소인데, 뒤에 다시 먹으면 또 찝니다. 우리는 <span class="hl">‘저열량식’을 지속하며 약을 먹는 방식</span>으로 갑니다.`, ja:`炭水化物を枯渇させて脂肪を使わせる戦略が間欠的断食・低糖質高脂質・空腹有酸素ですが、後でまた食べると太ります。私たちは<span class="hl">「低カロリー食」を続けながら薬を飲む方法</span>で進めます。`}},
    {t:"p", v:{ko:`지방을 에너지로 쓰는 것을 <strong>케톤대사</strong>라 합니다. 살도 빠지고 좋은데, 입냄새가 나고 입이 시큼하고 바싹 마릅니다. 그럴 땐 “오, 잘 빠지네!” 하고 <span class="hl-amber">물을 하루 2L 이상</span> 드시면 됩니다.`, ja:`脂肪をエネルギーに使うことを<strong>ケトン代謝</strong>といいます。痩せて体にも良いですが、口臭がして口が酸っぱく、カラカラに乾きます。その時は「お、よく痩せてる！」と思って<span class="hl-amber">水を1日2L以上</span>飲んでください。`}}
  ]},

{ id:"S28", page:"p5",
  h2:{ko:`진짜 문제는 <span class="accent">수분과 저혈당</span>`, ja:`本当の問題は<span class="accent">水分と低血糖</span>`},
  body:[
    {t:"p", v:{ko:`탄수화물이 배출되며 <strong>수분을 끌고 나갑니다.</strong> 하루에도 1kg 이상 왔다 갔다 할 수 있어요. “붓기 빠져 좋네!”가 아니라 페트병 하나가 나간 셈입니다.`, ja:`炭水化物が排出される時に<strong>水分を引き連れて出ます。</strong>1日でも1kg以上変動することがあります。「むくみが取れて良い！」ではなく、ペットボトル1本分が出ただけです。`}},
    {t:"p", v:{ko:`피가 부족한 것처럼 앉았다 일어나면 눈앞이 깜깜한 <span class="hl-amber">저혈당</span>을 조심해야 합니다. 아침·오후에 생기기 쉬우니 <strong>당 보충 + 수분 보충</strong>을 잘 해주세요.`, ja:`血が足りないように、座って立つと目の前が暗くなる<span class="hl-amber">低血糖</span>に注意が必要です。朝や午後に起きやすいので<strong>糖分補給＋水分補給</strong>をしっかり。`}},
    {t:"p", v:{ko:`탄수화물은 근육 안 <strong>글리코겐</strong> 형태로도 있다가 빠지는데, 그러면 근육이 긴장돼 두통·손떨림·쥐남이 생길 수 있어요. 그래서 <span class="hl">운동 전에는 오히려 탄수화물을 드셔야</span> 할 수 있습니다.`, ja:`炭水化物は筋肉内に<strong>グリコーゲン</strong>としてもあり、それが抜けると筋肉が緊張して頭痛・手の震え・こむら返りが起きることがあります。だから<span class="hl">運動前はむしろ炭水化物を摂る</span>必要があるかもしれません。`}}
  ]},

{ id:"S29", page:"p5",
  h2:{ko:`그 밖의 증상과<br><span class="accent">복용법</span>`, ja:`その他の症状と<br><span class="accent">服用法</span>`},
  body:[
    {t:"p", v:{ko:`공복에 약 먹고 속쓰리면 <strong>식전·식후</strong>에 드세요. 아몬드브리즈 등과 함께 드셔도 좋습니다.`, ja:`空腹で薬を飲んで胃がもたれるなら<strong>食前・食後</strong>に。アーモンドミルクなどと一緒でもOKです。`}},
    {t:"p", v:{ko:`여성은 체지방 변화가 여성호르몬과 관련돼 일시적 <strong>생리불순</strong>이, 남성은 일시적 <strong>발기부전</strong>이 생길 수 있는데 하루이틀만 안 드셔도 회복되며, 살이 빠지면 오히려 개선됩니다. <strong>변비</strong>는 따로 챙겨드리는 약이 있어요.`, ja:`女性は体脂肪の変化が女性ホルモンと関連し、一時的な<strong>生理不順</strong>が、男性は一時的な<strong>勃起不全</strong>が起こることがありますが、1〜2日飲まなければ回復し、痩せればむしろ改善します。<strong>便秘</strong>には別途お渡しする薬があります。`}},
    {t:"lead", v:{ko:`<strong>알러지</strong>가 생기면 중단하고 연락 주세요. (특히 알러지 없으시죠?) 그 외 불편증상도 중단하고 바로 연락 주세요.`, ja:`<strong>アレルギー</strong>が出たら中止してご連絡を。（特にアレルギーはありませんか？）その他の不快な症状も、中止してすぐご連絡ください。`}},
    {t:"dose"}
  ]},

{ id:"S30", page:"end",
  h2:{ko:`마지막 퀴즈 ·<br>그 1~2kg는 왜 <span class="accent">갑자기</span> 돌아왔나?`, ja:`最後のクイズ ·<br>その1〜2kgはなぜ<span class="accent">急に</span>戻った？`},
  body:[
    {t:"goal"},
    {t:"p", v:{ko:`10kg을 잘 뺐는데 한 끼 많이 먹었다고 바로 1~2kg 돌아오면 억울하죠. 많이 먹어서이긴 하지만 — 핵심은 <span class="hl">수분 이동</span>입니다.`, ja:`10kgをうまく落としたのに、一食多く食べただけで1〜2kg戻ると悔しいですよね。多く食べたのは事実ですが — 核心は<span class="hl">水分の移動</span>です。`}},
    {t:"p", v:{ko:`하루 1~2kg 이동은 지방일 수 없어요. 수분이 왔다 갔다 하며 우리를 헷갈리게 합니다. 그래서 잘 빠지다 안 빠지다 <strong>계단식</strong>으로 빠질 수 있어요.`, ja:`1日1〜2kgの移動は脂肪ではありえません。水分が行き来して私たちを惑わせます。だからよく痩せたり止まったり、<strong>階段状</strong>に痩せることがあります。`}},
    {t:"lead", v:{ko:`수분인지 진짜 안 빠지는지 어떻게 아냐? → <span class="hl">허리 사이즈(부피·눈바디)</span>로 확인하세요. 허리가 줄고 있으면 잘하고 있는 겁니다.`, ja:`水分か、本当に痩せていないか、どう見分ける？ → <span class="hl">ウエストサイズ（体積・見た目）</span>で確認します。ウエストが減っていれば順調です。`}},
    {t:"p", v:{ko:`<strong>여기까지입니다. 궁금하신 점 있으신가요? 고생 많으셨습니다.</strong>`, ja:`<strong>ここまでです。ご質問はありますか？ お疲れさまでした。</strong>`}}
  ]}
];

// ---------- state & dynamic ----------
let idx = 0;
let lang = "ko";
const STATE = { patient:"", doctor:"", wake:8, g_m1:"3", g_kg1:"7", g_m2:"6", g_kg2:"15", g_pm:"2.3" };

function esc(s){ return (s==null?"":String(s)).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function strip(html){ return html.replace(/<br\s*\/?>/gi,' ').replace(/<[^>]+>/g,'').trim(); }
function vN(x){ return (x===""||x==null)?"N":esc(x); }

// 인사 (의료진명 연동)
function docName(lg){
  return STATE.doctor.trim() || "___";
}
function greetMain(lg){
  const p=STATE.patient.trim(), d=docName(lg), P=esc(p), D=esc(d);
  if(lg==="ja") return (p?P+"様、":"")+"こんにちは。担当医の"+D+"です。";
  if(lg==="en") return (p?P+", ":"")+"hello. I'm Dr. "+D+", and I'll be helping you today.";
  if(lg==="zh-cn") return (p?P+"，":"")+"您好。我是您的主治医师"+D+"。";
  if(lg==="zh-tw") return (p?P+"，":"")+"您好。我是您的主治醫師"+D+"。";
  if(lg==="th") return (p?"คุณ"+P+" ":"")+"สวัสดีครับ ผมเป็นแพทย์ผู้ดูแลของคุณ "+D;
  return (p?P+"님, ":"")+"안녕하세요. 담당의 "+D+"입니다.";
}
function updateGreet(){
  const g=document.getElementById('greet'); if(!g) return;
  g.innerHTML=greetMain(lang);
  const nx=g.nextElementSibling;
  if(lang!=="ko" && nx && nx.classList.contains('gloss')) nx.innerHTML=strip(greetMain("ko"));
}

// 복용시각 (기상시각 연동)
function curWake(){ const w=STATE.wake; return (w===""||w==null||isNaN(w))?8:(((w%24)+24)%24); }
function doseTimes(w, sep){ return [w,(w+4)%24,(w+8)%24].join(sep); }
const DOSE = {
  ko:{ tag:"복용법", pre:"기상 ", mid:"시 기준 → ", sep:"·",
       post:"시, 4시간 간격으로 3알씩 3번. 마지막 약이 남으면 불면을 유발할 수 있어 저녁약은 줄이거나 안 드셔도 됩니다. 잠은 충분히.",
       p2:`처음엔 <strong>1~2알</strong>부터, 괜찮으면 3알씩. 특히 <span class="hl-amber">초반 2주</span>에 불편증상이 생기기 쉬우니 조심하세요.` },
  ja:{ tag:"服用法", pre:"起床 ", mid:"時を基準に → ", sep:"・",
       post:"時、4時間おきに3錠ずつ3回。最後の薬が残ると不眠を招くことがあるので、夜の薬は減らすか飲まなくてもOK。睡眠は十分に。",
       p2:`最初は<strong>1〜2錠</strong>から、大丈夫なら3錠ずつ。特に<span class="hl-amber">最初の2週間</span>に不快な症状が出やすいので注意してください。` },
  en:{ tag:"How to take", pre:"Wake-up at ", mid:":00 → take at ", sep:":00, ",

       p2:`Start with <strong>1–2 tablets</strong>, and 3 if you tolerate it. Side effects are most likely in the <span class="hl-amber">first 2 weeks</span>, so take care.` },
  "zh-cn":{ tag:"服用方法", pre:"起床 ", mid:"点为准 → ", sep:"·",
       post:"点，每隔4小时3粒、共3次。最后一次太晚可能影响睡眠，晚上那次可减量或不服。请保证充足睡眠。",
       p2:`先从<strong>1~2粒</strong>开始，适应后每次3粒。<span class="hl-amber">前两周</span>最容易出现不适，请多留意。` },
  "zh-tw":{ tag:"服用方式", pre:"起床 ", mid:"點為準 → ", sep:"·",
       post:"點，每隔4小時3粒、共3次。最後一次太晚可能影響睡眠，晚上那次可減量或不服。請保持充足睡眠。",
       p2:`先從<strong>1~2粒</strong>開始，適應後每次3粒。<span class="hl-amber">前兩週</span>最容易出現不適，請多留意。` },
  th:{ tag:"วิธีรับประทาน", pre:"ตื่นนอน ", mid:" น. เป็นเกณฑ์ → ", sep:" น., ",
       post:" น. ห่างกัน 4 ชม. ครั้งละ 3 เม็ด วันละ 3 ครั้ง หากมื้อสุดท้ายดึกเกินไปอาจนอนไม่หลับ มื้อเย็นลดหรืองดได้ พักผ่อนให้เพียงพอ",
       p2:`เริ่มจาก <strong>1–2 เม็ด</strong> ถ้าไหวค่อยเพิ่มเป็น 3 เม็ด ช่วง <span class="hl-amber">2 สัปดาห์แรก</span> มักมีอาการไม่สบายตัว โปรดระวัง` }
};
function doseGlossKo(w){ return "기상 <span id=\"wakeKo\">"+w+"</span>시 기준 → <span id=\"doseTimesKo\">"+doseTimes(w,"·")+"</span>시, 4시간 간격으로 3알씩 3번. 마지막 약이 남으면 불면을 유발할 수 있어 저녁약은 줄이거나 안 드셔도 됩니다. 잠은 충분히."; }
function updateDose(){
  const w=curWake(), sep=(lang==="ja"?DOSE.ja.sep:DOSE.ko.sep);
  const a=document.getElementById('doseTimes'); if(a) a.textContent=doseTimes(w,sep);
  const wk=document.getElementById('wakeKo'); if(wk) wk.textContent=w;
  const dk=document.getElementById('doseTimesKo'); if(dk) dk.textContent=doseTimes(w,"·");
}

// 감량 목표 (개월·kg 연동, 월 단위 자동 계산)
const GOAL = {
  ko:{ a:"감량 목표는 ", b:"개월간 ", c:"kg, ", d:"개월간 ", e:"kg입니다. 한 달에 약 ", f:"kg씩 꾸준히 빠지면 잘 되고 있는 거예요." },
  ja:{ a:"減量目標は ", b:"か月で ", c:"kg、", d:"か月で ", e:"kgです。1か月に約 ", f:"kgずつ着実に減れば順調です。" },
  en:{ a:"Target: in ", b:" months lose ", c:"kg; in ", d:" months lose ", e:"kg — about ", f:"kg per month means you're on track." },
  "zh-cn":{ a:"减重目标：", b:"个月减 ", c:"kg，", d:"个月减 ", e:"kg。每月约 ", f:"kg，保持这个速度就很好。" },
  "zh-tw":{ a:"減重目標：", b:"個月減 ", c:"kg，", d:"個月減 ", e:"kg。每月約 ", f:"kg，維持這個速度就很好。" },
  th:{ a:"เป้าหมาย: ", b:" เดือนลด ", c:"kg, ", d:" เดือนลด ", e:"kg — เดือนละประมาณ ", f:"kg ถ้าได้ประมาณนี้ถือว่าดี" }
};
function goalGlossKo(){
  const g=GOAL.ko;
  return g.a+vN(STATE.g_m1)+g.b+vN(STATE.g_kg1)+g.c+vN(STATE.g_m2)+g.d+vN(STATE.g_kg2)+g.e+vN(STATE.g_pm)+g.f;
}
function updateGoal(){
  const gg=document.getElementById('goalGloss'); if(gg) gg.innerHTML=goalGlossKo();
}

// ---------- translation merge ----------
function trNodes(s){
  const o=[];
  if(s.cover){ o.push(s.h1); o.push(s.sub); return o; }
  if(s.kicker) o.push(s.kicker);
  o.push(s.h2);
  s.body.forEach(function(b){
    if(b.t==='p'||b.t==='lead'||b.t==='note') o.push(b.v);
    else if(b.t==='case'){ o.push(b.tag); b.ps.forEach(function(p){o.push(p);}); }
    else if(b.t==='duo'){ b.cards.forEach(function(c){o.push(c.h4);o.push(c.p);}); }
    else if(b.t==='chips'){ b.items.forEach(function(c){o.push(c);}); }
    else if(b.t==='eq'){ b.terms.forEach(function(t){o.push(t.t);o.push(t.v);}); }
  });
  return o;
}
const TR = {
