S03:{en:[`It slows from month 3,<br>and stalls after month 6`,`Diet, exercise, medication — <strong>whatever the method, the trend is the same</strong>.`,`Why? It's a matter of <span class="hl">‘practice’</span> — not a drop in metabolism or drug tolerance.`,`A research story`,`In one study, people lost weight twice in a row without rebound — the method was a <span class="hl-amber">cash reward</span>.`,`Proof that <strong>motivation</strong> matters more than the body's response — even more so over the long haul.`]},
S04:{en:[`What is a<br>calorie deficit?`,`It's when you burn more calories than you take in.`,`If more goes out than comes in, you lose weight.`,`Intake`,`what you eat`,`Output`,`what you burn`,`Result`,`weight loss`,`The problem is people think many factors affect this — <strong>body type, gut bacteria, age, muscle mass, metabolism</strong>, and so on.`]},
S05:{en:[`Do any of these matter?<br><span class="accent">Actually, no.</span>`,`<strong>Metabolism</strong> is hard to measure, and some studies show it's stable from age 20 to 60. It's close to a life-support function, so it's hard to see it as a big driver of weight.`,`<strong>Muscle mass</strong> is similar. It's unlikely you suddenly gained because you lost muscle.`,`<strong>Age</strong> sadly can't be changed, and <strong>gut bacteria</strong>, studied for over a decade, still can't be said to make you lose weight. <strong>Body type</strong> is worth managing, but it's unlikely it suddenly changed and made you gain.`]},
S06:{en:[`Forget the many variables —<br>focus on just <span class="accent">2</span>`,`① Diet`,`The <strong>more important</strong> of the two. This is where it's won or lost.`,`② Exercise`,`Always good for you — but raising calorie burn sharply is harder than you'd think.`,`If a good day burns about <span class="hl-amber">1,800kcal (women) / 2,000kcal (men)</span>, adding an hour of exercise adds only about <span class="hl-amber">300–400kcal</span>.`,`Exercise is good, but it helps to assume <span class="hl">calorie burn is essentially ‘fixed’</span>.`]},
S07:{en:[`Intake is the ‘variable’,<br>output is ‘fixed’`,`Eating ranges from 0kcal when fasting to <span class="hl-amber">4–5,000kcal</span> when overeating — swinging <strong>over 1,000kcal a day</strong>.`,`Intake swings widely; output is relatively fixed. So eating 2–3,000kcal extra thinking "I'll work out tomorrow" and burning 3–400kcal doesn't add up, right?`,`So we narrow the cause of weight to <span class="hl">one thing — ‘what you eat’</span>.`,`Gained? You ate. Ate less? You lost! Just go back and forth here. We've narrowed cause and effect to one.`]},
S08:{en:[`“I ate the same —<br>why did I gain?”`,`It looks simple, but people struggle. "I didn't eat much? This used to be enough to lose!" — and they drift off the cause. "Is it age? Did my metabolism drop?" the mind jumps again.`,`The long-researched answer is anticlimactic: <span class="hl">you didn't actually eat the same — you just didn't notice</span>.`,`An analogy`,`Like, "Why is this month's credit card bill so high? No way!"`,`You can eat 2–3,000kcal yet believe you only had <span class="hl-amber">1,200kcal</span> — a daily gap of up to 800–1,000kcal.`,`So if you shrug and say "I guess I just ate a lot" and <strong>look to food for the cause</strong>, your reasoning stays on track.`]},
S09:{en:[`Cut back and still no loss?<br><span class="accent">Cut back more</span>`,`Cut back, weigh again, no loss — and the mind drifts again. The trap is that you stopped questioning your food. <span class="hl">If less isn't enough, cut more and review more</span>.`,`Real case · a hair stylist`,`"I gain even though I barely eat" — she photographed every meal for her trainer, who said "you can't gain weight on this."`,`Turns out she drank <span class="hl-amber">1L of milk</span> a day — thinking it was protein.`,`Soy milk, bananas, nuts, oatmeal, brown rice, sweet potato — all can cause gain. <strong>The answer is always in what you eat.</strong>`]},
S10:{en:[`This is exactly <span class="accent">self-monitoring</span>`,`Review food → measure weight → review → measure. Going back and forth through this cause-and-effect, <span class="hl">observing and learning, again and again</span>.`,`Someone with this foundation then adds — <strong>exercise, medication, procedures</strong>.`,`Always <strong>put diet first</strong>, then build the rest, so you won't be thrown off.`]},
S11:{en:[`2. The Medication's Effect, and Appetite`,`Why take the herbal medicine,<br>and what does it do?`,`① Accelerates loss`,`For the same effort, loss becomes <span class="hl-amber">2–3×</span>. It raises calorie burn to speed up loss.`,`② Curbs appetite`,`It adds fullness and helps suppress appetite, making the diet easier.`,`③ Eases discomfort`,`Herbs suited to your body reduce discomfort and support the process.`]},
S12:{en:[`Appetite comes in <span class="accent">two kinds</span>`,`Real hunger appetite`,`Imagine fasting a week — tired, stomach growling, miserable. Eating bread or snacks then is <strong>appetite that truly needs calories</strong>.`,`The other appetite`,`We eat bread and snacks not to gain weight but because they're tasty. It's appetite for <strong>stimulation and pleasure, not calories</strong>.`]},
S13:{en:[`Appetite the medicine curbs vs<br>appetite it can't fully curb`,`The herbal medicine helps reduce <span class="hl">‘hunger appetite’</span>. Growling, fatigue, and tiredness drop a lot, so dieting isn't very hard.`,`But <strong>appetite for stimulation and pleasure</strong> can't be fully curbed by medicine. Stress and poor sleep make you crave sweets — appetite tied to many factors like sleep.`,`Suppress this appetite too hard with medicine and <span class="hl-amber">it can explode after stopping, causing rebound</span>. So you need to understand and manage it to some degree.`]},
S14:{en:[`Cut the calories,<br>supply only <span class="accent">stimulation and pleasure</span>`,`This appetite wants ‘stimulation and pleasure,’ so cut the calories and supply just that. Stuck home all day your mouth gets restless; go out and about and the day passes.`,`So what you need is — <span class="hl">tasty food that doesn't make you gain</span>.`,`The answer is <strong>‘to find them’</strong>. Zero cola, konjac jelly, mushrooms, cabbage, cherry tomatoes… so many. As they add up, dieting gets easier.`]},
S15:{en:[`Keep finding them, and<br>swap in other pleasures`,`Case · 10kg in 3 weeks`,`She mixed Crystal Light powder into zero soda; it was tasty enough that she didn't need much else. (I tried it — not to my taste; preferences vary.)`,`People who couldn't lose every summer because of ice cream have, since last year, noticeably slimmed thanks to <span class="hl-amber">zero-calorie ice cream</span>.`,`7+ hours of sleep`,`Swap with hobbies`,`Especially, <strong>if you can't sleep, this appetite won't settle.</strong> One person, to quit his daily after-work drinks, practiced golf in that time as a different pleasure and lost over 20kg in 3 months.`]},
S16:{en:[`3. Diet`,`The heart of dieting is <span class="accent">‘practice’</span>`,`Oddly, people love making practice <strong>hard</strong> — low-salt, keto, intermittent fasting, macros, blood-sugar spikes, "eating at night makes you fat," and so on. Too many factors make practice harder.`,`A research story · meal timing`,`Four studies changed only the timing (morning/noon/night) of the same meal; three showed equal loss, and only one had the evening group lose less.`,`Not from eating then sleeping, but because <span class="hl">social and cultural factors led to eating a bit more at night</span> — i.e., just less practice.`]},
S17:{en:[`In the end, watch one thing: <span class="accent">calories</span>`,`If not this or that, then what? The <strong>calories</strong> from page 1. Watch only calories. Don't worry about the rest.`,`Low-calorie diet (VLD)`,`<span class="hl-amber">1,200–1,500kcal</span> a day. The <strong>most basic, textbook-level</strong> evidence, fine to sustain even for 6 months.`,`Very-low-calorie diet (VLCD)`,`<span class="hl-amber">Under 800kcal</span> a day. Useful done right, but <strong>over 2 weeks</strong> can be a strain.`,`Gallstones`,`Hair loss`,`Dizziness`,`Triggers bingeing`,`About 2 days is fine — even said to be healthy, since humans evolved to go hungry.`]},
S18:{en:[`VLCD,<br>as a way to <span class="accent">reduce appetite</span>`,`The director's own experience`,`I once gained over 10kg in 2 months; appetite ran wild and I rationalized eating too much. So instead of medicine, I did <span class="hl">2 days of VLCD</span>, appetite settled, I moved to a low-calorie diet and lost it well.`,`Say you keep to 1,200–1,500kcal, then eat 3–4,000kcal a day on a trip. Eating itself raises appetite, so you keep overeating even after you're back.`,`Then don't panic — <strong>handle it with a day or two of VLCD</strong> to settle appetite, then return to the low-calorie diet.`]},
S19:{en:[`Why do bread, rice cakes,<br>fruit, and drinks cause gain?`,`You could say "they're carbs," but eat just one piece of bread then fast and you'll lose. <span class="hl">Carbs don't always cause gain.</span>`,`The issue is they're <strong>tasty, easy to digest, and easy to overeat</strong>, so calories pile up fast.`,`A slice of cake 500–700kcal`,`Fruit, sweet potato, banana too`]},
S20:{en:[`4. Diet ②`,`Protein and veg are good,<br>but there's a <span class="accent">trap</span>`,`Protein and vegetables are good for fullness, but <strong>tofu is under half protein, and milk is over half carbs</strong>. Protein's big downside is eating a lot thinking "it's protein, so it's fine" — watch energy bars and protein shakes too.`,`Case · chicken, 10kg in 2 months`,`The trick: ‘eat a little.’ Someone who ate a whole chicken switched to <span class="hl-amber">2 pieces</span>. More doable than banning it entirely, she said.`,`The extension of this is <span class="hl">maintenance</span>. You can't avoid jajangmyeon forever — approach it by <strong>‘amount’ rather than ‘type’</strong>.`]},
S21:{en:[`Predict when appetite rises<br>and <span class="accent">prepare</span>`,`Old research says humans have an instinct to binge after a successful hunt following hunger. <span class="hl">Once food enters the mouth, appetite rises and keeps you eating</span> — a survival instinct shared by people, cats, and dogs.`,`Prep tips`,`· You'll obviously finish a whole chicken, so <strong>keep 2 pieces out and freeze the rest</strong>.`,`· For ramen too, <strong>snap off and toss half</strong> before cooking.`,`· If you crave jelly and buy it, keep 2–3 and <strong>share the rest with your team</strong>.`,`To someone who ate 3 red-bean buns on the spot — "One raises appetite so you eat all 3, so <strong>buy just one to begin with</strong>." Practice while the medicine keeps appetite in check.`]},
S22:{en:[`Remember ‘<span class="accent">400kcal</span>’`,`Diet lunchboxes help. Most are <span class="hl-amber">within 400kcal</span>, and ×3 is 1,200kcal — the low-calorie standard. Without a sense of portions, use the box as a sample for regular meals.`,`Getting a feel`,`Burger King Jr. Whopper <span class="hl-amber">390kcal</span> + zero cola → "I'll lose on this." Quattro Cheese Whopper <span class="hl-amber">800kcal</span> → "I'll eat half."`,`Bakery breakfast — tasty one 500kcal, plain one 300kcal? You can eat <strong>half the tasty one</strong>.`,`Numbers you couldn't see start appearing. <strong>Eat what you want, but by ‘amount’ — the unit is ‘calories’.</strong>`]},
S23:{en:[`Ate too much · ate too little —<br>by what <span class="accent">standard</span>?`,`Watching calories is the point, but you can't count them every time. Even experts find it hard.`,`So it'd help to have one more gauge of ‘a lot / a little,’ <strong>besides calories</strong>.`,`Besides calories (kcal) — <span class="hl">by what</span> can you judge a lot vs. a little?`,`Fullness? Your past memory? Friends' talk? … Take a moment to think.`]},
S24:{en:[`You actually learned it —<br>it's <span class="accent">weight change</span>`,`Fullness, old memory, friends' talk — <strong>all inaccurate.</strong> The answer is <span class="hl">weight change</span>.`,`Gained? You ate. Lost? You ate less. Held steady? You ate at maintenance. Even with bread and drinks, if weight held, that was maintenance eating.`,`Intake`,`calories in`,`Output (fixed)`,`calories out`,`Observed`,`weight change`,`Intake is hard to measure each time, but <strong>weight just takes a morning check</strong>. Self-monitoring that learns eating from weight change — don't lose this direction.`]},
S25:{en:[`Alcohol`,`Medication on drinking days,<br>and <span class="accent">snacks</span>`,`On drinking days, <strong>skip the evening dose</strong>, and if the next day is rough, pause the medicine briefly. You may get drunk faster than usual, so drink plenty of water and be careful.`,`Dried pollack`,`Dried squid`,`Flatfish sashimi`,`Rockfish sashimi`,`These snacks have a protein ratio like chicken breast, so use them well.`,`A bottle of soju = <span class="hl-amber">400kcal</span>. Half a bottle + a palm-sized snack is 400kcal — a "lost weight today!" feeling. Finish a bottle and, even with careful snacks, it's 600kcal — not bad. But <span class="hl-amber">1,500 at a second venue, 3,000kcal at a third</span> wrecks the day's diet, so handle it next day with VLCD.`]},
S26:{en:[`Exercise`,`Don't overlap<br>exercise and medication`,`If you exercise in the evening, take <strong>only the morning and noon doses</strong> and skip the evening one.`,`On days of hiking or all-day outdoor activity, <strong>skipping the medicine for a day</strong> is fine too. <span class="hl-amber">(Watch for low blood sugar.)</span>`,`It's also best to be careful with or avoid <strong>fasted exercise</strong>.`]},
S27:{en:[`5. Discomfort`,`The order energy is used, and<br><span class="accent">ketone metabolism</span>`,`Energy is used in the order <strong>carbs → fat → protein</strong>. (Reaching protein is actually hard.)`,`Depleting carbs to burn fat is the idea behind intermittent fasting, keto, and fasted cardio — but eat again afterward and you regain. We go with <span class="hl">sustaining a low-calorie diet while taking medicine</span>.`,`Burning fat for energy is <strong>ketone metabolism</strong>. You lose weight and it's good, but breath smells, the mouth turns sour and bone-dry. When that happens, think "oh, I'm losing well!" and <span class="hl-amber">drink 2L+ of water a day</span>.`]},
S28:{en:[`The real issues are <span class="accent">water and low blood sugar</span>`,`As carbs are flushed out, they <strong>drag water with them.</strong> You can swing 1kg+ in a single day. It's not "nice, swelling's gone" — it's just a water bottle leaving.`,`Watch for <span class="hl-amber">low blood sugar</span> — standing up and going dark, as if low on blood. It's common in the morning and afternoon, so <strong>top up sugar + water</strong> well.`,`Carbs also sit in muscle as <strong>glycogen</strong> and leave; then muscles tense, causing headaches, hand tremors, and cramps. So <span class="hl">before exercise you may actually need carbs</span>.`]},
S29:{en:[`Other symptoms and<br><span class="accent">how to take it</span>`,`If your stomach burns taking it on an empty stomach, take it <strong>before or after meals</strong>. With almond milk and the like is fine too.`,`In women, body-fat change relates to female hormones and can cause temporary <strong>menstrual irregularity</strong>; in men, temporary <strong>erectile difficulty</strong> — both recover after skipping a day or two, and improve as you lose weight. For <strong>constipation</strong>, there's a separate medicine we provide.`,`If <strong>an allergy</strong> appears, stop and contact us. (No allergies, right?) For any other discomfort too, stop and contact us right away.`]},
S30:{en:[`Final quiz · why did those<br>1–2kg <span class="accent">suddenly</span> come back?`,`Lose 10kg well, then gain 1–2kg right after one big meal — frustrating. It is from eating more, but the key is <span class="hl">water shift</span>.`,`A 1–2kg daily move can't be fat. Water moving back and forth confuses us. So loss can come in <strong>steps</strong> — dropping, stalling, dropping.`,`How to tell water from a real stall? → Check by <span class="hl">waist size (volume, the mirror)</span>. If your waist is shrinking, you're doing well.`,`<strong>That's all. Any questions? Thank you for your hard work.</strong>`]}
};
function addLang(code,obj){ Object.keys(obj).forEach(function(id){ if(!TR[id])TR[id]={}; TR[id][code]=obj[id]; }); }
addLang('zh-cn', {
S01:[`现在开始为您讲解<span class="accent">减重原理与中药服用方法</span>`,`我们一起来看核心概念与方向。`],
S02:[`1. 减重基本概念`,`“减重”其实就是<span class="accent">“热量不足”</span>`,`开药很重要，但<strong>概念与方向</strong>更重要。理解一次，今后都会很有帮助。`,`变瘦不是“运动、节食、吃药”，而是<span class="hl">持续制造热量不足</span>。`,`这种热量不足，可以持续<strong>大约6个月</strong>。`],
S03:[`从第3个月开始变慢，<br>6个月后会越来越难掉`,`节食、运动、药物——<strong>无论哪种方式，趋势都相似</strong>。`,`为什么？是<span class="hl">“执行”问题</span>，不是基础代谢下降或对药产生耐受。`,`研究小故事`,`有研究让人不反弹地连续两次成功减重，方法就是<span class="hl-amber">给予金钱奖励</span>。`,`这说明<strong>动机</strong>比身体反应更重要——长期战更是如此。`],
S04:[`什么是<br>热量不足？`,`就是消耗的热量多于摄入的热量。`,`出去的比进来的多，就会变瘦。`,`摄入`,`吃进去的`,`消耗`,`消耗掉的`,`结果`,`减重`,`问题是，大家以为影响它的因素很多——<strong>体质、肠道菌群、年龄、肌肉量、基础代谢</strong>等等。`],
S05:[`这些之中有重要的吗？<br><span class="accent">其实没有。</span>`,`<strong>基础代谢</strong>难以测量，有研究显示从20岁到60岁基本不变。它接近生命维持装置，很难视为左右体重的大变量。`,`<strong>肌肉量</strong>也类似。很难说是因为肌肉减少而突然变胖。`,`<strong>年龄</strong>可惜无法改变；<strong>肠道菌群</strong>研究了十多年，仍很难说能让人变瘦。<strong>体质</strong>管理虽好，但很难说是体质突然改变让人变胖。`],
S06:[`别管众多变量，<br>只专注<span class="accent">2件事</span>`,`① 饮食控制`,`两者中<strong>更重要的一个</strong>。胜负最终在这里分出。`,`② 运动`,`对身体绝对有益，但要急剧增加热量消耗比想象中难。`,`若一天大约消耗<span class="hl-amber">1,800kcal（女）·2,000kcal（男）</span>，加一小时运动也只增加约<span class="hl-amber">300~400kcal</span>。`,`运动虽好，但把<span class="hl">热量消耗视为“固定值”</span>会更有利。`],
S07:[`摄入是“变量”，<br>消耗是“固定值”`,`吃东西：断食0kcal，吃多了<span class="hl-amber">4~5,000kcal</span>——一天波动<strong>1,000kcal以上</strong>。`,`摄入大幅波动，消耗相对固定。想着“明天运动就好”而多吃2~3,000kcal、只烧3~400kcal，划得来吗？`,`所以把体重的原因收窄到<span class="hl">一件事——“吃”</span>。`,`胖了？是吃了。吃少了？掉了！只在这里来回即可。我们把因果收窄成一个。`],
S08:[`“吃得一样，<br>为什么胖了？”`,`看似简单，但大家做不到。“我没吃多啊？以前这样就掉了！”于是脱离因果。“是年龄？基础代谢降了？”想法又乱跳。`,`长期研究的答案很平淡：<span class="hl">其实没吃得一样，只是自己没察觉</span>。`,`比喻`,`就像“这个月信用卡怎么这么多？不可能！”`,`明明吃了2~3,000kcal，却以为只吃了<span class="hl-amber">1,200kcal</span>——一天可差800~1,000kcal。`,`所以耸耸肩说“大概就是吃多了吧”，<strong>从“吃”里找原因</strong>，思路就不会偏。`],
S09:[`少吃了还不掉？<br><span class="accent">那就再少吃</span>`,`少吃、再称、不掉——想法又乱跳。陷阱在于你停止了对“吃”的检讨。<span class="hl">不够就再减、再检讨</span>即可。`,`真实案例 · 一位发型师`,`“我几乎没吃却还胖”，她把每餐都拍给教练看，教练说“这样不可能胖”。`,`一问，她每天喝<span class="hl-amber">1L牛奶</span>——以为是蛋白质。`,`豆浆、香蕉、坚果、燕麦、糙米饭、红薯——都可能让人胖。<strong>答案永远在“吃”里。</strong>`],
S10:[`这就是<span class="accent">自我监测</span>`,`检讨饮食 → 测体重 → 检讨 → 测体重。在这个因果里来回，<span class="hl">反复观察与学习</span>。`,`以此为基础的人，再去添加——<strong>运动、药物、施术</strong>。`,`始终<strong>以饮食控制为先</strong>，再搭建其余，才不会被牵着走。`],
S11:[`2. 药的效果，以及食欲`,`为什么要吃中药，<br>有什么效果？`,`① 加速减重`,`同样努力，减重可达<span class="hl-amber">2~3倍</span>。提高热量消耗以加速减重。`,`② 抑制食欲`,`带来饱腹感、帮助抑制食欲，让饮食控制更轻松。`,`③ 缓解不适`,`用适合体质的药材减轻不适，辅助减重过程。`],
S12:[`食欲大致分<span class="accent">两类</span>`,`真正饿出来的食欲`,`想象断食一周——疲惫、肚子咕咕、很难受。那时吃面包零食，是<strong>真正需要热量的食欲</strong>。`,`并非如此的食欲`,`吃面包零食不是为了变胖，而是因为好吃。这是为了<strong>刺激与愉悦、而非热量</strong>的食欲。`],
S13:[`中药能压的食欲 vs<br>药压不住的食欲`,`中药有助于减少<span class="hl">“饿出来的食欲”</span>。咕咕叫、疲惫、困倦明显减少，节食也不太辛苦。`,`但<strong>为刺激与愉悦的食欲</strong>，中药难以完全压住。压力大、睡不好就想吃甜的——这是结合睡眠等多因素的食欲。`,`用药把这种食欲压得太狠，<span class="hl-amber">停药后食欲可能爆发、导致反弹</span>。所以需要一定程度的理解与管理。`],
S14:[`去掉热量，<br>只提供<span class="accent">刺激与愉悦</span>`,`这种食欲想要的是“刺激与愉悦”，所以去掉热量、只供给这部分即可。整天在家嘴会闲，出门走动一天就过去了。`,`所以需要的就是——<span class="hl">好吃又不发胖的食物</span>。`,`答案是<strong>“去找”</strong>。零度可乐、蒟蒻果冻、蘑菇、卷心菜、圣女果……非常多。一样样增多，减重就越来越轻松。`],
S15:[`不断去找，<br>用别的愉悦来替代`,`案例 · 3周减10kg`,`她把Crystal Light粉冲进零度汽水，好喝到不太需要吃别的。（我也买过，不合我口味——口味因人而异。）`,`每到夏天因冰淇淋而减不下来的人，自去年起靠<span class="hl-amber">零卡冰淇淋</span>明显瘦了。`,`睡眠7小时以上`,`用兴趣爱好替代`,`尤其<strong>睡不好时，这种食欲压不住。</strong>有位为戒掉下班后每天的酒，把那段时间用来练高尔夫作为别的愉悦，3个月减了20kg以上。`],
S16:[`3. 饮食控制`,`饮食控制的核心是<span class="accent">“执行”</span>`,`可大家偏偏喜欢把执行<strong>变难</strong>——低盐、生酮、间歇性断食、营养素配比、血糖飙升、“晚上吃会胖”等等。想太多因素，执行反而更难。`,`研究小故事 · 进食时间`,`把同一份餐只改早/午/晚时间的研究做过4次，3次掉得一样，只有1次晚餐组掉得少。`,`并非吃完就睡，而是<span class="hl">受社会文化影响，晚上多吃了一点</span>——也就是执行不够而已。`],
S17:[`最终只看一样：<span class="accent">热量</span>`,`不是这也不是那，那执行什么？就是第1页的<strong>热量</strong>。只看热量，其余别管。`,`低热量饮食 (VLD)`,`每天<span class="hl-amber">1,200~1,500kcal</span>。可持续6个月的<strong>最基本、教科书级</strong>依据。`,`极低热量饮食 (VLCD)`,`每天<span class="hl-amber">800kcal以下</span>。用得好很棒，但<strong>超过2周</strong>可能造成负担。`,`胆结石`,`脱发`,`头晕`,`诱发暴食`,`2天左右没问题，甚至说有益健康——人类本就是会挨饿的身体。`],
S18:[`极低热量饮食，<br>作为<span class="accent">降低食欲的手段</span>`,`院长亲身经历`,`我曾在2个月增重超过10kg，食欲失控、不断找借口吃太多。于是不靠药，而是做了<span class="hl">2天极低热量饮食</span>，食欲稳住，再转低热量饮食，顺利减下。`,`比如一直保持1,200~1,500kcal，旅行时一天吃了3~4,000kcal。吃这件事本身会抬高食欲，回来后也会继续多吃。`,`这时别慌——<strong>用一两天极低热量饮食应对</strong>、稳住食欲，再回到低热量饮食即可。`],
S19:[`面包·年糕·水果·饮料<br>为什么会让人胖？`,`可以说“因为是碳水”，但面包只吃一个再断食也会掉。<span class="hl">不是碳水就一定胖。</span>`,`问题在于它们<strong>好吃、好消化、容易多吃</strong>，热量很快就堆得很高。`,`一块蛋糕 500~700kcal`,`水果·红薯·香蕉也要注意`],
S20:[`4. 饮食控制 ②`,`蛋白质·蔬菜虽好，<br>也有<span class="accent">陷阱</span>`,`蛋白质和蔬菜有饱腹感很好，但<strong>豆腐的蛋白质不到一半，牛奶一半以上是碳水</strong>。蛋白质最大的缺点是“是蛋白质应该没事吧”而吃很多——能量棒、蛋白奶昔也要小心。`,`案例 · 吃鸡2个月10kg`,`秘诀是“少吃”。本来吃一整只的人改成<span class="hl-amber">2块</span>。比完全禁止更可行。`,`这种方式的延伸就是<span class="hl">维持</span>。炸酱面不可能一辈子不吃——用<strong>“量”而非“种类”</strong>来思考。`],
S21:[`预测食欲上来的时刻，<br>提前<span class="accent">做准备</span>`,`旧研究显示，人类有“挨饿后狩猎成功就暴食”的本能。<span class="hl">食物一入口就抬高食欲、让你继续吃</span>——人、猫、狗都一样，是生存本能。`,`应对要领`,`· 一整只鸡明摆着会吃光，<strong>只留2块，其余放冷冻</strong>。`,`· 泡面也在煮之前<strong>掰掉一半扔掉</strong>再煮。`,`· 太想吃果冻而买了，就留2~3个，<strong>其余分给同事</strong>。`,`对当场吃完3个红豆面包的人——“吃一个就抬高食欲、结果三个都吃光，所以<strong>一开始就只买一个</strong>。”趁吃药、食欲被压住时多多练习。`],
S22:[`记住“<span class="accent">400kcal</span>”`,`善用减脂便当。大多在<span class="hl-amber">400kcal以内</span>，×3就是1,200kcal、低热量饮食标准。没有分量感时，就拿便当当样本套用到平常餐。`,`找感觉的例子`,`汉堡王小皇堡<span class="hl-amber">390kcal</span>+零度可乐 →“吃这个会掉。”四重芝士皇堡<span class="hl-amber">800kcal</span> →“吃一半就好。”`,`面包店早餐——好吃的500kcal、一般的300kcal？<strong>好吃的吃一半</strong>也可以。`,`看不见的数字会渐渐看见。<strong>想吃就吃，但用“量”来看——单位是“热量”。</strong>`],
S23:[`吃多了·吃少了，<br>那个<span class="accent">标准</span>是什么？`,`只看热量是对的，但不可能每次都算。专家也很难。`,`所以最好再有一个判断“多/少”的标准，<strong>热量之外</strong>。`,`除了热量(kcal)——<span class="hl">用什么</span>来判断多与少？`,`饱腹感？过去的记忆？朋友说的？……稍微想一想。`],
S24:[`其实，已经学过了——<br>就是<span class="accent">体重变化</span>`,`饱腹感、过去记忆、朋友说的——<strong>全都不准。</strong>答案是<span class="hl">体重变化</span>。`,`胖了就是吃了，瘦了就是吃少了，维持就是吃了维持量。即使吃面包喝酒，只要体重维持，那就是维持餐。`,`摄入`,`热量摄入`,`消耗(固定)`,`热量消耗`,`观测值`,`体重变化`,`摄入每次都难测，但<strong>体重早上一称就好</strong>。用体重变化来学习“吃”的自我监测——别丢掉这个方向。`],
S25:[`饮酒`,`喝酒日的用药，<br>以及<span class="accent">下酒菜</span>`,`喝酒日<strong>别吃晚上那次药</strong>，第二天难受就先停药。可能比平时醉得快，请多喝水、多注意。`,`明太鱼干`,`鱿鱼干`,`比目鱼生鱼片`,`黑鲪鱼生鱼片`,`以上下酒菜的蛋白质比例堪比鸡胸肉，可好好利用。`,`一瓶烧酒=<span class="hl-amber">400kcal</span>。半瓶+巴掌大的下酒菜就是400kcal，会有“今天瘦了！”的感觉。喝完一瓶、就算注意下酒菜也约600kcal——不算差。但<span class="hl-amber">第二摊1,500、第三摊3,000kcal</span>，当天减重就毁了，第二天用极低热量饮食应对。`],
S26:[`运动`,`运动和药<br><span class="accent">别重叠</span>`,`晚上运动，就<strong>只吃早、午的药</strong>，别吃晚上那次。`,`爬山或一整天户外活动的日子，<strong>停药一天</strong>也好。<span class="hl-amber">（注意低血糖）</span>`,`<strong>空腹运动</strong>也最好小心或避免。`],
S27:[`5. 不适症状`,`能量使用顺序与<br><span class="accent">酮体代谢</span>`,`能量按<strong>碳水 → 脂肪 → 蛋白质</strong>顺序使用。（其实很难用到蛋白质。）`,`耗尽碳水以燃烧脂肪，是间歇性断食、生酮、空腹有氧的思路——但之后再吃又会胖。我们采取<span class="hl">持续低热量饮食并服药</span>的方式。`,`把脂肪当能量用叫<strong>酮体代谢</strong>。会瘦、也好，但会口臭、口酸、口干。那时就想“哦，掉得不错！”然后<span class="hl-amber">每天喝2L以上的水</span>。`],
S28:[`真正的问题是<span class="accent">水分与低血糖</span>`,`碳水排出时会<strong>把水分一起带走。</strong>一天也能波动1kg以上。不是“消肿真好”，而是出去了一瓶水而已。`,`要小心<span class="hl-amber">低血糖</span>——像血不够一样，坐着站起来眼前发黑。早晨和午后易发生，所以<strong>补糖+补水</strong>要做好。`,`碳水也以<strong>糖原</strong>形式存在肌肉里、随之流失，肌肉就紧张，可能头痛、手抖、抽筋。所以<span class="hl">运动前反而可能需要吃碳水</span>。`],
S29:[`其他症状与<br><span class="accent">服用方法</span>`,`空腹吃药会烧心的话，请<strong>饭前或饭后</strong>吃。与杏仁奶等同服也可以。`,`女性因体脂变化与女性激素相关，可能出现暂时性<strong>月经不调</strong>；男性可能暂时性<strong>勃起障碍</strong>——停一两天即可恢复，瘦下来反而改善。<strong>便秘</strong>另有提供的药。`,`若出现<strong>过敏</strong>，请停用并联系我们。（应该没有过敏吧？）其他不适也请停用并立即联系。`],
S30:[`最后小测 · 那1~2kg<br>为何<span class="accent">突然</span>回来了？`,`好不容易减了10kg，一顿多吃就马上回来1~2kg，很冤吧。确实是吃多了，但关键是<span class="hl">水分移动</span>。`,`一天1~2kg的变动不可能是脂肪。水分来回移动让我们困惑。所以可能呈<strong>阶梯式</strong>掉——掉、停、再掉。`,`怎么分辨是水分还是真停滞？→ 用<span class="hl">腰围（体积、镜子里的身形）</span>来确认。腰在变细，就说明做得好。`,`<strong>到这里就结束了。有什么问题吗？辛苦了。</strong>`]
});
addLang('zh-tw', {
S01:[`現在開始為您講解<span class="accent">減重原理與中藥服用方法</span>`,`我們一起來看核心概念與方向。`],
S02:[`1. 減重基本概念`,`“減重”其實就是<span class="accent">“熱量不足”</span>`,`開藥很重要，但<strong>概念與方向</strong>更重要。理解一次，今後都會很有幫助。`,`變瘦不是“運動、節食、吃藥”，而是<span class="hl">持續製造熱量不足</span>。`,`這種熱量不足，可以持續<strong>大約6個月</strong>。`],
S03:[`從第3個月開始變慢，<br>6個月後會越來越難掉`,`節食、運動、藥物——<strong>無論哪種方式，趨勢都相似</strong>。`,`為什麼？是<span class="hl">“執行”問題</span>，不是基礎代謝下降或對藥產生耐受。`,`研究小故事`,`有研究讓人不反彈地連續兩次成功減重，方法就是<span class="hl-amber">給予金錢獎勵</span>。`,`這說明<strong>動機</strong>比身體反應更重要——長期戰更是如此。`],
S04:[`什麼是<br>熱量不足？`,`就是消耗的熱量多於攝入的熱量。`,`出去的比進來的多，就會變瘦。`,`攝入`,`吃進去的`,`消耗`,`消耗掉的`,`結果`,`減重`,`問題是，大家以為影響它的因素很多——<strong>體質、腸道菌群、年齡、肌肉量、基礎代謝</strong>等等。`],
S05:[`這些之中有重要的嗎？<br><span class="accent">其實沒有。</span>`,`<strong>基礎代謝</strong>難以測量，有研究顯示從20歲到60歲基本不變。它接近生命維持裝置，很難視為左右體重的大變數。`,`<strong>肌肉量</strong>也類似。很難說是因為肌肉減少而突然變胖。`,`<strong>年齡</strong>可惜無法改變；<strong>腸道菌群</strong>研究了十多年，仍很難說能讓人變瘦。<strong>體質</strong>管理雖好，但很難說是體質突然改變讓人變胖。`],
S06:[`別管眾多變數，<br>只專注<span class="accent">2件事</span>`,`① 飲食控制`,`兩者中<strong>更重要的一個</strong>。勝負最終在這裡分出。`,`② 運動`,`對身體絕對有益，但要急劇增加熱量消耗比想象中難。`,`若一天大約消耗<span class="hl-amber">1,800kcal（女）·2,000kcal（男）</span>，加一小時運動也只增加約<span class="hl-amber">300~400kcal</span>。`,`運動雖好，但把<span class="hl">熱量消耗視為“固定值”</span>會更有利。`],
S07:[`攝入是“變數”，<br>消耗是“固定值”`,`吃東西：斷食0kcal，吃多了<span class="hl-amber">4~5,000kcal</span>——一天波動<strong>1,000kcal以上</strong>。`,`攝入大幅波動，消耗相對固定。想著“明天運動就好”而多吃2~3,000kcal、只燒3~400kcal，划得來嗎？`,`所以把體重的原因收窄到<span class="hl">一件事——“吃”</span>。`,`胖了？是吃了。吃少了？掉了！只在這裡來回即可。我們把因果收窄成一個。`],
S08:[`“吃得一樣，<br>為什麼胖了？”`,`看似簡單，但大家做不到。“我沒吃多啊？以前這樣就掉了！”於是脫離因果。“是年齡？基礎代謝降了？”想法又亂跳。`,`長期研究的答案很平淡：<span class="hl">其實沒吃得一樣，只是自己沒察覺</span>。`,`比喻`,`就像“這個月信用卡怎麼這麼多？不可能！”`,`明明吃了2~3,000kcal，卻以為只吃了<span class="hl-amber">1,200kcal</span>——一天可差800~1,000kcal。`,`所以聳聳肩說“大概就是吃多了吧”，<strong>從“吃”裡找原因</strong>，思路就不會偏。`],
S09:[`少吃了還不掉？<br><span class="accent">那就再少吃</span>`,`少吃、再稱、不掉——想法又亂跳。陷阱在於你停止了對“吃”的檢討。<span class="hl">不夠就再減、再檢討</span>即可。`,`真實案例 · 一位髮型師`,`“我幾乎沒吃卻還胖”，她把每餐都拍給教練看，教練說“這樣不可能胖”。`,`一問，她每天喝<span class="hl-amber">1L牛奶</span>——以為是蛋白質。`,`豆漿、香蕉、堅果、燕麥、糙米飯、地瓜——都可能讓人胖。<strong>答案永遠在“吃”裡。</strong>`],
S10:[`這就是<span class="accent">自我監測</span>`,`檢討飲食 → 測體重 → 檢討 → 測體重。在這個因果裡來回，<span class="hl">反覆觀察與學習</span>。`,`以此為基礎的人，再去新增——<strong>運動、藥物、施術</strong>。`,`始終<strong>以飲食控制為先</strong>，再搭建其餘，才不會被牽著走。`],
S11:[`2. 藥的效果，以及食慾`,`為什麼要吃中藥，<br>有什麼效果？`,`① 加速減重`,`同樣努力，減重可達<span class="hl-amber">2~3倍</span>。提高熱量消耗以加速減重。`,`② 抑制食慾`,`帶來飽腹感、幫助抑制食慾，讓飲食控制更輕鬆。`,`③ 緩解不適`,`用適合體質的藥材減輕不適，輔助減重過程。`],
S12:[`食慾大致分<span class="accent">兩類</span>`,`真正餓出來的食慾`,`想象斷食一週——疲憊、肚子咕咕、很難受。那時吃麵包零食，是<strong>真正需要熱量的食慾</strong>。`,`並非如此的食慾`,`吃麵包零食不是為了變胖，而是因為好吃。這是為了<strong>刺激與愉悅、而非熱量</strong>的食慾。`],
S13:[`中藥能壓的食慾 vs<br>藥壓不住的食慾`,`中藥有助於減少<span class="hl">“餓出來的食慾”</span>。咕咕叫、疲憊、睏倦明顯減少，節食也不太辛苦。`,`但<strong>為刺激與愉悅的食慾</strong>，中藥難以完全壓住。壓力大、睡不好就想吃甜的——這是結合睡眠等多因素的食慾。`,`用藥把這種食慾壓得太狠，<span class="hl-amber">停藥後食慾可能爆發、導致反彈</span>。所以需要一定程度的理解與管理。`],
S14:[`去掉熱量，<br>只提供<span class="accent">刺激與愉悅</span>`,`這種食慾想要的是“刺激與愉悅”，所以去掉熱量、只供給這部分即可。整天在家嘴會閒，出門走動一天就過去了。`,`所以需要的就是——<span class="hl">好吃又不發胖的食物</span>。`,`答案是<strong>“去找”</strong>。無糖可樂、蒟蒻果凍、蘑菇、高麗菜、小番茄……非常多。一樣樣增多，減重就越來越輕鬆。`],
S15:[`不斷去找，<br>用別的愉悅來替代`,`案例 · 3周減10kg`,`她把Crystal Light粉衝進零度汽水，好喝到不太需要吃別的。（我也買過，不合我口味——口味因人而異。）`,`每到夏天因冰淇淋而減不下來的人，自去年起靠<span class="hl-amber">零卡冰淇淋</span>明顯瘦了。`,`睡眠7小時以上`,`用興趣愛好替代`,`尤其<strong>睡不好時，這種食慾壓不住。</strong>有位為戒掉下班後每天的酒，把那段時間用來練高爾夫作為別的愉悅，3個月減了20kg以上。`],
S16:[`3. 飲食控制`,`飲食控制的核心是<span class="accent">“執行”</span>`,`可大家偏偏喜歡把執行<strong>變難</strong>——低鹽、生酮、間歇性斷食、營養素配比、血糖飆升、“晚上吃會胖”等等。想太多因素，執行反而更難。`,`研究小故事 · 進食時間`,`把同一份餐只改早/午/晚時間的研究做過4次，3次掉得一樣，只有1次晚餐組掉得少。`,`並非吃完就睡，而是<span class="hl">受社會文化影響，晚上多吃了一點</span>——也就是執行不夠而已。`],
S17:[`最終只看一樣：<span class="accent">熱量</span>`,`不是這也不是那，那執行什麼？就是第1頁的<strong>熱量</strong>。只看熱量，其餘別管。`,`低熱量飲食 (VLD)`,`每天<span class="hl-amber">1,200~1,500kcal</span>。可持續6個月的<strong>最基本、教科書級</strong>依據。`,`極低熱量飲食 (VLCD)`,`每天<span class="hl-amber">800kcal以下</span>。用得好很棒，但<strong>超過2周</strong>可能造成負擔。`,`膽結石`,`脫髮`,`頭暈`,`誘發暴食`,`2天左右沒問題，甚至說有益健康——人類本就是會捱餓的身體。`],
S18:[`極低熱量飲食，<br>作為<span class="accent">降低食慾的手段</span>`,`院長親身經歷`,`我曾在2個月增重超過10kg，食慾失控、不斷找藉口吃太多。於是不靠藥，而是做了<span class="hl">2天極低熱量飲食</span>，食慾穩住，再轉低熱量飲食，順利減下。`,`比如一直保持1,200~1,500kcal，旅行時一天吃了3~4,000kcal。吃這件事本身會抬高食慾，回來後也會繼續多吃。`,`這時別慌——<strong>用一兩天極低熱量飲食應對</strong>、穩住食慾，再回到低熱量飲食即可。`],
S19:[`麵包·年糕·水果·飲料<br>為什麼會讓人胖？`,`可以說“因為是碳水”，但麵包只吃一個再斷食也會掉。<span class="hl">不是碳水就一定胖。</span>`,`問題在於它們<strong>好吃、好消化、容易多吃</strong>，熱量很快就堆得很高。`,`一塊蛋糕 500~700kcal`,`水果·地瓜·香蕉也要注意`],
S20:[`4. 飲食控制 ②`,`蛋白質·蔬菜雖好，<br>也有<span class="accent">陷阱</span>`,`蛋白質和蔬菜有飽腹感很好，但<strong>豆腐的蛋白質不到一半，牛奶一半以上是碳水</strong>。蛋白質最大的缺點是“是蛋白質應該沒事吧”而吃很多——能量棒、蛋白奶昔也要小心。`,`案例 · 吃雞2個月10kg`,`秘訣是“少吃”。本來吃一整隻的人改成<span class="hl-amber">2塊</span>。比完全禁止更可行。`,`這種方式的延伸就是<span class="hl">維持</span>。炸醬麵不可能一輩子不吃——用<strong>“量”而非“種類”</strong>來思考。`],
S21:[`預測食慾上來的時刻，<br>提前<span class="accent">做準備</span>`,`舊研究顯示，人類有“捱餓後狩獵成功就暴食”的本能。<span class="hl">食物一入口就抬高食慾、讓你繼續吃</span>——人、貓、狗都一樣，是生存本能。`,`應對要領`,`· 一整隻雞明擺著會吃光，<strong>只留2塊，其餘放冷凍</strong>。`,`· 泡麵也在煮之前<strong>掰掉一半扔掉</strong>再煮。`,`· 太想吃果凍而買了，就留2~3個，<strong>其餘分給同事</strong>。`,`對當場吃完3個紅豆麵包的人——“吃一個就抬高食慾、結果三個都吃光，所以<strong>一開始就只買一個</strong>。”趁吃藥、食慾被壓住時多多練習。`],
S22:[`記住“<span class="accent">400kcal</span>”`,`善用減脂便當。大多在<span class="hl-amber">400kcal以內</span>，×3就是1,200kcal、低熱量飲食標準。沒有分量感時，就拿便當當樣本套用到平常餐。`,`找感覺的例子`,`漢堡王小皇堡<span class="hl-amber">390kcal</span>+無糖可樂 →“吃這個會掉。”四重芝士皇堡<span class="hl-amber">800kcal</span> →“吃一半就好。”`,`麵包店早餐——好吃的500kcal、一般的300kcal？<strong>好吃的吃一半</strong>也可以。`,`看不見的數字會漸漸看見。<strong>想吃就吃，但用“量”來看——單位是“熱量”。</strong>`],
S23:[`吃多了·吃少了，<br>那個<span class="accent">標準</span>是什麼？`,`只看熱量是對的，但不可能每次都算。專家也很難。`,`所以最好再有一個判斷“多/少”的標準，<strong>熱量之外</strong>。`,`除了熱量(kcal)——<span class="hl">用什麼</span>來判斷多與少？`,`飽腹感？過去的記憶？朋友說的？……稍微想一想。`],
S24:[`其實，已經學過了——<br>就是<span class="accent">體重變化</span>`,`飽腹感、過去記憶、朋友說的——<strong>全都不準。</strong>答案是<span class="hl">體重變化</span>。`,`胖了就是吃了，瘦了就是吃少了，維持就是吃了維持量。即使吃麵包喝酒，只要體重維持，那就是維持餐。`,`攝入`,`熱量攝入`,`消耗(固定)`,`熱量消耗`,`觀測值`,`體重變化`,`攝入每次都難測，但<strong>體重早上一稱就好</strong>。用體重變化來學習“吃”的自我監測——別丟掉這個方向。`],
S25:[`飲酒`,`喝酒日的用藥，<br>以及<span class="accent">下酒菜</span>`,`喝酒日<strong>別吃晚上那次藥</strong>，第二天難受就先停藥。可能比平時醉得快，請多喝水、多注意。`,`明太魚乾`,`魷魚乾`,`比目魚生魚片`,`黑鮶魚生魚片`,`以上下酒菜的蛋白質比例堪比雞胸肉，可好好利用。`,`一瓶燒酒=<span class="hl-amber">400kcal</span>。半瓶+巴掌大的下酒菜就是400kcal，會有“今天瘦了！”的感覺。喝完一瓶、就算注意下酒菜也約600kcal——不算差。但<span class="hl-amber">第二攤1,500、第三攤3,000kcal</span>，當天減重就毀了，第二天用極低熱量飲食應對。`],
S26:[`運動`,`運動和藥<br><span class="accent">別重疊</span>`,`晚上運動，就<strong>只吃早、午的藥</strong>，別吃晚上那次。`,`爬山或一整天戶外活動的日子，<strong>停藥一天</strong>也好。<span class="hl-amber">（注意低血糖）</span>`,`<strong>空腹運動</strong>也最好小心或避免。`],
S27:[`5. 不適症狀`,`能量使用順序與<br><span class="accent">酮體代謝</span>`,`能量按<strong>碳水 → 脂肪 → 蛋白質</strong>順序使用。（其實很難用到蛋白質。）`,`耗盡碳水以燃燒脂肪，是間歇性斷食、生酮、空腹有氧的思路——但之後再吃又會胖。我們採取<span class="hl">持續低熱量飲食並服藥</span>的方式。`,`把脂肪當能量用叫<strong>酮體代謝</strong>。會瘦、也好，但會口臭、口酸、口乾。那時就想“哦，掉得不錯！”然後<span class="hl-amber">每天喝2L以上的水</span>。`],
S28:[`真正的問題是<span class="accent">水分與低血糖</span>`,`碳水排出時會<strong>把水分一起帶走。</strong>一天也能波動1kg以上。不是“消腫真好”，而是出去了一瓶水而已。`,`要小心<span class="hl-amber">低血糖</span>——像血不夠一樣，坐著站起來眼前發黑。早晨和午後易發生，所以<strong>補糖+補水</strong>要做好。`,`碳水也以<strong>糖原</strong>形式存在肌肉裡、隨之流失，肌肉就緊張，可能頭痛、手抖、抽筋。所以<span class="hl">運動前反而可能需要吃碳水</span>。`],
S29:[`其他症狀與<br><span class="accent">服用方法</span>`,`空腹吃藥會燒心的話，請<strong>飯前或飯後</strong>吃。與杏仁奶等同服也可以。`,`女性因體脂變化與女性激素相關，可能出現暫時性<strong>月經不調</strong>；男性可能暫時性<strong>勃起障礙</strong>——停一兩天即可恢復，瘦下來反而改善。<strong>便秘</strong>另有提供的藥。`,`若出現<strong>過敏</strong>，請停用並聯系我們。（應該沒有過敏吧？）其他不適也請停用並立即聯絡。`],
S30:[`最後小測 · 那1~2kg<br>為何<span class="accent">突然</span>回來了？`,`好不容易減了10kg，一頓多吃就馬上回來1~2kg，很冤吧。確實是吃多了，但關鍵是<span class="hl">水分移動</span>。`,`一天1~2kg的變動不可能是脂肪。水分來回移動讓我們困惑。所以可能呈<strong>階梯式</strong>掉——掉、停、再掉。`,`怎麼分辨是水分還是真停滯？→ 用<span class="hl">腰圍（體積、鏡子裡的身形）</span>來確認。腰在變細，就說明做得好。`,`<strong>到這裡就結束了。有什麼問題嗎？辛苦了。</strong>`],
});
addLang('th', {
S01:[`ต่อไปนี้จะอธิบาย<span class="accent">หลักการลดน้ำหนักและวิธีรับประทานยา</span>ให้คุณ`,`เรามาดูแนวคิดหลักและทิศทางไปด้วยกัน`],
S02:[`1. พื้นฐานการลดน้ำหนัก`,`“การลดน้ำหนัก” ก็คือ<span class="accent">“ภาวะแคลอรีขาดดุล”</span>`,`การจ่ายยาก็สำคัญ แต่<strong>แนวคิดและทิศทาง</strong>สำคัญยิ่งกว่า เข้าใจครั้งเดียวก็จะช่วยคุณได้ในระยะยาว`,`การผอมลงไม่ใช่ “ออกกำลังกาย/คุมอาหาร/กินยา” แต่คือ<span class="hl">การสร้างภาวะแคลอรีขาดดุลอย่างต่อเนื่อง</span>`,`ภาวะแคลอรีขาดดุลนี้สามารถทำต่อเนื่องได้<strong>ประมาณ 6 เดือน</strong>`],
S03:[`ตั้งแต่เดือนที่ 3 จะช้าลง<br>หลัง 6 เดือนจะลดยากขึ้นเรื่อยๆ`,`คุมอาหาร ออกกำลังกาย ยา — <strong>ไม่ว่าวิธีใดก็มีแนวโน้มคล้ายกัน</strong>`,`ทำไม? เป็นเรื่องของ<span class="hl">“การลงมือทำ”</span> ไม่ใช่เพราะการเผาผลาญลดลงหรือดื้อยา`,`เรื่องเล่าจากงานวิจัย`,`มีงานวิจัยที่ทำให้คนลดน้ำหนักสำเร็จติดต่อกันสองครั้งโดยไม่โยโย่ วิธีคือ<span class="hl-amber">ให้รางวัลเป็นเงิน</span>`,`เป็นข้อพิสูจน์ว่า<strong>แรงจูงใจ</strong>สำคัญกว่าปฏิกิริยาของร่างกาย — ยิ่งในระยะยาวยิ่งจริง`],
S04:[`ภาวะแคลอรีขาดดุล<br>คืออะไร?`,`คือภาวะที่เผาผลาญมากกว่าที่กินเข้าไป`,`ถ้าออกมากกว่าเข้า ก็จะผอมลง`,`กินเข้า`,`สิ่งที่กิน`,`เผาผลาญ`,`สิ่งที่ใช้ไป`,`ผลลัพธ์`,`น้ำหนักลด`,`ปัญหาคือคนคิดว่ามีหลายปัจจัยที่ส่งผล — <strong>ชนิดของร่างกาย แบคทีเรียในลำไส้ อายุ มวลกล้ามเนื้อ การเผาผลาญ</strong> ฯลฯ`],
S05:[`ในนี้มีอะไรสำคัญไหม?<br><span class="accent">จริงๆ แล้วไม่มี</span>`,`<strong>การเผาผลาญพื้นฐาน</strong>วัดได้ยาก และมีงานวิจัยว่าตั้งแต่อายุ 20 ถึง 60 แทบไม่เปลี่ยน มันใกล้เคียงระบบประคองชีวิต จึงยากที่จะมองว่าเป็นตัวแปรใหญ่ของน้ำหนัก`,`<strong>มวลกล้ามเนื้อ</strong>ก็คล้ายกัน ยากที่จะบอกว่าอ้วนขึ้นเพราะกล้ามเนื้อลดลง`,`<strong>อายุ</strong>น่าเสียดายที่เปลี่ยนไม่ได้ ส่วน<strong>แบคทีเรียในลำไส้</strong>ศึกษามากว่าสิบปีก็ยังบอกไม่ได้ว่าช่วยให้ผอม <strong>ชนิดของร่างกาย</strong>ดูแลได้ก็ดี แต่ยากที่จะบอกว่าเปลี่ยนกะทันหันจนอ้วน`],
S06:[`อย่าสนใจตัวแปรมากมาย<br>โฟกัสแค่ <span class="accent">2 อย่าง</span>`,`① การคุมอาหาร`,`อย่างที่<strong>สำคัญกว่า</strong>ในสองอย่าง สุดท้ายแพ้ชนะตัดสินกันที่นี่`,`② การออกกำลังกาย`,`ดีต่อร่างกายแน่นอน แต่การเพิ่มการเผาผลาญแบบก้าวกระโดดยากกว่าที่คิด`,`ถ้าวันหนึ่งใช้พลังงานราว <span class="hl-amber">1,800kcal (หญิง)·2,000kcal (ชาย)</span> การเพิ่มออกกำลังกาย 1 ชั่วโมงก็เพิ่มเพียงราว <span class="hl-amber">300~400kcal</span>`,`ออกกำลังกายดี แต่ถ้าสมมติว่า<span class="hl">การเผาผลาญเป็น “ค่าคงที่”</span> จะได้เปรียบ`],
S07:[`กินเข้าคือ “ตัวแปร”<br>เผาผลาญคือ “ค่าคงที่”`,`การกิน: อดอาหาร 0kcal กินเยอะ <span class="hl-amber">4~5,000kcal</span> — แกว่ง<strong>เกินวันละ 1,000kcal</strong>`,`กินเข้าแกว่งมาก เผาผลาญค่อนข้างคงที่ การคิดว่า “พรุ่งนี้ค่อยออกกำลังกาย” แล้วกินเพิ่ม 2~3,000kcal เผาแค่ 3~400kcal ไม่คุ้มใช่ไหม?`,`ดังนั้นจึงจำกัดสาเหตุของน้ำหนักให้เหลือ<span class="hl">เรื่องเดียว — “การกิน”</span>`,`อ้วนขึ้น? ก็กินไป กินน้อยลง? ก็ผอม! แค่วนอยู่ตรงนี้ก็พอ เราจำกัดเหตุและผลให้เหลืออย่างเดียว`],
S08:[`“กินเท่าเดิม<br>ทำไมอ้วนขึ้น?”`,`ดูง่ายแต่คนทำไม่ค่อยได้ “ฉันไม่ได้กินเยอะนะ? เมื่อก่อนแค่นี้ก็ผอม!” แล้วก็หลุดจากเหตุผล “เพราะอายุ? เผาผลาญลดลง?” ความคิดก็กระโดดอีก`,`คำตอบที่ศึกษามานานกลับเรียบง่าย: <span class="hl">จริงๆ ไม่ได้กินเท่าเดิม เพียงแต่ตัวเองไม่รู้ตัว</span>`,`อุปมา`,`เหมือน “บิลบัตรเครดิตเดือนนี้ทำไมเยอะจัง? เป็นไปไม่ได้!”`,`กิน 2~3,000kcal แต่เข้าใจว่ากินแค่ <span class="hl-amber">1,200kcal</span> ได้ — วันหนึ่งต่างกันได้ถึง 800~1,000kcal`,`ดังนั้นถ้ายักไหล่บอก “คงกินเยอะแหละ” แล้ว<strong>หาสาเหตุจากการกิน</strong> แนวคิดก็จะไม่เพี้ยน`],
S09:[`ลดแล้วยังไม่ผอม?<br><span class="accent">ก็ลดอีก</span>`,`ลด ชั่งใหม่ ไม่ผอม ความคิดก็กระโดดอีก กับดักคือคุณหยุดทบทวนเรื่องการกิน <span class="hl">ถ้ายังไม่พอก็ลดอีก ทบทวนอีก</span>`,`เคสจริง · ช่างทำผม`,`“แทบไม่ได้กินแต่ก็อ้วน” เธอถ่ายทุกมื้อให้เทรนเนอร์ดู เทรนเนอร์บอก “แบบนี้อ้วนไม่ได้”`,`พอถามจึงรู้ว่าดื่ม<span class="hl-amber">นม 1 ลิตร</span>ทุกวัน — เพราะคิดว่าเป็นโปรตีน`,`นมถั่วเหลือง กล้วย ถั่ว ข้าวโอ๊ต ข้าวกล้อง มันหวาน — ล้วนทำให้อ้วนได้ <strong>คำตอบอยู่ที่การกินเสมอ</strong>`],
S10:[`นี่แหละคือ<span class="accent">การติดตามตนเอง</span>`,`ทบทวนอาหาร → ชั่งน้ำหนัก → ทบทวน → ชั่งน้ำหนัก วนไปมาในเหตุและผลนี้ <span class="hl">สังเกตและเรียนรู้ซ้ำๆ</span>`,`คนที่มีพื้นฐานนี้แล้วค่อยเพิ่ม — <strong>ออกกำลังกาย ยา หัตถการ</strong>`,`<strong>ให้การคุมอาหารมาก่อนเสมอ</strong> แล้วค่อยสร้างส่วนที่เหลือ จะได้ไม่ถูกพาออกนอกทาง`],
S11:[`2. ผลของยา และความอยากอาหาร`,`ทำไมต้องกินยาสมุนไพร<br>และมีผลอย่างไร?`,`① เร่งการลด`,`เมื่อเทียบกับความพยายามเท่ากัน ลดได้ <span class="hl-amber">2~3 เท่า</span> เพิ่มการเผาผลาญเพื่อเร่งการลด`,`② ลดความอยากอาหาร`,`ให้ความอิ่มและช่วยลดความอยากอาหาร ทำให้คุมอาหารง่ายขึ้น`,`③ บรรเทาอาการไม่สบายตัว`,`ใช้สมุนไพรที่เหมาะกับร่างกายเพื่อลดอาการไม่สบายและช่วยกระบวนการลด`],
S12:[`ความอยากอาหารมี <span class="accent">2 แบบ</span>`,`ความอยากจากความหิวจริง`,`ลองนึกว่าอดอาหารหนึ่งสัปดาห์ — เหนื่อย ท้องร้อง ทรมาน ตอนนั้นกินขนมปังขนมคือ<strong>ความอยากที่ต้องการแคลอรีจริงๆ</strong>`,`ความอยากที่ไม่ใช่แบบนั้น`,`เรากินขนมปังขนมไม่ใช่เพื่ออ้วน แต่เพราะอร่อย เป็นความอยากเพื่อ<strong>ความเร้าใจและความสุข ไม่ใช่แคลอรี</strong>`],
S13:[`ความอยากที่ยาคุมได้ vs<br>ความอยากที่ยาคุมไม่หมด`,`ยาสมุนไพรช่วยลด<span class="hl">“ความอยากจากความหิว”</span> ท้องร้อง เหนื่อยล้าลดลงมาก คุมอาหารก็ไม่ลำบากนัก`,`แต่<strong>ความอยากเพื่อความเร้าใจและความสุข</strong> ยาคุมไม่หมด เครียดหรือนอนไม่พอก็อยากของหวาน — เป็นความอยากที่ผูกกับหลายปัจจัยรวมถึงการนอน`,`ถ้ากดความอยากนี้ด้วยยามากไป <span class="hl-amber">พอหยุดยาความอยากอาจพุ่งจนโยโย่</span> จึงต้องเข้าใจและจัดการในระดับหนึ่ง`],
S14:[`ตัดแคลอรีออก<br>ให้แค่<span class="accent">ความเร้าใจและความสุข</span>`,`ความอยากนี้ต้องการ “ความเร้าใจและความสุข” จึงตัดแคลอรีออกแล้วให้แค่สิ่งนั้น อยู่บ้านทั้งวันปากจะว่าง ออกไปข้างนอกเดินเล่นวันก็ผ่านไป`,`สิ่งที่ต้องการคือ — <span class="hl">อาหารอร่อยที่ไม่ทำให้อ้วน</span>`,`คำตอบคือ<strong>“ไปหา”</strong> โค้กซีโร่ เยลลี่บุก เห็ด กะหล่ำปลี มะเขือเทศราชินี… มีเยอะมาก เพิ่มทีละอย่างการลดก็ยิ่งสบายขึ้น`],
S15:[`หามันเรื่อยๆ<br>แล้วแทนด้วยความสุขอื่น`,`เคส · 3 สัปดาห์ลด 10kg`,`เธอผสมผง Crystal Light ลงในโซดาซีโร่ อร่อยจนแทบไม่ต้องกินอย่างอื่น (ผมลองแล้ว ไม่ถูกปากผม — รสนิยมแต่ละคนต่างกัน)`,`คนที่ทุกฤดูร้อนลดไม่ได้เพราะไอศกรีม ตั้งแต่ปีที่แล้วผอมลงชัดเจนเพราะ<span class="hl-amber">ไอศกรีมศูนย์แคลอรี</span>`,`นอน 7 ชั่วโมงขึ้นไป`,`แทนด้วยงานอดิเรก`,`โดยเฉพาะ<strong>ถ้านอนไม่หลับ ความอยากนี้จะคุมไม่ได้</strong> มีคนหนึ่งเพื่อเลิกดื่มหลังเลิกงานทุกวัน เอาเวลานั้นไปซ้อมกอล์ฟแทนเป็นความสุขอื่น 3 เดือนลดเกิน 20kg`],
S16:[`3. การคุมอาหาร`,`หัวใจของการคุมอาหารคือ <span class="accent">“การลงมือทำ”</span>`,`แต่คนกลับชอบทำให้การลงมือทำ<strong>ยากขึ้น</strong> — ลดเกลือ คีโต อดอาหารเป็นช่วง สัดส่วนสารอาหาร น้ำตาลพุ่ง “กินตอนกลางคืนแล้วอ้วน” ฯลฯ คิดปัจจัยมากไปยิ่งทำยาก`,`เรื่องเล่างานวิจัย · ช่วงเวลากิน`,`มีงานวิจัยเปลี่ยนแค่ช่วงเวลา (เช้า/กลางวัน/เย็น) ของมื้อเดียวกัน 4 ครั้ง 3 ครั้งลดเท่ากัน มีเพียง 1 ครั้งที่กลุ่มมื้อเย็นลดน้อยกว่า`,`ไม่ใช่เพราะกินแล้วนอนเลย แต่เพราะ<span class="hl">อิทธิพลทางสังคมวัฒนธรรมทำให้กินตอนเย็นมากขึ้นนิดหน่อย</span> — คือลงมือทำได้น้อยกว่าเท่านั้น`],
S17:[`สุดท้ายดูอย่างเดียว: <span class="accent">แคลอรี</span>`,`ไม่ใช่นั่นไม่ใช่นี่ แล้วจะทำอะไร? ก็<strong>แคลอรี</strong>จากหน้า 1 ดูแค่แคลอรี อย่างอื่นไม่ต้องสนใจ`,`อาหารแคลอรีต่ำ (VLD)`,`วันละ <span class="hl-amber">1,200~1,500kcal</span> หลักฐาน<strong>พื้นฐานที่สุด ระดับตำรา</strong> ทำต่อเนื่องได้ถึง 6 เดือน`,`อาหารแคลอรีต่ำมาก (VLCD)`,`วันละ <span class="hl-amber">ต่ำกว่า 800kcal</span> ใช้ดีๆ ก็ดี แต่<strong>เกิน 2 สัปดาห์</strong>อาจเป็นภาระ`,`นิ่วในถุงน้ำดี`,`ผมร่วง`,`เวียนศีรษะ`,`กระตุ้นการกินจุบจิบ`,`ราว 2 วันไม่เป็นไร ว่ากันว่าดีต่อสุขภาพด้วยซ้ำ — มนุษย์เป็นร่างกายที่เคยอดมาแต่เดิม`],
S18:[`VLCD<br>ใช้เป็น<span class="accent">วิธีลดความอยากอาหาร</span>`,`ประสบการณ์ของผู้อำนวยการเอง`,`ผมเคยเพิ่มน้ำหนักเกิน 10kg ใน 2 เดือน ความอยากคุมไม่อยู่ หาเหตุผลให้ตัวเองจนกินมากไป จึงไม่ใช้ยา แต่ทำ<span class="hl">VLCD 2 วัน</span> ความอยากสงบ แล้วเปลี่ยนเป็นอาหารแคลอรีต่ำ ลดได้ดี`,`เช่นทำ 1,200~1,500kcal มาดี แล้วไปเที่ยวกินวันละ 3~4,000kcal การกินเองทำให้ความอยากสูงขึ้น กลับมาก็ยังกินเยอะ`,`ตอนนั้นอย่าตกใจ — <strong>รับมือด้วย VLCD หนึ่งสองวัน</strong>ให้ความอยากสงบ แล้วกลับไปอาหารแคลอรีต่ำ`],
S19:[`ขนมปัง·ต๊อก·ผลไม้·เครื่องดื่ม<br>ทำไมทำให้อ้วน?`,`จะบอกว่า “เพราะเป็นคาร์บ” ก็ได้ แต่ขนมปังกินชิ้นเดียวแล้วอดก็ผอม <span class="hl">เป็นคาร์บไม่ได้แปลว่าอ้วนเสมอไป</span>`,`ปัญหาคือมัน<strong>อร่อย ย่อยง่าย กินเยอะง่าย</strong> แคลอรีจึงพุ่งเร็วมาก`,`เค้ก 1 ชิ้น 500~700kcal`,`ผลไม้·มันหวาน·กล้วยก็ต้องระวัง`],
S20:[`4. การคุมอาหาร ②`,`โปรตีน·ผักดี<br>แต่ก็มี<span class="accent">กับดัก</span>`,`โปรตีนและผักให้ความอิ่มจึงดี แต่<strong>เต้าหู้มีโปรตีนไม่ถึงครึ่ง นมเกินครึ่งเป็นคาร์บ</strong> ข้อเสียใหญ่ของโปรตีนคือคิดว่า “เป็นโปรตีนคงไม่เป็นไร” แล้วกินเยอะ — เอเนอร์จีบาร์ โปรตีนเชคก็ต้องระวัง`,`เคส · กินไก่ 2 เดือน 10kg`,`เคล็ดลับคือ “กินนิดเดียว” คนที่เคยกินทั้งตัวเปลี่ยนเป็น <span class="hl-amber">2 ชิ้น</span> ทำได้จริงกว่าการห้ามทั้งหมด`,`ส่วนต่อขยายของวิธีนี้คือ<span class="hl">การคงน้ำหนัก</span> จะไม่กินจาจังเมียนทั้งชีวิตคงไม่ได้ — มองด้วย<strong>“ปริมาณ” มากกว่า “ชนิด”</strong>`],
S21:[`คาดเดาตอนที่ความอยากจะพุ่ง<br>แล้ว<span class="accent">เตรียมรับมือ</span>`,`งานวิจัยเก่าว่ามนุษย์มีสัญชาตญาณกินมูมมามหลังล่าสำเร็จจากการอดอยาก <span class="hl">พออาหารเข้าปากความอยากก็พุ่งให้กินต่อ</span> — คน แมว หมาเหมือนกัน เป็นสัญชาตญาณเอาตัวรอด`,`เคล็ดการเตรียม`,`· ไก่ทั้งตัวยังไงก็กินหมด จึง<strong>เหลือไว้ 2 ชิ้น ที่เหลือแช่แข็ง</strong>`,`· บะหมี่กึ่งสำเร็จก็<strong>หักทิ้งครึ่งหนึ่ง</strong>ก่อนต้ม`,`· อยากเยลลี่มากจนซื้อมา ก็เหลือ 2~3 ชิ้น <strong>ที่เหลือแบ่งให้เพื่อนร่วมทีม</strong>`,`กับคนที่กินขนมปังไส้ถั่วแดง 3 ชิ้นรวดเดียว — “กินชิ้นเดียวความอยากก็พุ่งจนกินครบ 3 ชิ้น ดังนั้น<strong>ตั้งแต่แรกซื้อชิ้นเดียวพอ</strong>” ช่วงกินยาที่ความอยากถูกคุม ลองฝึกบ่อยๆ`],
S22:[`จำ “<span class="accent">400kcal</span>” ไว้`,`ลองใช้กล่องอาหารไดเอต ส่วนใหญ่อยู่<span class="hl-amber">ในราว 400kcal</span> ×3 ก็เป็น 1,200kcal มาตรฐานอาหารแคลอรีต่ำ เมื่อยังไม่มีความรู้สึกเรื่องปริมาณ ใช้กล่องเป็นตัวอย่างปรับใช้กับมื้อปกติ`,`ตัวอย่างจับความรู้สึก`,`เบอร์เกอร์คิง จูเนียร์วอปเปอร์ <span class="hl-amber">390kcal</span> + โค้กซีโร่ → “กินนี่แล้วผอม” ควอโทรชีสวอปเปอร์ <span class="hl-amber">800kcal</span> → “กินครึ่งเดียวพอ”`,`มื้อเช้าร้านเบเกอรี่ — อันอร่อย 500kcal อันธรรมดา 300kcal? กิน<strong>อันอร่อยครึ่งเดียว</strong>ก็ได้`,`ตัวเลขที่เคยมองไม่เห็นจะค่อยๆ เห็น <strong>กินสิ่งที่อยากได้ แต่มองด้วย “ปริมาณ” — หน่วยคือ “แคลอรี”</strong>`],
S23:[`กินมาก·กินน้อย<br><span class="accent">เกณฑ์</span>คืออะไร?`,`รู้ว่าดูแคลอรีก็พอ แต่จะคำนวณทุกครั้งไม่ได้ ผู้เชี่ยวชาญก็ยาก`,`จึงน่าจะมีเกณฑ์วัด “มาก/น้อย” อีกอย่าง <strong>นอกจากแคลอรี</strong>`,`นอกจากแคลอรี (kcal) — <span class="hl">ใช้อะไร</span>ตัดสินมากหรือน้อยได้?`,`ความอิ่ม? ความจำเก่า? เรื่องที่เพื่อนเล่า? … ลองนึกสักครู่`],
S24:[`จริงๆ เราเรียนมาแล้ว —<br>คือ<span class="accent">การเปลี่ยนของน้ำหนัก</span>`,`ความอิ่ม ความจำเก่า เรื่องเพื่อน — <strong>ไม่แม่นทั้งหมด</strong> คำตอบคือ<span class="hl">การเปลี่ยนของน้ำหนัก</span>`,`อ้วนขึ้น = กินไป ผอมลง = กินน้อย คงที่ = กินระดับคงน้ำหนัก แม้กินขนมปังดื่มเหล้า ถ้าน้ำหนักคงที่ นั่นคือมื้อคงน้ำหนัก`,`กินเข้า`,`แคลอรีที่กิน`,`เผาผลาญ(คงที่)`,`แคลอรีที่ใช้`,`ค่าที่สังเกต`,`การเปลี่ยนน้ำหนัก`,`ปริมาณที่กินวัดยากทุกครั้ง แต่<strong>น้ำหนักชั่งตอนเช้าก็จบ</strong> การติดตามตนเองที่เรียนรู้การกินจากการเปลี่ยนน้ำหนัก — อย่าทิ้งทิศทางนี้`],
S25:[`การดื่มสุรา`,`ยาในวันดื่ม<br>และ<span class="accent">กับแกล้ม</span>`,`วันดื่ม<strong>งดยามื้อเย็น</strong> ถ้าวันรุ่งขึ้นไม่ไหวก็พักยาสักพัก อาจเมาเร็วกว่าปกติ ดื่มน้ำเยอะๆ และระวัง`,`ปลาพอลล็อกตากแห้ง`,`ปลาหมึกแห้ง`,`ปลาตาเดียวดิบ (ซาชิมิ)`,`ปลาเก๋าหินดิบ (ซาชิมิ)`,`กับแกล้มข้างต้นมีสัดส่วนโปรตีนพอๆ กับอกไก่ ใช้ให้เป็นประโยชน์`,`โซจู 1 ขวด = <span class="hl-amber">400kcal</span> ครึ่งขวด + กับแกล้มขนาดฝ่ามือก็ 400kcal รู้สึก “วันนี้ผอม!” ดื่มหมดขวดแม้ระวังกับแกล้มก็ราว 600kcal — ไม่แย่ แต่ถ้า<span class="hl-amber">ร้านที่สอง 1,500 ร้านที่สาม 3,000kcal</span> วันนั้นไดเอตพังเลย วันรุ่งขึ้นรับมือด้วย VLCD`],
S26:[`การออกกำลังกาย`,`ออกกำลังกายกับยา<br><span class="accent">อย่าให้ทับกัน</span>`,`ถ้าออกกำลังกายตอนเย็น ให้กิน<strong>แค่ยามื้อเช้าและกลางวัน</strong> งดมื้อเย็น`,`วันที่ปีนเขาหรือทำกิจกรรมกลางแจ้งทั้งวัน <strong>งดยาสักวันก็ได้</strong> <span class="hl-amber">(ระวังน้ำตาลต่ำ)</span>`,`<strong>ออกกำลังกายตอนท้องว่าง</strong>ก็ควรระวังหรือเลี่ยง`],
S27:[`5. อาการไม่สบายตัว`,`ลำดับการใช้พลังงานและ<br><span class="accent">เมแทบอลิซึมคีโตน</span>`,`พลังงานใช้ตามลำดับ <strong>คาร์บ → ไขมัน → โปรตีน</strong> (จริงๆ ใช้ถึงโปรตีนยาก)`,`การทำให้คาร์บหมดเพื่อใช้ไขมันคือแนวคิดของอดอาหารเป็นช่วง คีโต คาร์ดิโอตอนท้องว่าง แต่พอกินอีกก็อ้วน เราใช้วิธี<span class="hl">คงอาหารแคลอรีต่ำพร้อมกินยา</span>`,`การใช้ไขมันเป็นพลังงานเรียกว่า<strong>เมแทบอลิซึมคีโตน</strong> ผอมและดี แต่ลมหายใจมีกลิ่น ปากเปรี้ยวและแห้งผาก ตอนนั้นคิด “โอ้ ผอมดีนี่!” แล้ว<span class="hl-amber">ดื่มน้ำวันละ 2 ลิตรขึ้นไป</span>`],
S28:[`ปัญหาจริงคือ<span class="accent">น้ำและน้ำตาลต่ำ</span>`,`เมื่อคาร์บถูกขับออก จะ<strong>ดึงน้ำออกไปด้วย</strong> วันหนึ่งแกว่งได้เกิน 1kg ไม่ใช่ “ยุบบวมดีจัง” แต่คือน้ำขวดหนึ่งออกไป`,`ต้องระวัง<span class="hl-amber">น้ำตาลต่ำ</span> — เหมือนเลือดไม่พอ ลุกขึ้นยืนแล้วตาลาย เกิดง่ายตอนเช้าและบ่าย จึง<strong>เติมน้ำตาล + เติมน้ำ</strong>ให้ดี`,`คาร์บยังอยู่ในกล้ามเนื้อในรูป<strong>ไกลโคเจน</strong>แล้วหลุดออก กล้ามเนื้อก็ตึง อาจปวดหัว มือสั่น ตะคริว ดังนั้น<span class="hl">ก่อนออกกำลังกายอาจต้องกินคาร์บ</span>`],
S29:[`อาการอื่นๆ และ<br><span class="accent">วิธีรับประทาน</span>`,`ถ้ากินยาตอนท้องว่างแล้วแสบท้อง ให้กิน<strong>ก่อนหรือหลังอาหาร</strong> กินคู่กับนมอัลมอนด์ก็ได้`,`ผู้หญิง การเปลี่ยนไขมันสัมพันธ์กับฮอร์โมนเพศหญิง อาจมี<strong>ประจำเดือนผิดปกติชั่วคราว</strong> ผู้ชายอาจมี<strong>อวัยวะเพศไม่แข็งตัวชั่วคราว</strong> งดหนึ่งสองวันก็ฟื้น และพอผอมก็ดีขึ้น ส่วน<strong>ท้องผูก</strong>มียาแยกให้ต่างหาก`,`ถ้าเกิด<strong>อาการแพ้</strong> ให้หยุดและติดต่อเรา (ไม่มีอาการแพ้ใช่ไหม?) อาการไม่สบายอื่นๆ ก็หยุดและติดต่อทันที`],
S30:[`ควิซสุดท้าย · ทำไม 1~2kg นั้น<br><span class="accent">จู่ๆ</span> ก็กลับมา?`,`ลด 10kg มาอย่างดี แค่กินมื้อใหญ่มื้อเดียวก็กลับมา 1~2kg เลย น่าน้อยใจ จริงที่กินเยอะ แต่หัวใจคือ<span class="hl">การเคลื่อนของน้ำ</span>`,`การเปลี่ยน 1~2kg ในวันเดียวเป็นไขมันไม่ได้ น้ำเคลื่อนไปมาทำให้เราสับสน จึงอาจผอมแบบ<strong>ขั้นบันได</strong> — ลด หยุด ลด`,`จะรู้ได้ไงว่าเป็นน้ำหรือหยุดจริง? → ดูจาก<span class="hl">รอบเอว (ปริมาตร รูปร่างในกระจก)</span> ถ้าเอวเล็กลงแสดงว่าทำได้ดี`,`<strong>จบเพียงเท่านี้ มีคำถามไหม? ขอบคุณที่ตั้งใจนะครับ</strong>`]
});
/*__LANGS__*/
function applyTR(){
  SLIDES.forEach(function(s){
    const t=TR[s.id]; if(!t) return;
    const nodes=trNodes(s);
    Object.keys(t).forEach(function(L){
      const arr=t[L]; if(!arr) return;
      nodes.forEach(function(node,i){ if(arr[i]!=null) node[L]=arr[i]; });
    });
  });
}
applyTR();

// ---------- render ----------
const stage = document.getElementById('stage');
const total = SLIDES.length;
document.getElementById('tot').textContent = total;

function L(obj){ return obj[lang] || obj.ko; }
function gloss(obj, cls){ if(lang==="ko") return ""; return '<div class="gloss '+(cls||'')+'">'+strip(obj.ko)+'</div>'; }
function inl(id, val){ return '<input id="'+id+'" class="inl" type="text" value="'+esc(val)+'" placeholder="N">'; }

function renderBlock(b){
  if(b.t==="p")    return '<p>'+L(b.v)+'</p>'+gloss(b.v);
  if(b.t==="lead") return '<p class="lead">'+L(b.v)+'</p>'+gloss(b.v);
  if(b.t==="note") return '<p class="note">'+L(b.v)+'</p>'+gloss(b.v,'kg');
  if(b.t==="case"){
    let h='<div class="case"><div class="tag">'+L(b.tag)+'</div>';
    b.ps.forEach(function(p){ h+='<p>'+L(p)+'</p>'+gloss(p); });
    return h+'</div>';
  }
  if(b.t==="duo"){
    let h='<div class="duo'+(b.cols===1?' one':'')+'">';
    b.cards.forEach(function(c){ h+='<div class="card"><h4>'+L(c.h4)+'</h4>'+gloss(c.h4,'kg')+'<p>'+L(c.p)+'</p>'+gloss(c.p)+'</div>'; });
    return h+'</div>';
  }
  if(b.t==="chips"){
    let h='<div class="chips">';
    b.items.forEach(function(c){ h+='<span class="chip'+(b.warn?' warn':'')+'">'+L(c)+'</span>'; });
    return h+'</div>';
  }
  if(b.t==="eq"){
    let h='<div class="equation">';
    b.terms.forEach(function(tm,i){
      h+='<div class="term'+(tm.out?' out':'')+'"><div class="t">'+L(tm.t)+'</div><div class="v">'+L(tm.v)+'</div></div>';
      if(i<b.ops.length) h+='<div class="op">'+b.ops[i]+'</div>';
    });
    return h+'</div>';
  }
  if(b.t==="dose"){
    const d=DOSE[lang]||DOSE.ko, w=curWake();
    let h='<div class="case"><div class="tag">'+d.tag+'</div>';
    h+='<p>'+d.pre+'<input id="inWake" class="inl" type="number" min="0" max="23" value="'+w+'">'+d.mid+'<span id="doseTimes">'+doseTimes(w,d.sep)+'</span>'+d.post+'</p>';
    if(lang!=="ko") h+='<div class="gloss">'+doseGlossKo(w)+'</div>';
    h+='<p>'+d.p2+'</p>';
    if(lang!=="ko") h+='<div class="gloss">'+strip(DOSE.ko.p2)+'</div>';
    return h+'</div>';
  }
  if(b.t==="goal"){
    const g=GOAL[lang]||GOAL.ko;
    let h='<p>'+g.a+inl('inGm1',STATE.g_m1)+g.b+inl('inGkg1',STATE.g_kg1)+g.c+inl('inGm2',STATE.g_m2)+g.d+inl('inGkg2',STATE.g_kg2)+g.e+inl('inGpm',STATE.g_pm)+g.f+'</p>';
    if(lang!=="ko") h+='<div class="gloss" id="goalGloss">'+goalGlossKo()+'</div>';
    return h;
  }
  return "";
}

function pageLabel(s){
  const pg=PAGES[s.page]; let txt=L(pg.label);
  if(pg.book) txt=L(UI.bookPrefix)+txt;
  return {txt:txt, book:pg.book};
}

function buildStage(){
  let html='';
  SLIDES.forEach(function(s,i){
    const pg=pageLabel(s);
    html+='<section class="slide'+(i===idx?' active':'')+(s.cover?' cover':'')+'">';
    if(s.cover){
      html+='<div class="mark">'+s.mark+'</div><div class="rule"></div>';
      html+='<h1>'+L(s.h1)+'</h1>'+gloss(s.h1,'h2g');
      html+='<div class="setup">';
      html+='<div class="field"><label>'+L(UI.patientLabel)+'</label><input id="inPatient" type="text" value="'+esc(STATE.patient)+'" placeholder="'+L(UI.patientPh)+'"></div>';
      html+='<div class="field"><label>'+L(UI.doctorLabel)+'</label><input id="inDoctor" type="text" value="'+esc(STATE.doctor)+'" placeholder="'+L(UI.doctorPh)+'"></div>';
      html+='</div>';
      html+='<p class="who" id="greet">'+greetMain(lang)+'</p>';
      if(lang!=="ko") html+='<div class="gloss">'+strip(greetMain("ko"))+'</div>';
      html+='<p class="sub">'+L(s.sub)+'</p>'+gloss(s.sub);
    } else {
      html+='<div class="eyebrow"><span class="badge">'+pg.txt+'</span><span class="sidx">'+s.id+'</span></div>';
      if(s.kicker) html+='<div class="kicker">'+L(s.kicker)+'</div>';
      html+='<h2>'+L(s.h2)+'</h2>'+gloss(s.h2,'h2g');
      html+='<div class="body">';
      s.body.forEach(function(b){ html+=renderBlock(b); });
      html+='</div>';
    }
    html+='</section>';
  });
  stage.innerHTML=html;
}

const elCur=document.getElementById('cur'), elTag=document.getElementById('pagetag'), elProg=document.getElementById('progress');
function render(){
  const slides=stage.querySelectorAll('.slide');
  slides.forEach(function(s,i){ s.classList.toggle('active', i===idx); });
  elCur.textContent=idx+1;
  elTag.textContent=pageLabel(SLIDES[idx]).txt;
  elProg.style.width=((idx+1)/total*100)+'%';
  const act=slides[idx]; if(act) act.scrollTop=0;
}
function go(n){ idx=Math.max(0,Math.min(total-1,n)); render(); }
function next(){ go(idx+1); } function prev(){ go(idx-1); }

function applyUILabels(){
  document.getElementById('prev').setAttribute('aria-label', L(UI.prevAria));
  document.getElementById('next').setAttribute('aria-label', L(UI.nextAria));
  document.getElementById('tocLbl').textContent=' '+L(UI.toc);
  document.getElementById('fsLbl').textContent=' '+L(UI.fullscreen);
  document.getElementById('tocTitle').textContent=L(UI.tocTitle);
  document.getElementById('tocHint').textContent=L(UI.tocHint);
}

function changeLang(nl){ lang=nl; document.body.dataset.lang=lang; document.documentElement.lang=lang; buildStage(); render(); applyUILabels(); buildTOC(); }

document.getElementById('next').addEventListener('click', next);
document.getElementById('prev').addEventListener('click', prev);
document.getElementById('lang').addEventListener('change', function(e){ changeLang(e.target.value); });

document.addEventListener('keydown', function(e){
  if(document.getElementById('tocBackdrop').classList.contains('open')){ if(e.key==='Escape') closeToc(); return; }
  if(e.target && (e.target.tagName==='INPUT'||e.target.tagName==='SELECT')) { if(e.key!=='ArrowLeft'&&e.key!=='ArrowRight') return; }
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){ e.preventDefault(); next(); }
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); prev(); }
  else if(e.key==='Home'){ go(0); } else if(e.key==='End'){ go(total-1); }
  else if(e.key==='f'||e.key==='F'){ toggleFs(); }
});
let tx=0,ty=0;
stage.addEventListener('touchstart',function(e){ tx=e.changedTouches[0].clientX; ty=e.changedTouches[0].clientY; },{passive:true});
stage.addEventListener('touchend',function(e){ const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty; if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)){ dx<0?next():prev(); } },{passive:true});

stage.addEventListener('input', function(e){
  const id=e.target.id, v=e.target.value;
  if(id==='inPatient'){ STATE.patient=v; updateGreet(); }
  else if(id==='inDoctor'){ STATE.doctor=v; updateGreet(); }
  else if(id==='inWake'){ STATE.wake=(v===''?'':parseInt(v,10)); updateDose(); }
  else if(id==='inGm1'){ STATE.g_m1=v; updateGoal(); }
  else if(id==='inGkg1'){ STATE.g_kg1=v; updateGoal(); }
  else if(id==='inGm2'){ STATE.g_m2=v; updateGoal(); }
  else if(id==='inGkg2'){ STATE.g_kg2=v; updateGoal(); }
  else if(id==='inGpm'){ STATE.g_pm=v; updateGoal(); }
});

function toggleFs(){ if(!document.fullscreenElement){ (document.documentElement.requestFullscreen||function(){})(); } else { (document.exitFullscreen||function(){})(); } }
document.getElementById('fsBtn').addEventListener('click', toggleFs);

const tocBackdrop=document.getElementById('tocBackdrop');
function openToc(){ tocBackdrop.classList.add('open'); }
function closeToc(){ tocBackdrop.classList.remove('open'); }
document.getElementById('tocBtn').addEventListener('click', openToc);
tocBackdrop.addEventListener('click', function(e){ if(e.target===tocBackdrop) closeToc(); });

function buildTOC(){
  const groups=[], gmap={};
  SLIDES.forEach(function(s,i){
    const key=s.page, gl=pageLabel(s).txt;
    if(!gmap[key]){ gmap[key]={label:gl, items:[]}; groups.push(gmap[key]); }
    const h=s.cover?L(s.h1):L(s.h2);
    gmap[key].items.push({i:i, title:strip(h)});
  });
  let html='';
  groups.forEach(function(g){
    html+='<div class="toc-group"><div class="gl">'+g.label+'</div>';
    g.items.forEach(function(it){ html+='<div class="toc-item" data-go="'+it.i+'"><span class="n">'+SLIDES[it.i].id+'</span><span class="t">'+it.title+'</span></div>'; });
    html+='</div>';
  });
  const list=document.getElementById('tocList');
  list.innerHTML=html;
  list.onclick=function(e){ const it=e.target.closest('.toc-item'); if(it){ go(parseInt(it.getAttribute('data-go'),10)); closeToc(); } };
}

buildStage(); render(); applyUILabels(); buildTOC();
</script>
