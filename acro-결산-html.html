function parseOkchart(raw){
  const lines = raw.split(/\r?\n/).filter((l)=>l.trim()!=="");
  let date="", sIdx=-1, pIdx=-1;
  lines.forEach((ln,i)=>{
    if(ln.replace(/\s/g,"").includes("일일결산표")){ const m=ln.match(/(\d{4}-\d{2}-\d{2})/); if(m) date=m[1]; }
    const first=(ln.split("\t")[0]||"").trim();
    if(first==="내원환자수") sIdx=i;
    if(first==="환자이름") pIdx=i;
  });
  const summary={};
  if(sIdx>=0 && lines[sIdx+1]){ const h=lines[sIdx].split("\t"); const v=lines[sIdx+1].split("\t"); h.forEach((k,i)=>summary[k.trim()]=num(v[i])); }
  const patients=[];
  if(pIdx>=0){ const h=lines[pIdx].split("\t").map((x)=>x.trim()); for(let i=pIdx+1;i<lines.length;i++){ const c=lines[i].split("\t"); if(c.length<5) continue; const row={}; h.forEach((k,j)=>row[k]=c[j]); patients.push(row);} }
  return { date, summary, patients, ok: sIdx>=0 };
}

          for(const r of ca){ const d0=String(r[0]||"").trim(); if(!/\d/.test(d0)||d0==="날짜"||d0==="시재관리") continue;
            led.push({date:d0,open:num(r[1]),cashIn:num(r[2]),out:num(r[3]),close:num(r[4]),note:r[5]||"",d50000:num(r[6]),d10000:num(r[7]),d5000:num(r[8]),d1000:num(r[9]),d500:num(r[10]),d100:num(r[11]),d50:num(r[12]),etc:num(r[13]),total:num(r[14])}); }
          setLedger(led); ledLast=led.length?led[led.length-1]:null; }
        const prevSafe=safe!=null?safe:ledLast?ledLast.close:null;
        if(prevSafe==null&&sales==null){ setLoadMsg("⚠️ 결산 양식을 인식하지 못했습니다."); e.target.value=""; return; }
        setCarry({
          전일금고:prevSafe!=null?String(prevSafe):"",
          전일통장수입:monthStart?"0":bank!=null?String(bank):"",
          전일지출:monthStart?"0":exp!=null?String(exp):"",
          전일환불:monthStart?"0":ref!=null?String(ref):"",
          전일카드수입:monthStart?"0":card!=null?String(card):"",
          전일매출:monthStart?"0":sales!=null?String(sales):"",
        });
        setLoadMsg(`✓ 불러옴 — 전일금고 ${fmt(prevSafe)}${cs?" · 시재원장 적재됨":""}${monthStart?" (월초: 누계 리셋)":""}`);
      }catch(err){ setLoadMsg("⚠️ 읽기 실패: "+err.message); }
      e.target.value="";
    };
    reader.readAsArrayBuffer(f);
  };

  const buildLog=()=>{
    const lines=checks.map((c)=>{ const st=!c.entered?"대기":(c.ext-c.ok===0?"일치":"불일치"); return `- ${c.label}: ${st}${st==="불일치"?` (차이 ${wonS(c.ext-c.ok)})`:""}`; }).join("\n");
    const flagLines=!flags?"- (검수 미실행)":(flags.length===0?"- 의심 없음":flags.map((f)=>`- [${f.채팅창||"-"}] ${f.환자||"-"} · ${f.유형||""} — ${f.무엇이||f.근거||""}`).join("\n"));
    return ["# 아크로한의원 일일결산 업무로그",`- 날짜: ${dateLabel(parsed.date)||"-"}`,`- 담당자: ${meta.담당자||"-"}`,"","## 결산 요약",`- 총진료비: ${won(okRevenue)}`,`- 수납: 카드 ${fmt(okCard)} / 통장 ${fmt(okBank)} / 현금 ${fmt(okCash)}`,`- 금고: 전일 ${fmt(num(carry.전일금고))} → 금일 ${fmt(safeToday)} (지출 ${fmt(expenseSum)}, 입금 ${fmt(num(safeIn))})`,`- 총매출(누계): ${won(cumSales)}`,"","## 대조 결과",lines,"","## AI 검수",flagLines,"","## 오늘 한 일",(log.done||"-"),"","## 발견한 실수",(log.mistakes||"-"),"","## 이슈 / 메모",(log.issues||"-"),""].join("\n");
  };

  const dl=(blob,name)=>{ const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url); };
  const downloadMd=()=>{ dl(new Blob([buildLog()],{type:"text/markdown;charset=utf-8"}), `${parsed.date||"결산"}_업무로그.md`); };

  const downloadXlsx=()=>{
    const date=parsed.date||"결산";
    const aoa=[["일일결산 보고서","","","","","대표원장"],["날짜",dateLabel(parsed.date),"담당자 : "+(meta.담당자||""),"","","비고"],...rows.map((r)=>[r.a,r.b,r.c,r.val,"원",r.note||""])];
    const ws=XLSX.utils.aoa_to_sheet(aoa); ws["!cols"]=[{wch:14},{wch:16},{wch:12},{wch:14},{wch:5},{wch:40}];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"일일결산");
    const todayRow={date,open:num(carry.전일금고),cashIn:okCash+num(safeIn),out:expenseSum,close:safeToday,note:"",d50000:50000*num(denom[50000]),d10000:10000*num(denom[10000]),d5000:5000*num(denom[5000]),d1000:1000*num(denom[1000]),d500:500*num(denom[500]),d100:100*num(denom[100]),d50:50*num(denom[50]),etc:num(etc),total:denomTotal};
    const cashRows=[...ledger.filter((r)=>r.date!==date),todayRow].sort((x,y)=>String(x.date).localeCompare(String(y.date)));
    const cashAoa=[["시재관리"],["날짜","오픈","현금수납","출금","마감","비고","5만원","1만원","5천원","1천원","500원","100원","50원","기타","합계"],...cashRows.map((r)=>[r.date,r.open,r.cashIn,r.out,r.close,r.note||"",r.d50000,r.d10000,r.d5000,r.d1000,r.d500,r.d100,r.d50,r.etc,r.total])];
    const cws=XLSX.utils.aoa_to_sheet(cashAoa); cws["!cols"]=[{wch:12},{wch:11},{wch:11},{wch:10},{wch:11},{wch:18},...Array(8).fill({wch:9}),{wch:11}];
    XLSX.utils.book_append_sheet(wb,cws,"시재관리");
    const lws=XLSX.utils.aoa_to_sheet([["업무로그"],...buildLog().split("\n").map((l)=>[l])]); lws["!cols"]=[{wch:70}];
    XLSX.utils.book_append_sheet(wb,lws,"업무로그");
    if(parsed.patients.length){ const pc=Object.keys(parsed.patients[0]); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([pc,...parsed.patients.map((p)=>pc.map((k)=>p[k]))]),"환자내역"); }
    dl(new Blob([XLSX.write(wb,{bookType:"xlsx",type:"array"})],{type:"application/octet-stream"}), `${date}_결산.xlsx`);
  };

  const reportHtml=()=>{
    const body=rows.map((r)=>`<tr><td>${esc(r.a)}</td><td>${esc(r.b)}</td><td>${esc(r.c)}</td><td class="r">${fmt(r.val)}</td><td>원</td></tr>`).join("");
    const note=meta.비고?`<div style="margin-top:10px;color:#444">비고: ${esc(meta.비고)}</div>`:"";
    return `<h2 style="margin:0 0 2px">아크로한의원 일일결산 보고서</h2><div style="color:#555;margin-bottom:10px">날짜 ${esc(dateLabel(parsed.date)||"-")} &nbsp;&nbsp; 담당자 : ${esc(meta.담당자||"-")}</div><table>${body}</table>${note}`;
  };
  const printReport=()=>{
    const w=window.open("","_blank","width=720,height=900");
    if(!w){ alert("팝업이 차단되었습니다. 팝업을 허용해 주세요."); return; }
    w.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><title>${esc(dateLabel(parsed.date)||"일일결산")}</title><style>body{font-family:-apple-system,'Malgun Gothic',sans-serif;font-size:13px;padding:20px;color:#111}table{border-collapse:collapse;width:100%;max-width:560px}td{border-bottom:1px solid #eee;padding:4px 8px}td.r{text-align:right;font-weight:600}h2{font-size:18px}</style></head><body>${reportHtml()}<` + `script>window.onload=function(){window.print()}<` + `/script></body></html>`);
    w.document.close();
  };

  const runAudit=async()=>{
    if(!apiKey.trim()){ setAuditErr("API 키를 입력하세요."); return; }
    setAuditing(true); setAuditErr(""); setFlags(null);
    try{
      const pl=parsed.patients.filter((p)=>num(p["총진료비"])||num(p["수납총액"])||num(p["환불총액"])).map((p)=>`${p["환자이름"]}/${p["진료의"]}: 진료비 ${num(p["총진료비"])}, 수납 ${num(p["수납총액"])} [카드 ${num(p["카드수납"])}, 통장 ${num(p["통장회수"])}, 현금 ${num(p["현금수납"])}, 환불 ${num(p["환불총액"])}]`).join("\n");
      const failed=checks.filter((c)=>c.entered&&c.ext-c.ok!==0).map((c)=>`${c.label} 차이 ${c.ext-c.ok}`).join("; ")||"없음";
      const chatBlock=chats.filter((c)=>(c.body||"").trim()).map((c,i)=>`=== 채팅창 [${c.name||"이름없음 "+(i+1)}] ===\n${c.body}`).join("\n\n")||"(없음)";
      const prompt=`당신은 한의원 일일결산 검수 보조입니다. 여러 업무 채팅창과 결산 데이터를 대조해 "검수에서 사람이 다시 봐야 할 의심 항목"만 찾습니다.\n\n[규칙]\n- 합계·산수는 이미 검증됨. 다시 계산하지 말 것.\n- 확실한 근거가 있는 것만. 추측 금지. 없으면 빈 배열 [].\n- 어느 채팅창에서 나온 근거인지 채팅창이름을 반드시 명시.\n- 근거가 된 원문 라인을 그대로 인용.\n- 유형: 누락 / 금액이상 / 결제수단불일치 / 채팅간상충 / 정정착오언급 / 기타\n\n[참고 표준가] 다이어트 한약 초진 580,000 · 재접수 480,000 (그 외 시술·가격 다양, 단순참고)\n[결정적검증 불일치 단서] ${failed}\n\n[OK차트 환자별 수납]\n${pl||"(없음)"}\n\n[업무 채팅창들]\n${chatBlock}\n\nJSON 배열만 출력(설명·마크다운·코드펜스 금지): [{"채팅창":"","환자":"","유형":"","무엇이":"","근거":"","대조":"","조치":""}]`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey.trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1500,messages:[{role:"user",content:prompt}]})});
      if(!res.ok){ const t=await res.text(); throw new Error(`API ${res.status} — ${t.slice(0,160)}`); }
      const data=await res.json();
      const text=(data.content||[]).filter((i)=>i.type==="text").map((i)=>i.text).join("\n");
      const clean=text.replace(/```json|```/g,"").trim();
      let arr; try{ arr=JSON.parse(clean); }catch{ arr=JSON.parse(clean.slice(clean.indexOf("["),clean.lastIndexOf("]")+1)); }
      setFlags(Array.isArray(arr)?arr:[]);
    }catch(err){ setAuditErr("분석 실패: "+(err.message||err)); }
    setAuditing(false);
  };

    bad:{cls:"bg-rose-50 border-rose-300 text-rose-800",txt:`불일치 ${cB}건 — 아래 AI 검수로 원인을 찾으세요.`},
  }[decision];

  return (
    <div className="min-h-screen p-4 text-gray-800">

                <label className="text-xs flex items-center gap-1 cursor-pointer"><input type="checkbox" checked={monthStart} onChange={(e)=>setMonthStart(e.target.checked)} /> 월초(누계 리셋)</label>

              </div>
              {loadMsg && <div className="text-[11px] text-gray-500 mt-2">{loadMsg}</div>}
              <div className="grid grid-cols-3 gap-2 mt-3">

              <textarea value={raw} onChange={(e)=>setRaw(e.target.value)} placeholder="OK차트 일일결산 통계 전체선택 → 복사 → 붙여넣기 (환자내역 포함)" className="w-full h-20 p-2 border border-gray-300 rounded text-xs font-mono focus:outline-none focus:border-amber-500" />

                  </div>
                ))}
                <button onClick={()=>setExpenses((p)=>[...p,{item:"",amt:""}])} className="text-xs text-amber-600 hover:underline">+ 지출</button>
                <span className="text-xs text-gray-500 ml-2">{won(expenseSum)}</span>
                <div className="text-xs font-medium text-gray-600 mb-1 mt-3">환불</div>
                {refunds.map((r,i)=>(
                  <div key={i} className="flex gap-1.5 mb-1.5">
                    <input value={r.memo} onChange={(ev)=>setRefunds((p)=>p.map((x,j)=>(j===i?{...x,memo:ev.target.value}:x)))} placeholder="환자/사유" className="flex-1 px-2 py-1.5 border border-gray-300 rounded text-sm focus:outline-none focus:border-amber-500" />
                    <select value={r.way} onChange={(ev)=>setRefunds((p)=>p.map((x,j)=>(j===i?{...x,way:ev.target.value}:x)))} className="px-1 py-1.5 border border-gray-300 rounded text-xs bg-white"><option>카드취소</option><option>계좌입금</option></select>
                    <div className="w-20"><NumInput value={r.amt} onChange={(v)=>setRefunds((p)=>p.map((x,j)=>(j===i?{...x,amt:v}:x)))} /></div>
                    <button onClick={()=>setRefunds((p)=>p.filter((_,j)=>j!==i))} className="px-1 text-gray-400 hover:text-rose-500">✕</button>
                  </div>
                ))}
                <button onClick={()=>setRefunds((p)=>[...p,{memo:"",way:"카드취소",amt:""}])} className="text-xs text-amber-600 hover:underline">+ 환불</button>
                <span className="text-xs text-gray-500 ml-2">{won(refundSum)}</span>
              </Card>
              <Card title="소급 조정" sub="과거 청구금 변경 등 — 누계에만 반영">
                {adjs.map((a,i)=>(
                  <div key={i} className="flex gap-1.5 mb-1.5 flex-wrap">
                    <input value={a.date} onChange={(ev)=>setAdjs((p)=>p.map((x,j)=>(j===i?{...x,date:ev.target.value}:x)))} placeholder="원결산일" className="w-20 px-1.5 py-1.5 border border-gray-300 rounded text-xs focus:outline-none focus:border-amber-500" />
                    <input value={a.memo} onChange={(ev)=>setAdjs((p)=>p.map((x,j)=>(j===i?{...x,memo:ev.target.value}:x)))} placeholder="사유" className="flex-1 px-1.5 py-1.5 border border-gray-300 rounded text-xs focus:outline-none focus:border-amber-500" />
                    <select value={a.cat} onChange={(ev)=>setAdjs((p)=>p.map((x,j)=>(j===i?{...x,cat:ev.target.value}:x)))} className="px-1 py-1.5 border border-gray-300 rounded text-xs bg-white"><option>매출</option><option>카드</option><option>통장</option><option>환불</option><option>지출</option></select>
                    <select value={a.sign} onChange={(ev)=>setAdjs((p)=>p.map((x,j)=>(j===i?{...x,sign:ev.target.value}:x)))} className="px-1 py-1.5 border border-gray-300 rounded text-xs bg-white"><option>+</option><option>-</option></select>
                    <div className="w-20"><NumInput value={a.amt} onChange={(v)=>setAdjs((p)=>p.map((x,j)=>(j===i?{...x,amt:v}:x)))} /></div>
                    <button onClick={()=>setAdjs((p)=>p.filter((_,j)=>j!==i))} className="px-1 text-gray-400 hover:text-rose-500">✕</button>
                  </div>
                ))}
                <button onClick={()=>setAdjs((p)=>[...p,{date:"",memo:"",cat:"매출",sign:"+",amt:""}])} className="text-xs text-amber-600 hover:underline">+ 조정</button>
              </Card>
            </div>
          </Step>

          <Step n="3" title="결과 도출 & 검수" sub="외부 입력과 OK차트가 맞는지 확인합니다">
            <Card title="대조 결과 (결정적 검증)">
              <div className="space-y-1.5">
                {checks.map((c,i)=>{
                  const d=c.ext-c.ok; const st=!c.entered?"wait":d===0?"ok":"bad";
                  return (
                    <div key={i} className={"rounded border p-2 flex items-center justify-between "+(st==="ok"?"bg-emerald-50 border-emerald-200":st==="bad"?"bg-rose-50 border-rose-200":"bg-gray-50 border-gray-200")}>
                      <div><div className="text-sm font-semibold">{c.label}</div><div className="text-xs text-gray-500">OK {fmt(c.ok)} · 외부 {fmt(c.ext)}{st==="bad"&&<b className="text-rose-600"> · 차이 {wonS(d)}</b>}</div></div>
                      <span className={"text-xs font-bold px-2 py-0.5 rounded "+(st==="ok"?"bg-emerald-500 text-white":st==="bad"?"bg-rose-500 text-white":"bg-gray-300 text-gray-600")}>{st==="ok"?"일치":st==="bad"?"불일치":"대기"}</span>
                    </div>
                  );
                })}
              </div>
            </Card>
            <Card title="일일결산 보고서 (미리보기)">
              <div className="border border-gray-300 rounded overflow-hidden text-xs">
                <div className="flex bg-gray-100 px-2 py-1.5 font-bold border-b border-gray-300"><span className="flex-1">날짜 {dateLabel(parsed.date)||"—"}</span><span className="text-gray-500">담당자 : {meta.담당자||"—"}</span></div>
                <table className="w-full"><tbody>
                  {rows.map((r,i)=>{ const st=rowStatus(r); return (
                    <tr key={i} className={"border-b border-gray-100 "+(st==="ok"?"bg-emerald-50":st==="bad"?"bg-rose-50":r.key==="adj"?"bg-sky-50":r.key==="cum"?"bg-amber-50":"")}>
                      <td className="px-2 py-1 text-gray-700 w-24 font-medium">{r.a}</td><td className="px-2 py-1 text-gray-600 w-24">{r.b}</td><td className="px-2 py-1 text-gray-600 w-12">{r.c}</td><td className="px-2 py-1 text-right font-semibold">{fmt(r.val)}</td><td className="px-1 py-1 text-gray-400">원</td>
                    </tr>); })}
                </tbody></table>
                {meta.비고 && <div className="px-2 py-1.5 text-[11px] text-gray-500 border-t border-gray-200">비고: {meta.비고}</div>}
              </div>
            </Card>
          </Step>

          <Step n="4" title="마무리" sub="맞으면 인쇄·저장, 안 맞으면 AI 검수">
            <div className={"rounded-lg border-2 p-3 "+banner.cls}>
              <div className="font-bold text-sm">{decision==="pass"?"✓ 검수 통과":decision==="bad"?"⚠ 불일치 발견":"· 진행 중"}</div>
              <div className="text-xs mt-0.5">{banner.txt}</div>
            </div>

            <Card title="저장 / 인쇄">
              <div className="flex gap-2 flex-wrap">
                <button onClick={printReport} disabled={!parsed.ok} className={"px-3 py-2 rounded-lg text-sm font-bold "+(decision==="pass"?"bg-emerald-600 text-white hover:bg-emerald-700":parsed.ok?"bg-gray-800 text-white hover:bg-black":"bg-gray-200 text-gray-400 cursor-not-allowed")}>🖨 보고서 인쇄</button>
                <button onClick={downloadXlsx} disabled={!parsed.ok} className={"px-3 py-2 rounded-lg text-sm font-bold "+(parsed.ok?"bg-amber-500 text-white hover:bg-amber-600":"bg-gray-200 text-gray-400 cursor-not-allowed")}>엑셀 저장</button>
                <button onClick={downloadMd} disabled={!parsed.ok} className={"px-3 py-2 rounded-lg text-sm font-bold "+(parsed.ok?"bg-gray-700 text-white hover:bg-gray-900":"bg-gray-200 text-gray-400 cursor-not-allowed")}>업무로그 MD</button>
              </div>
              <div className="text-[11px] text-gray-400 mt-2">엑셀: 일일결산 · 시재관리 · 업무로그 · 환자내역 (4시트). 다음날 이 엑셀을 1단계에 다시 넣으면 자동 이월됩니다.</div>
            </Card>

            <Card title="AI 검수" sub="여러 채팅창 ↔ 결산 대조 (안 맞을 때)" accent={decision==="bad"?"border-2 border-sky-400":"border-gray-200"}>
              <div className="mb-2">
                <div className="flex items-center justify-between mb-1"><span className="text-xs font-medium text-gray-600">Anthropic API 키 <span className="text-gray-400">(검수할 때만)</span></span><button onClick={()=>setShowKey((v)=>!v)} className="text-[11px] text-sky-600">{showKey?"숨기기":"보기"}</button></div>
                <input type={showKey?"text":"password"} value={apiKey} onChange={(e)=>setApiKey(e.target.value)} placeholder="sk-ant-..." className="w-full px-2 py-1.5 border border-gray-300 rounded text-sm font-mono focus:outline-none focus:border-sky-400" />
                <div className="text-[11px] text-gray-400 mt-0.5">키는 이 화면 메모리에만 있고 저장되지 않습니다.</div>
              </div>
              <div className="text-xs font-medium text-gray-600 mb-1">검수 채팅창 ({chatCount}개)</div>
              {chats.map((c,i)=>(
                <div key={i} className="mb-2 border border-gray-200 rounded p-2">
                  <div className="flex gap-1.5 mb-1"><input value={c.name} onChange={(ev)=>setChats((p)=>p.map((x,j)=>(j===i?{...x,name:ev.target.value}:x)))} placeholder="채팅창 이름 (예: 데스크 상담방)" className="flex-1 px-2 py-1 border border-gray-300 rounded text-xs focus:outline-none focus:border-sky-400" /><button onClick={()=>setChats((p)=>p.filter((_,j)=>j!==i))} className="px-2 text-gray-400 hover:text-rose-500 text-sm">✕</button></div>
                  <textarea value={c.body} onChange={(ev)=>setChats((p)=>p.map((x,j)=>(j===i?{...x,body:ev.target.value}:x)))} placeholder="채팅창 내용 복붙" className="w-full h-16 p-2 border border-gray-300 rounded text-xs focus:outline-none focus:border-sky-400" />
                </div>
              ))}
              <button onClick={()=>setChats((p)=>[...p,{name:"",body:""}])} className="text-xs px-2 py-1 rounded bg-sky-100 text-sky-700 hover:bg-sky-200 font-medium">+ 채팅창 추가</button>
              <button onClick={runAudit} disabled={!parsed.ok||auditing||!apiKey.trim()} className={"mt-3 w-full py-2.5 rounded font-bold text-sm "+(parsed.ok&&!auditing&&apiKey.trim()?"bg-sky-600 text-white hover:bg-sky-700":"bg-gray-200 text-gray-400 cursor-not-allowed")}>{auditing?"검수 중…":"AI 검수 실행"}</button>
              {auditErr && <div className="text-xs text-rose-500 mt-2">{auditErr}</div>}
            </Card>

            {flags && (
              <Card title="검수 결과" right={<span className={"text-xs font-bold px-2 py-0.5 rounded "+(flags.length?"bg-amber-100 text-amber-700":"bg-emerald-100 text-emerald-700")}>{flags.length?`의심 ${flags.length}건`:"이상 없음"}</span>}>
                {flags.length===0 ? (
                  <div className="text-sm text-emerald-700 bg-emerald-50 rounded p-2">✓ 의심 항목을 찾지 못했습니다. 최종 확인은 사람이 합니다.</div>
                ) : (
                  <div className="space-y-2">
                    {flags.map((f,i)=>(
                      <div key={i} className="border border-amber-300 bg-amber-50 rounded-lg p-2.5 text-xs">
                        <div className="flex items-center justify-between mb-1"><span className="font-bold text-amber-900">⚠ {f.환자||"—"} · {f.유형||"의심"}</span>{f.채팅창 && <span className="text-[11px] px-1.5 py-0.5 rounded bg-sky-100 text-sky-700">{f.채팅창}</span>}</div>
                        {f.무엇이 && <div className="text-gray-700"><b>무엇이:</b> {f.무엇이}</div>}
                        {f.근거 && <div className="text-gray-600 mt-0.5"><b>근거:</b> {f.근거}</div>}
                        {f.대조 && <div className="text-gray-600"><b>대조:</b> {f.대조}</div>}
                        {f.조치 && <div className="text-gray-600"><b>조치:</b> {f.조치}</div>}
                      </div>
                    ))}
                    <div className="text-[11px] text-gray-400">※ 후보 목록입니다. 각 항목을 채팅창·차트에서 직접 재확인하세요.</div>
                  </div>
                )}
              </Card>
            )}

            <Card title="업무 로그" sub="결산·검수 결과가 자동 포함 · 피드백용 .md">
              <div className="space-y-2">
                <Field label="오늘 한 일"><textarea value={log.done} onChange={(e)=>setLog((p)=>({...p,done:e.target.value}))} className="w-full h-12 p-2 border border-gray-300 rounded text-xs focus:outline-none focus:border-gray-500" /></Field>
                <Field label="발견한 실수"><textarea value={log.mistakes} onChange={(e)=>setLog((p)=>({...p,mistakes:e.target.value}))} className="w-full h-12 p-2 border border-gray-300 rounded text-xs focus:outline-none focus:border-gray-500" /></Field>
                <Field label="이슈 / 메모"><textarea value={log.issues} onChange={(e)=>setLog((p)=>({...p,issues:e.target.value}))} className="w-full h-12 p-2 border border-gray-300 rounded text-xs focus:outline-none focus:border-gray-500" /></Field>
              </div>
            </Card>
          </Step>
        </div>
        <div className="text-center text-[11px] text-gray-400 mt-6">아크로한의원 일일결산·검수 v8</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
