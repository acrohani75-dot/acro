<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아크로한의원 진료 동시통역</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f8faff; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
header { background:#fff; padding:10px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; gap:10px; border-bottom:2px solid #e2e8f0; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.logo { font-size:14px; font-weight:800; color:#1e293b; white-space:nowrap; }
.lang-tabs { display:flex; gap:5px; overflow-x:auto; }
.tab-btn { padding:6px 11px; border:2px solid #e2e8f0; background:#f8faff; color:#64748b; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
.tab-btn.active { background:#6366f1; color:#fff; border-color:#6366f1; }
.header-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.opt-label { font-size:12px; color:#64748b; display:flex; align-items:center; gap:3px; cursor:pointer; white-space:nowrap; }
.opt-label.opus input:checked + span { color:#7c3aed; font-weight:700; }
.btn-clear { padding:6px 10px; background:#f1f5f9; color:#64748b; border:1px solid #e2e8f0; border-radius:6px; font-size:12px; cursor:pointer; font-weight:600; }

.chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; background:#f8faff; }
.chat::-webkit-scrollbar { width:4px; }
.chat::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:2px; }
.msg-group { display:flex; flex-direction:column; gap:6px; animation:fadeUp 0.2s ease-out; }
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.msg-row { display:flex; align-items:flex-end; gap:8px; }
.msg-row.left { justify-content:flex-start; }
.msg-row.right { justify-content:flex-end; }
.bubble { max-width:75%; padding:14px 18px; border-radius:16px; font-size:20px; font-weight:600; line-height:1.5; word-break:break-word; }
.bko { background:#1d4ed8; color:#fff; border-bottom-left-radius:4px; }
.btgt { background:#7c3aed; color:#fff; border-bottom-right-radius:4px; }
.bpend { background:#e2e8f0; color:#94a3b8; font-style:italic; font-size:16px; font-weight:400; }
.berr { background:#fee2e2; color:#dc2626; font-size:14px; font-weight:400; }
.flag { font-size:22px; flex-shrink:0; }
.spk { background:transparent; border:none; font-size:18px; cursor:pointer; opacity:0.3; padding:4px; border-radius:4px; transition:opacity 0.15s; flex-shrink:0; }
.spk:hover { opacity:1; }
.spk.on { opacity:1; animation:spkp 0.8s infinite; }
@keyframes spkp { 0%,100%{opacity:1} 50%{opacity:0.2} }
.empty { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; text-align:center; padding:20px; }
.empty .ico { font-size:56px; }
.empty .txt { font-size:17px; line-height:1.9; color:#64748b; }

.bottom { flex-shrink:0; background:#fff; border-top:2px solid #e2e8f0; padding:14px 16px; display:flex; flex-direction:column; gap:10px; box-shadow:0 -2px 8px rgba(0,0,0,0.04); }
.mic-btns { display:flex; gap:10px; }
.mic-btn { flex:1; padding:18px 10px; border-radius:16px; border:3px solid; background:transparent; font-weight:800; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:8px; }
.mic-btn .bico { font-size:32px; transition:all 0.2s; }
.mic-btn .blabel { font-size:16px; font-weight:800; }
.mic-btn .bsub { font-size:12px; font-weight:500; }
.mic-btn.ko-btn { border-color:#bfdbfe; color:#1d4ed8; background:#eff6ff; }
.mic-btn.ko-btn:hover { background:#dbeafe; border-color:#93c5fd; }
.mic-btn.ko-btn.active { border-color:#1d4ed8; background:#1d4ed8; color:#fff; box-shadow:0 0 0 4px rgba(29,78,216,0.2); }
.mic-btn.tgt-btn { border-color:#ddd6fe; color:#7c3aed; background:#f5f3ff; }
.mic-btn.tgt-btn:hover { background:#ede9fe; border-color:#c4b5fd; }
.mic-btn.tgt-btn.active { border-color:#7c3aed; background:#7c3aed; color:#fff; box-shadow:0 0 0 4px rgba(124,58,237,0.2); }
.text-row { display:flex; gap:8px; }
.text-row textarea { flex:1; background:#f8faff; border:2px solid #e2e8f0; border-radius:8px; padding:8px 12px; font-size:14px; color:#1e293b; font-family:inherit; resize:none; max-height:60px; }
.text-row textarea:focus { outline:none; border-color:#6366f1; }
.text-row textarea::placeholder { color:#94a3b8; }
.btn-send { padding:8px 14px; background:#1d4ed8; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
.btn-send:hover { background:#1e40af; }
.wave { display:flex; gap:3px; align-items:center; height:22px; justify-content:center; }
.wbar { width:4px; border-radius:2px; background:currentColor; animation:wv 0.7s ease-in-out infinite; }
.wbar:nth-child(1){height:4px;animation-delay:0s}.wbar:nth-child(2){height:10px;animation-delay:0.1s}.wbar:nth-child(3){height:16px;animation-delay:0.2s}.wbar:nth-child(4){height:22px;animation-delay:0.3s}.wbar:nth-child(5){height:16px;animation-delay:0.2s}.wbar:nth-child(6){height:10px;animation-delay:0.1s}.wbar:nth-child(7){height:4px;animation-delay:0s}
@keyframes wv { 0%,100%{transform:scaleY(0.3)} 50%{transform:scaleY(1)} }
.wave.hidden { display:none; }
</style>
</head>
<body>

<header>
  <div class="logo">🏥 아크로 동시통역</div>
  <div class="lang-tabs">
    <button class="tab-btn active" onclick="switchLang('japanese',this)">🇯🇵 日本語</button>
    <button class="tab-btn" onclick="switchLang('english',this)">🇺🇸 EN</button>
    <button class="tab-btn" onclick="switchLang('chinese',this)">🇨🇳 中文</button>
    <button class="tab-btn" onclick="switchLang('taiwanese',this)">🇹🇼 繁中</button>
    <button class="tab-btn" onclick="switchLang('thai',this)">🇹🇭 ไทย</button>
  </div>
  <div class="header-right">
    <label class="opt-label opus" title="정확하지만 느립니다"><input type="checkbox" id="chkOpus" onchange="useOpus=this.checked"> <span>🎯OPUS</span></label>
    <label class="opt-label"><input type="checkbox" id="chk" checked onchange="autoSpeak=this.checked"> 🔊자동음성</label>
    <button class="btn-clear" onclick="clearAll()">초기화</button>
  </div>
</header>

<div class="chat" id="chat"></div>

<div class="bottom">
  <div class="mic-btns">
    <button class="mic-btn ko-btn" id="btn-ko" onclick="toggle('ko')">
      <div class="wave hidden" id="wave-ko"><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div></div>
      <div class="bico" id="icon-ko">🎤</div>
      <div class="blabel">🇰🇷 한국어</div>
      <div class="bsub" id="sub-ko">눌러서 말하기</div>
    </button>
    <button class="mic-btn tgt-btn" id="btn-tgt" onclick="toggle('tgt')">
      <div class="wave hidden" id="wave-tgt"><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div></div>
      <div class="bico" id="icon-tgt">🎤</div>
      <div class="blabel" id="label-tgt">🇯🇵 日本語</div>
      <div class="bsub" id="sub-tgt">눌러서 말하기</div>
    </button>
  </div>
  <div class="text-row">
    <textarea id="ta" placeholder="한국어 또는 외국어로 입력하면 자동 감지..." onkeydown="taKey(event)" rows="1"></textarea>
    <button class="btn-send" onclick="sendFromTa()">전송</button>
  </div>
</div>

<script>
const PROXY_URL = "https://script.google.com/macros/s/AKfycby4b8Y1P30dJeVLP9L5zd1-HI6c1iLEHVT_d_sVKu0zPfRrRsrDFVvnfgA5d4rXTRG4Gg/exec";

const LANGS = {
  japanese:  { name:'日本語',   flag:'🇯🇵', code:'ja-JP', eng:'Japanese' },
  english:   { name:'English',  flag:'🇺🇸', code:'en-US', eng:'English' },
  chinese:   { name:'中文',     flag:'🇨🇳', code:'zh-CN', eng:'Simplified Chinese' },
  taiwanese: { name:'繁體中文', flag:'🇹🇼', code:'zh-TW', eng:'Traditional Chinese' },
  thai:      { name:'ภาษาไทย', flag:'🇹🇭', code:'th-TH', eng:'Thai' },
};

let curLang = 'japanese';
let history = [];
let busy = false;
let autoSpeak = true;
let useOpus = false;
let ttsId = null;
let activeSTT = null;
let wantListening = false;
let rec = null;
let sttBuffer = '';
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

/* ---------- 음성인식 (연속·일시정지 견딤) ---------- */
function toggle(side) {
  if (activeSTT === side) { stopAndSend(); return; }
  stopSTT();
  startSTT(side);
}
function startSTT(side) {
  if (!SR) { alert('음성인식은 Chrome/Edge에서만 지원됩니다'); return; }
  activeSTT = side;
  wantListening = true;
  sttBuffer = '';
  setActive(side, true);
  spawnRec(side);
}
function spawnRec(side) {
  const isKo = side === 'ko';
  rec = new SR();
  rec.lang = isKo ? 'ko-KR' : LANGS[curLang].code;
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;

  rec.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) sttBuffer += t + ' ';
      else interim += t;
    }
    document.getElementById('sub-' + side).textContent = '💬 ' + (sttBuffer + interim).trim();
  };
  rec.onerror = ev => {
    if (ev.error === 'no-speech' || ev.error === 'aborted') return; // 무시하고 onend에서 재시작
    if (ev.error === 'not-allowed') {
      wantListening = false;
      document.getElementById('sub-' + side).textContent = '❌ 마이크 권한 필요';
    }
  };
  rec.onend = () => {
    // 사용자가 멈춘 게 아니면 계속 듣기 (침묵으로 끊겨도 자동 재시작)
    if (wantListening && activeSTT === side) {
      try { rec.start(); } catch(e) { setTimeout(()=>{ try{rec.start();}catch(_){} }, 200); }
    }
  };
  try { rec.start(); } catch(e) {}
}
function stopAndSend() {
  const side = activeSTT;
  wantListening = false;
  if (rec) { try { rec.stop(); } catch(e){} rec = null; }
  if (side) setActive(side, false);
  activeSTT = null;
  const text = sttBuffer.trim();
  sttBuffer = '';
  if (text) sendText(text, side);
}
function stopSTT() {
  wantListening = false;
  if (rec) { try { rec.stop(); } catch(e){} rec = null; }
  if (activeSTT) { setActive(activeSTT, false); activeSTT = null; }
  sttBuffer = '';
}
function setActive(side, on) {
  const btn=document.getElementById('btn-'+side), wave=document.getElementById('wave-'+side), icon=document.getElementById('icon-'+side), sub=document.getElementById('sub-'+side);
  if (on) { btn.classList.add('active'); wave.classList.remove('hidden'); icon.style.display='none'; sub.textContent='🔴 듣는 중… (다시 누르면 통역)'; }
  else { btn.classList.remove('active'); wave.classList.add('hidden'); icon.style.display=''; sub.textContent='눌러서 말하기'; }
}

/* ---------- 번역 (프록시 경유, 직역 전용) ---------- */
async function sendText(text, side) {
  if (!text || busy) return;
  busy = true;
  const isKo = side === 'ko';
  const cfg = LANGS[curLang];
  const srcLang = isKo ? 'Korean' : cfg.eng;
  const tgtLang = isKo ? cfg.eng : 'Korean';
  const tgtCode = isKo ? cfg.code : 'ko-KR';

  const entry = { id: Date.now() };
  if (isKo) entry.ko = text; else entry[curLang] = text;
  history.push(entry);
  renderChat();

  const prompt =
`You are a medical interpreter at a Korean medicine clinic. Translate the user text from ${srcLang} to ${tgtLang}.
STRICT RULES:
- Literal, faithful translation only. Do NOT paraphrase, summarize, localize, or improve.
- Do NOT add, omit, explain, or answer anything. If the text is a question, translate the question (do not answer it).
- Preserve numbers, units, dosage, body parts, and medical terms exactly.
- Keep the same sentence structure and tone as closely as the target language allows.
- Output ONLY the translation. No quotes, no notes, no labels.

TEXT:
${text}`;

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        model: useOpus ? 'claude-opus-4-8' : 'claude-haiku-4-5-20251001',
        max_tokens: 400,
        prompt: prompt
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(typeof data.error === 'string' ? data.error : (data.error.message || 'error'));
    const translated = (data.content && data.content[0] && data.content[0].text || '').trim();
    const idx = history.findIndex(h => h.id === entry.id);
    if (idx !== -1) { if (isKo) history[idx][curLang] = translated; else history[idx].ko = translated; }
    if (autoSpeak && translated) speakAuto(translated, tgtCode);
  } catch (err) {
    const idx = history.findIndex(h => h.id === entry.id);
    if (idx !== -1) { if (isKo) history[idx][curLang] = '❌ ' + err.message; else history[idx].ko = '❌ ' + err.message; }
  }
  busy = false;
  renderChat();
}

function sendFromTa() {
  const ta = document.getElementById('ta');
  const text = ta.value.trim();
  if (!text) return;
  ta.value = '';
  const isKorean = /[\uAC00-\uD7A3]/.test(text);
  sendText(text, isKorean ? 'ko' : 'tgt');
}
function taKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFromTa(); } }

/* ---------- 음성 출력 (여성·중성 톤 우선) ---------- */
let voicesReady = false;
function loadVoices(){ voicesReady = true; }
if (window.speechSynthesis) { speechSynthesis.onvoiceschanged = loadVoices; loadVoices(); }

const FEMALE_HINTS = ['female','woman','girl','female','kyoko','o-ren','siri female','google 日本語','google us english','google 中文','samantha','victoria','zira','nuan','mei','ting','tessa','amira','kanya','google ภาษาไทย','premwadee','ava','jenny','sora','yuna','heami','sun-hi'];
const MALE_HINTS = ['male','man','google uk english male','daniel','alex','fred','otoya','kenji','ichiro'];

function pickVoice(code) {
  const vs = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  if (!vs.length) return null;
  const base = code.split('-')[0].toLowerCase();
  const sameLang = vs.filter(v => (v.lang||'').toLowerCase().startsWith(base));
  const pool = sameLang.length ? sameLang : vs;
  const isFemale = v => { const n=(v.name||'').toLowerCase(); return FEMALE_HINTS.some(h=>n.includes(h)); };
  const isMale = v => { const n=(v.name||'').toLowerCase(); return MALE_HINTS.some(h=>n.includes(h)); };
  return pool.find(isFemale) || pool.find(v => !isMale(v)) || pool[0];
}
function applyVoice(u, code) {
  const v = pickVoice(code);
  if (v) u.voice = v;
  u.lang = code; u.rate = 0.95; u.pitch = 1.15; // pitch 살짝 올려 여성·중성 톤
}
function speakAuto(text, code) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  applyVoice(u, code);
  speechSynthesis.speak(u);
}
function speakBtn(text, code, id) {
  if (!window.speechSynthesis) return;
  if (ttsId === id) { speechSynthesis.cancel(); ttsId=null; document.querySelectorAll('.spk').forEach(b=>b.classList.remove('on')); return; }
  speechSynthesis.cancel();
  document.querySelectorAll('.spk').forEach(b=>b.classList.remove('on'));
  const btn = document.getElementById(id);
  if (btn) btn.classList.add('on');
  ttsId = id;
  const u = new SpeechSynthesisUtterance(text);
  applyVoice(u, code);
  u.onend = u.onerror = () => { ttsId=null; if (btn) btn.classList.remove('on'); };
  speechSynthesis.speak(u);
}

/* ---------- 렌더 ---------- */
function renderChat() {
  const chat = document.getElementById('chat');
  const cfg = LANGS[curLang];
  if (history.length === 0) {
    chat.innerHTML = `<div class="empty"><div class="ico">🎙️</div><div class="txt">아래 버튼을 눌러 말하면<br>자동으로 통역됩니다<br><br>
      <span style="color:#1d4ed8;font-weight:700">🇰🇷 한국어</span> — 원장님<br>
      <span style="color:#7c3aed;font-weight:700">${cfg.flag} ${cfg.name}</span> — 환자</div></div>`;
    return;
  }
  chat.innerHTML = '';
  history.forEach((entry, i) => {
    const koText = entry.ko, tgtText = entry[curLang];
    const g = document.createElement('div'); g.className='msg-group';
    if (koText) {
      const err = koText.startsWith('❌'); const id = `sk${i}`;
      g.innerHTML += `<div class="msg-row left"><div class="flag">🇰🇷</div><div class="bubble ${err?'berr':'bko'}">${esc(koText)}</div>${!err?`<button class="spk" id="${id}" onclick="speakBtn('${ea(koText)}','ko-KR','${id}')">🔊</button>`:''}</div>`;
    } else { g.innerHTML += `<div class="msg-row left"><div class="flag">🇰🇷</div><div class="bubble bpend">통역 중...</div></div>`; }
    if (tgtText) {
      const err = tgtText.startsWith('❌'); const id = `st${i}`;
      g.innerHTML += `<div class="msg-row right">${!err?`<button class="spk" id="${id}" onclick="speakBtn('${ea(tgtText)}','${cfg.code}','${id}')">🔊</button>`:''}<div class="bubble ${err?'berr':'btgt'}">${esc(tgtText)}</div><div class="flag">${cfg.flag}</div></div>`;
    } else { g.innerHTML += `<div class="msg-row right"><div class="bubble bpend">통역 중...</div><div class="flag">${cfg.flag}</div></div>`; }
    chat.appendChild(g);
  });
  chat.scrollTop = chat.scrollHeight;
}

function switchLang(lang, el) {
  curLang = lang;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  stopSTT();
  document.getElementById('label-tgt').textContent = LANGS[lang].flag + ' ' + LANGS[lang].name;
  renderChat();
}
function clearAll() {
  if (!confirm('대화 내용을 모두 삭제할까요?')) return;
  window.speechSynthesis && speechSynthesis.cancel();
  history = []; stopSTT(); renderChat();
}
function esc(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
function ea(t){ return t.replace(/'/g,"&#39;").replace(/"/g,"&quot;"); }

renderChat();
</script>
</body>
</html>
